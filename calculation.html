<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Sprint Game</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --success-color: #27ae60;
            --error-color: #e74c3c;
            --bg-color: #ecf0f1;
            --card-bg: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: var(--bg-color);
            color: var(--primary-color);
        }

        .game-card {
            background: var(--card-bg);
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            width: 90%;
            max-width: 450px;
        }

        .stats-container {
            display: flex;
            justify-content: space-between;
            margin-bottom: 2rem;
            font-weight: bold;
            font-size: 1.1rem;
        }

        #timer { color: var(--error-color); }
        #score { color: var(--success-color); }

        .question-box {
            font-size: 3.5rem;
            margin: 1.5rem 0;
            min-height: 4.5rem;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #answer-input {
            width: 100%;
            padding: 12px;
            font-size: 1.5rem;
            border: 2px solid #ddd;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 1rem;
            outline: none;
            transition: border-color 0.3s;
            box-sizing: border-box;
        }

        #answer-input:focus {
            border-color: var(--accent-color);
        }

        .btn {
            width: 100%;
            padding: 12px;
            font-size: 1.1rem;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-submit {
            background-color: var(--accent-color);
            color: white;
            margin-bottom: 0.5rem;
        }

        .btn-submit:hover { background-color: #2980b9; }

        .btn-restart {
            background-color: var(--primary-color);
            color: white;
            display: none;
        }

        #feedback {
            height: 1.5rem;
            margin: 1rem 0;
            font-weight: 600;
        }

        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="game-card">
        <h1>Math Sprint</h1>
        <div class="stats-container">
            <div>Score: <span id="score">0</span></div>
            <div>Time: <span id="timer">30</span>s</div>
        </div>
        
        <div id="game-area">
            <div class="question-box" id="question">? + ?</div>
            <input type="number" id="answer-input" placeholder="Type answer..." autofocus>
            <button class="btn btn-submit" id="submit-btn">Submit</button>
        </div>

        <div id="feedback"></div>
        <button class="btn btn-restart" id="restart-btn">Play Again</button>
    </div>

    <script>
        let score = 0, timeLeft = 30, timerInterval, currentAnswer, isGameOver = false;

        const elements = {
            question: document.getElementById('question'),
            input: document.getElementById('answer-input'),
            score: document.getElementById('score'),
            timer: document.getElementById('timer'),
            feedback: document.getElementById('feedback'),
            submit: document.getElementById('submit-btn'),
            restart: document.getElementById('restart-btn'),
            area: document.getElementById('game-area')
        };

        function generateQuestion() {
            const ops = ['+', '-', '*'];
            const op = ops[Math.floor(Math.random() * ops.length)];
            let n1 = Math.floor(Math.random() * (op === '*' ? 12 : 50)) + 1;
            let n2 = Math.floor(Math.random() * (op === '*' ? 12 : 50)) + 1;

            if (op === '-' && n1 < n2) [n1, n2] = [n2, n1];
            elements.question.textContent = `${n1} ${op} ${n2}`;
            currentAnswer = op === '+' ? n1 + n2 : op === '-' ? n1 - n2 : n1 * n2;
        }

        function startGame() {
            score = 0; timeLeft = 30; isGameOver = false;
            elements.score.textContent = score; elements.timer.textContent = timeLeft;
            elements.feedback.textContent = ''; elements.area.classList.remove('hidden');
            elements.restart.style.display = 'none'; elements.input.value = '';
            elements.input.focus();
            generateQuestion();
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                if (--timeLeft <= 0) endGame();
                elements.timer.textContent = timeLeft;
            }, 1000);
        }

        function checkAnswer() {
            if (isGameOver || !elements.input.value) return;
            const correct = parseInt(elements.input.value) === currentAnswer;
            if (correct) { score++; elements.score.textContent = score; }
            elements.feedback.textContent = correct ? 'Correct! 🎉' : 'Wrong! ❌';
            elements.feedback.style.color = correct ? 'var(--success-color)' : 'var(--error-color)';
            elements.input.value = ''; elements.input.focus();
            generateQuestion();
            setTimeout(() => { if (!isGameOver) elements.feedback.textContent = ''; }, 800);
        }

        function endGame() {
            isGameOver = true; clearInterval(timerInterval);
            elements.area.classList.add('hidden'); elements.restart.style.display = 'block';
            elements.feedback.textContent = `Time's up! Final Score: ${score}`;
            elements.feedback.style.color = 'var(--primary-color)';
        }

        elements.submit.addEventListener('click', checkAnswer);
        elements.input.addEventListener('keypress', (e) => e.key === 'Enter' && checkAnswer());
        elements.restart.addEventListener('click', startGame);
        startGame();
    </script>
</body>
</html>
