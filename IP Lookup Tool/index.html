<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>IP Address & Network Info Lookup</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>🌐 IP Address & Network Info</h1>
    <button id="lookup-btn">🔍 Fetch My IP Info</button>

    <div id="info-card" class="card hidden">
      <h2>Results</h2>
      <p><strong>IP:</strong> <span id="ip"></span></p>
      <p><strong>Country:</strong> <span id="country"></span></p>
      <p><strong>ISP:</strong> <span id="isp"></span></p>
      <p><strong>Timezone:</strong> <span id="timezone"></span></p>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
