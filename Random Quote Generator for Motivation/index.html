<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Motivational Quote Generator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="quote-card">
    <h1>✨ Motivation Hub ✨</h1>
    <p id="quote">Click below to get inspired!</p>
    <p id="author"></p>
    <div class="buttons">
      <button onclick="showQuote()">New Quote</button>
      <button onclick="copyQuote()">Copy</button>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
