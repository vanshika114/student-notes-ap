<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Key & Lock — The Golden Heart Quest</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap');

        :root {
            --primary: #ff85a2;
            --primary-hover: #ff6b8d;
            --secondary: #7dd3fc;
            --bg: #fff5f7;
            --card: #ffffff;
            --text: #5e4d52;
            --border: #fce4ec;
            --gold: #facc15;
            --locked: #cbd5e1;
        }

        body {
            margin: 0;
            font-family: 'Fredoka', sans-serif;
            background: var(--bg);
            background-image: radial-gradient(#ffcad4 0.8px, transparent 0.8px);
            background-size: 24px 24px;
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }

        .game-wrapper {
            width: 100%;
            max-width: 500px;
            background: var(--card);
            border-radius: 40px;
            padding: 30px;
            box-shadow: 0 20px 0px #f8bbd0;
            border: 4px solid var(--border);
            text-align: center;
            position: relative;
        }

        h1 {
            color: var(--primary);
            margin: 0 0 10px;
            font-size: 2.2rem;
            text-shadow: 3px 3px 0px white;
        }

        /* Inventory / Progress Bar */
        .inventory {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 25px;
            padding: 15px;
            background: #fff9fa;
            border-radius: 20px;
            border: 2px dashed var(--primary-light);
        }

        .key-slot {
            font-size: 1.5rem;
            filter: grayscale(1) opacity(0.3);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .key-slot.collected {
            filter: grayscale(0) opacity(1);
            transform: scale(1.2);
            text-shadow: 0 0 10px var(--gold);
        }

        /* Level Navigation */
        .levels-map {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 30px;
        }

        .level-node {
            aspect-ratio: 1;
            background: white;
            border: 3px solid var(--border);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--locked);
        }

        .level-node.unlocked { color: var(--secondary); border-color: var(--secondary); }
        .level-node.active { background: var(--secondary); color: white; border-color: var(--secondary); transform: scale(1.1); box-shadow: 0 5px 15px rgba(125, 211, 252, 0.4); }
        .level-node.completed { background: var(--primary); color: white; border-color: var(--primary); }

        /* Challenge Area */
        .challenge-box {
            min-height: 200px;
            padding: 20px;
            background: #fef1f5;
            border-radius: 25px;
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .puzzle-text {
            font-size: 1.2rem;
            line-height: 1.4;
            margin-bottom: 20px;
        }

        /* Puzzle Specifics */
        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            width: 100%;
        }

        .btn-cute {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 6px 0px #d81b60;
            transition: all 0.1s;
        }

        .btn-cute:active { transform: translateY(3px); box-shadow: 0 3px 0px #d81b60; }
        .btn-cute:disabled { background: var(--locked); box-shadow: 0 6px 0px #94a3b8; cursor: default; }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 15px;
            border: 3px solid var(--border);
            text-align: center;
            font-size: 1.2rem;
            margin-bottom: 15px;
            font-family: inherit;
            outline: none;
        }

        .sequence-dots {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }

        .dot {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: white;
            border: 3px solid var(--border);
            cursor: pointer;
            transition: 0.2s;
        }
        .dot.flash { transform: scale(1.2); border-color: white; box-shadow: 0 0 20px currentColor; }

        /* Overlays */
        .overlay {
            position: absolute;
            inset: 0;
            background: rgba(255, 255, 255, 0.95);
            z-index: 10;
            border-radius: 36px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px;
        }

        .hidden { display: none !important; }

        @keyframes keyPop {
            0% { transform: scale(0); }
            70% { transform: scale(1.5); }
            100% { transform: scale(1); }
        }
        .collected-anim { animation: keyPop 0.6s ease-out; }
    </style>
</head>
<body>

    <div class="game-wrapper">
        <div id="win-screen" class="overlay hidden">
            <span style="font-size: 4rem;">💖</span>
            <h1>Kingdom Unlocked!</h1>
            <p>You collected all 4 keys and opened the Golden Heart!</p>
            <button class="btn-cute" onclick="location.reload()">Play Again 🎀</button>
        </div>

        <h1>Key & Lock 🗝️</h1>
        <p style="font-size: 0.9rem; color: var(--text-muted); margin-bottom: 20px;">Solve puzzles to earn keys and unlock the heart!</p>

        <div class="inventory">
            <span id="slot-0" class="key-slot">🔑</span>
            <span id="slot-1" class="key-slot">🗝️</span>
            <span id="slot-2" class="key-slot">🔑</span>
            <span id="slot-3" class="key-slot">🗝️</span>
        </div>

        <div class="levels-map" id="map">
            <div class="level-node unlocked active" onclick="loadLevel(0)">1</div>
            <div class="level-node" id="node-1">2</div>
            <div class="level-node" id="node-2">3</div>
            <div class="level-node" id="node-3">4</div>
        </div>

        <div class="challenge-box" id="challenge-area">
            <!-- Puzzle content dynamically injected -->
        </div>

        <div id="feedback" style="font-weight: 700; min-height: 24px; margin-top: 10px;"></div>
    </div>

    <script>
        const LEVELS = [
            {
                type: 'riddle',
                q: "I have a face but no eyes, hands but no arms. What am I?",
                a: "clock",
                hint: "I tell you when it's time for snacks!"
            },
            {
                type: 'math',
                q: "If 2 + 🌸 = 10, and 🌸 - 🥧 = 3, what is 🥧?",
                a: "5",
                hint: "First find the flower value!"
            },
            {
                type: 'sequence',
                q: "Watch the pattern and repeat it!",
                seq: [0, 2, 1, 3],
                hint: "Follow the colors carefully!"
            },
            {
                type: 'odd',
                q: "Which of these does not belong in a garden?",
                options: ["Rose 🌹", "Daisy 🌼", "Computer 💻", "Tulip 🌷"],
                a: "Computer 💻",
                hint: "Think about what needs water to grow!"
            }
        ];

        let state = {
            currentLevel: 0,
            keysCollected: [false, false, false, false],
            userSeq: []
        };

        function loadLevel(idx) {
            if (idx > 0 && !state.keysCollected[idx-1]) return; // Locked
            
            state.currentLevel = idx;
            state.userSeq = [];
            const level = LEVELS[idx];
            const area = document.getElementById('challenge-area');
            const feedback = document.getElementById('feedback');
            feedback.innerText = "";
            
            // Update Map UI
            document.querySelectorAll('.level-node').forEach((n, i) => {
                n.classList.remove('active');
                if (i === idx) n.classList.add('active');
            });

            if (level.type === 'riddle' || level.type === 'math') {
                area.innerHTML = `
                    <div class="puzzle-text">${level.q}</div>
                    <input type="text" id="ans-input" placeholder="Your answer..." autocomplete="off">
                    <button class="btn-cute" onclick="checkAnswer()">Unlock Key 🗝️</button>
                `;
                document.getElementById('ans-input').addEventListener('keypress', (e) => {
                    if(e.key === 'Enter') checkAnswer();
                });
            } else if (level.type === 'sequence') {
                area.innerHTML = `
                    <div class="puzzle-text">${level.q}</div>
                    <div class="sequence-dots">
                        <div class="dot" id="dot-0" style="color: #ff85a2; background: #fff0f3" onclick="handleSeq(0)"></div>
                        <div class="dot" id="dot-1" style="color: #7dd3fc; background: #e0f2fe" onclick="handleSeq(1)"></div>
                        <div class="dot" id="dot-2" style="color: #facc15; background: #fefce8" onclick="handleSeq(2)"></div>
                        <div class="dot" id="dot-3" style="color: #4ade80; background: #f0fdf4" onclick="handleSeq(3)"></div>
                    </div>
                    <button class="btn-cute" id="play-seq-btn" onclick="playSequence()">Play Pattern</button>
                `;
            } else if (level.type === 'odd') {
                area.innerHTML = `
                    <div class="puzzle-text">${level.q}</div>
                    <div class="options-grid">
                        ${level.options.map(opt => `<button class="btn-cute btn-secondary" onclick="checkChoice('${opt}')">${opt}</button>`).join('')}
                    </div>
                `;
            }
        }

        function checkAnswer() {
            const input = document.getElementById('ans-input').value.trim().toLowerCase();
            const correct = LEVELS[state.currentLevel].a;
            
            if (input === correct) {
                winLevel();
            } else {
                showFeedback("Not quite! 🎀 Try again!", "#ff85a2");
            }
        }

        function checkChoice(choice) {
            if (choice === LEVELS[state.currentLevel].a) {
                winLevel();
            } else {
                showFeedback("Oops! That belongs! 🌸", "#ff85a2");
            }
        }

        async function playSequence() {
            const btn = document.getElementById('play-seq-btn');
            btn.disabled = true;
            const seq = LEVELS[state.currentLevel].seq;
            
            for (let id of seq) {
                const dot = document.getElementById(`dot-${id}`);
                dot.classList.add('flash');
                await new Promise(r => setTimeout(r, 600));
                dot.classList.remove('flash');
                await new Promise(r => setTimeout(r, 200));
            }
            btn.disabled = false;
            state.userSeq = [];
        }

        function handleSeq(id) {
            state.userSeq.push(id);
            const target = LEVELS[state.currentLevel].seq;
            
            if (state.userSeq[state.userSeq.length - 1] !== target[state.userSeq.length - 1]) {
                showFeedback("Wrong pattern! 🥺", "#ff85a2");
                state.userSeq = [];
                return;
            }

            if (state.userSeq.length === target.length) {
                winLevel();
            }
        }

        function winLevel() {
            state.keysCollected[state.currentLevel] = true;
            const slot = document.getElementById(`slot-${state.currentLevel}`);
            slot.classList.add('collected', 'collected-anim');
            
            const node = document.getElementById(`map`).children[state.currentLevel];
            node.classList.add('completed');

            showFeedback("Key Collected! 🌟", "var(--secondary)");

            if (state.currentLevel < 3) {
                const nextNode = document.getElementById(`node-${state.currentLevel + 1}`);
                nextNode.classList.add('unlocked');
                setTimeout(() => loadLevel(state.currentLevel + 1), 1500);
            } else {
                setTimeout(() => document.getElementById('win-screen').classList.remove('hidden'), 1000);
            }
        }

        function showFeedback(msg, color) {
            const f = document.getElementById('feedback');
            f.innerText = msg;
            f.style.color = color;
        }

        loadLevel(0);
    </script>
</body>
</html>
