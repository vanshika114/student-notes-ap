<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LeetCode Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header class="header card">
      <div class="logo">
        <svg class="code-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"></polyline><polyline points="8 6 2 12 8 18"></polyline></svg>
        <h1>LeetCode Tracker</h1>
      </div>
      <div class="streak-badge">
        <span class="streak-icon">🔥</span>
        <span id="header-streak">0</span> Day Streak
      </div>
    </header>

    <!-- Daily Quote Section -->
    <section class="quote-section card" style="--delay: 0.05s" id="quote-card">
      <div class="quote-content">
        <div class="quote-icon-wrapper">
          <span class="quote-icon">❝</span>
        </div>
        <div class="quote-body">
          <p id="daily-quote" class="quote-text">Loading inspiration...</p>
          <p id="daily-author" class="quote-author"></p>
        </div>
        <button id="new-quote-btn" class="icon-btn" aria-label="New Quote" title="Get another quote">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"></polyline><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path></svg>
        </button>
      </div>
    </section>

    <section class="stats-overview">
      <div class="stat-card" style="--delay: 0.1s">
        <div class="stat-icon">📝</div>
        <div class="stat-info">
          <span class="stat-label">Total Solved</span>
          <span class="stat-value" id="stat-total">0</span>
        </div>
      </div>
      <div class="stat-card" style="--delay: 0.2s">
        <div class="stat-icon">📅</div>
        <div class="stat-info">
          <span class="stat-label">Today's Count</span>
          <span class="stat-value" id="stat-today">0</span>
        </div>
      </div>
      <div class="stat-card" style="--delay: 0.3s">
        <div class="stat-icon">🔥</div>
        <div class="stat-info">
          <span class="stat-label">Current Streak</span>
          <span class="stat-value" id="stat-streak">0</span>
        </div>
      </div>
      <div class="stat-card" style="--delay: 0.4s">
        <div class="stat-icon">🎯</div>
        <div class="stat-info">
          <span class="stat-label">Acceptance Rate</span>
          <span class="stat-value"><span id="stat-acceptance">0</span>%</span>
        </div>
      </div>
    </section>

    <div class="dashboard-grid">
      <section class="problem-progress card" style="--delay: 0.5s">
        <h2>Problem Progress</h2>
        <div class="progress-content">
          <div class="donut-chart-container">
            <div class="donut-chart" id="donut-chart">
              <div class="donut-hole">
                <span id="donut-total">0</span>
                <span class="donut-label">Solved</span>
              </div>
            </div>
          </div>
          <div class="progress-bars">
            <div class="progress-item">
              <div class="progress-header">
                <span class="difficulty-label easy">Easy</span>
                <span class="progress-count"><span id="count-easy">0</span> / 800</span>
              </div>
              <div class="progress-track"><div class="progress-fill easy" id="fill-easy" style="width: 0%"></div></div>
            </div>
            <div class="progress-item">
              <div class="progress-header">
                <span class="difficulty-label medium">Medium</span>
                <span class="progress-count"><span id="count-medium">0</span> / 1600</span>
              </div>
              <div class="progress-track"><div class="progress-fill medium" id="fill-medium" style="width: 0%"></div></div>
            </div>
            <div class="progress-item">
              <div class="progress-header">
                <span class="difficulty-label hard">Hard</span>
                <span class="progress-count"><span id="count-hard">0</span> / 700</span>
              </div>
              <div class="progress-track"><div class="progress-fill hard" id="fill-hard" style="width: 0%"></div></div>
            </div>
          </div>
        </div>
      </section>

      <section class="topic-progress card" style="--delay: 0.6s">
        <div class="section-header-row">
          <h2>Topic-Wise Progress</h2>
          <input type="text" id="topic-search" class="search-input" placeholder="Search topic...">
        </div>
        <div class="topic-list" id="topic-list">
          <!-- Populated by JS -->
        </div>
      </section>

      <section class="streak-calendar card" style="--delay: 0.7s">
        <h2>Daily Streak Calendar</h2>
        <div class="heatmap-container" id="heatmap-container">
          <!-- Populated by JS -->
        </div>
        <div class="heatmap-legend">
          <span>Less</span>
          <div class="legend-cell level-0" style="background: var(--heatmap-0);"></div>
          <div class="legend-cell level-1" style="background: var(--heatmap-1);"></div>
          <div class="legend-cell level-2" style="background: var(--heatmap-2);"></div>
          <div class="legend-cell level-3" style="background: var(--heatmap-3);"></div>
          <span>More</span>
        </div>
      </section>

      <section class="activity-log card" style="--delay: 0.8s">
        <div class="section-header-row">
          <h2>Recent Activity Log</h2>
          <div class="activity-filters" id="activity-filters">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn easy" data-filter="easy">Easy</button>
            <button class="filter-btn medium" data-filter="medium">Med</button>
            <button class="filter-btn hard" data-filter="hard">Hard</button>
          </div>
        </div>
        <div class="activity-list" id="activity-list">
          <!-- Populated by JS -->
        </div>
      </section>
    </div>

    <div class="fab-container">
      <div class="fab-menu" id="fab-menu">
        <button class="fab-mini fab-hard" data-diff="hard" aria-label="Add Hard" title="Add Hard">H</button>
        <button class="fab-mini fab-medium" data-diff="medium" aria-label="Add Medium" title="Add Medium">M</button>
        <button class="fab-mini fab-easy" data-diff="easy" aria-label="Add Easy" title="Add Easy">E</button>
      </div>
      <button class="fab" id="fab-add" aria-label="Add Problem">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
      </button>
    </div>

    <div class="modal-overlay" id="add-modal">
      <div class="modal-content">
        <div class="modal-header">
          <h2>Add Problem</h2>
          <button class="close-modal" id="close-modal" aria-label="Close modal">&times;</button>
        </div>
        <form id="add-form">
          <div class="form-group">
            <label for="problem-name">Problem Name</label>
            <input type="text" id="problem-name" required placeholder="e.g. Two Sum">
          </div>
          <div class="form-group">
            <label for="difficulty">Difficulty</label>
            <select id="difficulty" required>
              <option value="easy">Easy</option>
              <option value="medium">Medium</option>
              <option value="hard">Hard</option>
            </select>
          </div>
          <div class="form-group">
            <label for="topic">Topic</label>
            <select id="topic" required>
              <option value="Arrays">Arrays</option>
              <option value="Strings">Strings</option>
              <option value="Dynamic Programming">Dynamic Programming</option>
              <option value="Trees">Trees</option>
              <option value="Graphs">Graphs</option>
              <option value="Linked Lists">Linked Lists</option>
              <option value="Sorting">Sorting</option>
              <option value="Binary Search">Binary Search</option>
              <option value="Stack/Queue">Stack/Queue</option>
              <option value="Greedy">Greedy</option>
            </select>
          </div>
          <div class="form-group">
            <label for="notes">Notes (Optional)</label>
            <textarea id="notes" rows="3" placeholder="Time complexity, patterns..."></textarea>
          </div>
          <button type="submit" class="btn-submit">Add Problem</button>
        </form>
      </div>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
