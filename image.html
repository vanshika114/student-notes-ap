<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FlashRecall — Image Identification</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: #1e293b;
      --accent: #38bdf8;
      --text: #f8fafc;
      --muted: #94a3b8;
      --success: #22c55e;
      --error: #ef4444;
    }
    body {
      margin: 0;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }
    .game-card {
      background: var(--card);
      width: 90%;
      max-width: 480px;
      padding: 24px;
      border-radius: 20px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.1);
      position: relative;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    .badge {
      background: rgba(56, 189, 248, 0.2);
      color: var(--accent);
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
    }
    .img-container {
      width: 100%;
      aspect-ratio: 16 / 10;
      border-radius: 12px;
      overflow: hidden;
      background: #000;
      margin-bottom: 24px;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }
    .img-container img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: opacity 0.4s ease;
    }
    .options-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .opt-btn {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: var(--text);
      padding: 16px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .opt-btn:hover:not(:disabled) {
      background: rgba(255, 255, 255, 0.08);
      border-color: var(--accent);
      transform: translateY(-2px);
    }
    .opt-btn.correct {
      background: var(--success) !important;
      border-color: var(--success);
      color: white;
    }
    .opt-btn.wrong {
      background: var(--error) !important;
      border-color: var(--error);
      color: white;
    }
    .screen-overlay {
      position: absolute;
      inset: 0;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 20;
      text-align: center;
      border-radius: 20px;
    }
    .primary-btn {
      background: var(--accent);
      color: var(--bg);
      border: none;
      padding: 14px 40px;
      border-radius: 12px;
      font-weight: 700;
      font-size: 18px;
      cursor: pointer;
      transition: transform 0.2s;
    }
    .primary-btn:hover { transform: scale(1.05); }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="game-card">
    <div id="start-screen" class="screen-overlay">
      <h1 style="font-size: 42px; margin: 0;">FlashRecall</h1>
      <p style="color: var(--muted); margin-bottom: 30px;">Identify the image categories.</p>
      <button class="primary-btn" onclick="initGame()">Start Game</button>
    </div>

    <div id="end-screen" class="screen-overlay hidden">
      <h2 style="font-size: 32px;">Results</h2>
      <p id="final-stats" style="font-size: 24px; margin: 20px 0;"></p>
      <button class="primary-btn" onclick="initGame()">Try Again</button>
    </div>

    <div class="header">
      <div class="badge" id="round-indicator">ROUND 1/10</div>
      <div style="font-weight: 600;">Score: <span id="score-val" style="color: var(--accent)">0</span></div>
    </div>

    <div class="img-container">
      <img id="display-img" src="" style="opacity: 0;" />
    </div>

    <div class="options-grid" id="options-container"></div>
  </div>

  <script>
    const IMAGES = [
      { name: "Lion", url: "https://images.unsplash.com/photo-1546182990-dffeafbe841d?w=600&q=80" },
      { name: "Eiffel Tower", url: "https://images.unsplash.com/photo-1511739001486-6bfe10ce785f?w=600&q=80" },
      { name: "Pizza", url: "https://images.unsplash.com/photo-1513104890138-7c749659a591?w=600&q=80" },
      { name: "Space", url: "https://images.unsplash.com/photo-1446776811953-b23d57bd21aa?w=600&q=80" },
      { name: "Ocean", url: "https://images.unsplash.com/photo-1505118380757-91f5f45d8de4?w=600&q=80" },
      { name: "Mountain", url: "https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?w=600&q=80" },
      { name: "Coffee", url: "https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?w=600&q=80" },
      { name: "Forest", url: "https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=600&q=80" },
      { name: "Elephant", url: "https://images.unsplash.com/photo-1557050543-4d5f4e07ef46?w=600&q=80" },
      { name: "Cityscape", url: "https://images.unsplash.com/photo-1477959858617-67f85cf4f1df?w=600&q=80" }
    ];

    let state = { score: 0, round: 0, current: null, shuffled: [] };

    function initGame() {
      state = { score: 0, round: 0, shuffled: [...IMAGES].sort(() => Math.random() - 0.5) };
      document.getElementById('start-screen').classList.add('hidden');
      document.getElementById('end-screen').classList.add('hidden');
      document.getElementById('score-val').textContent = "0";
      loadRound();
    }

    function loadRound() {
      if (state.round >= 10) return finishGame();
      state.current = state.shuffled[state.round];
      document.getElementById('round-indicator').textContent = `ROUND ${state.round + 1}/10`;
      const img = document.getElementById('display-img');
      img.style.opacity = '0';
      setTimeout(() => { img.src = state.current.url; img.onload = () => img.style.opacity = '1'; }, 50);

      let opts = [state.current.name];
      while (opts.length < 4) {
        const r = IMAGES[Math.floor(Math.random() * IMAGES.length)].name;
        if (!opts.includes(r)) opts.push(r);
      }
      opts.sort(() => Math.random() - 0.5);

      const container = document.getElementById('options-container');
      container.innerHTML = '';
      opts.forEach(o => {
        const b = document.createElement('button');
        b.className = 'opt-btn';
        b.textContent = o;
        b.onclick = () => {
          document.querySelectorAll('.opt-btn').forEach(btn => btn.disabled = true);
          if (o === state.current.name) {
            state.score++;
            b.classList.add('correct');
            document.getElementById('score-val').textContent = state.score;
          } else {
            b.classList.add('wrong');
            Array.from(container.children).find(x => x.textContent === state.current.name).classList.add('correct');
          }
          setTimeout(() => { state.round++; loadRound(); }, 1200);
        };
        container.appendChild(b);
      });
    }

    function finishGame() {
      document.getElementById('end-screen').classList.remove('hidden');
      document.getElementById('final-stats').textContent = `Correct: ${state.score} / 10`;
    }
  </script>
</body>
</html>
