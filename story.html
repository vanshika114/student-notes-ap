<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Story Weaver — Creative Tales</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Quicksand:wght@500;700&display=swap');

        :root {
            --primary: #a78bfa;
            --secondary: #ff85a2;
            --bg: #fff5f7;
            --text: #4b5563;
            --text-muted: #9ca3af;
            --glass: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(255, 255, 255, 0.8);
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background: linear-gradient(135deg, #f3e8ff 0%, #fff5f7 100%);
            color: var(--text);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .container { max-width: 700px; width: 100%; }

        header { text-align: center; margin-bottom: 30px; }
        header h1 { font-family: 'Inter', sans-serif; font-weight: 800; font-size: 2.5rem; color: var(--primary); margin: 0; }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(12px);
            border: 2px solid var(--glass-border);
            padding: 24px;
            border-radius: 28px;
            box-shadow: 0 10px 25px rgba(167, 139, 250, 0.1);
            margin-bottom: 24px;
        }

        .story-display {
            min-height: 200px;
            max-height: 400px;
            overflow-y: auto;
            padding: 20px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 20px;
            margin-bottom: 20px;
            line-height: 1.8;
            font-size: 1.1rem;
        }

        .sentence-user { color: var(--text); font-weight: 500; }
        .sentence-bot { color: var(--primary); font-style: italic; }

        textarea {
            width: 100%;
            padding: 15px;
            border-radius: 18px;
            border: 2px solid transparent;
            background: white;
            font-family: inherit;
            font-size: 1rem;
            resize: none;
            outline: none;
            transition: 0.3s;
            box-sizing: border-box;
        }

        textarea:focus { border-color: var(--primary); }

        .controls { display: flex; gap: 10px; margin-top: 15px; }

        .btn {
            padding: 12px 24px;
            border-radius: 15px;
            border: none;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            flex: 1;
        }

        .btn-primary { background: var(--primary); color: white; }
        .btn-secondary { background: var(--secondary); color: white; }
        .btn:hover { transform: translateY(-2px); opacity: 0.9; }

        .history-item {
            padding: 15px;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            cursor: pointer;
        }
        .history-item:last-child { border-bottom: none; }

        .ending-choice {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-top: 20px;
        }

        .hidden { display: none !important; }
        .typing-indicator { font-size: 0.8rem; color: var(--text-muted); margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Story Weaver ✍️</h1>
        <p>Collaborate with the Bot to write magic</p>
    </header>

    <div id="game-view">
        <div class="glass-card">
            <div class="story-display" id="storyBox"></div>
            <div id="bot-status" class="typing-indicator hidden">Story Bot is thinking...</div>
            
            <div id="input-area">
                <textarea id="userInput" rows="3" placeholder="Add the next sentence to the story..."></textarea>
                <div class="controls">
                    <button class="btn btn-primary" onclick="submitSentence()">Send Sentence</button>
                    <button class="btn btn-secondary" onclick="showEndingChoices()">Finish Story</button>
                </div>
            </div>

            <div id="ending-area" class="hidden">
                <p style="text-align: center; font-weight: 700;">How should it end?</p>
                <div class="ending-choice">
                    <button class="btn btn-primary" onclick="wrapUp('happy')">Happy ☀️</button>
                    <button class="btn btn-secondary" onclick="wrapUp('mystery')">Mystery 🌙</button>
                    <button class="btn btn-primary" style="background: #4b5563" onclick="wrapUp('drama')">Drama 🔥</button>
                </div>
            </div>
        </div>
    </div>

    <div class="glass-card">
        <h3>Saved Stories 📚</h3>
        <div id="savedStories"></div>
    </div>
</div>

<script>
    const STARTERS = [
        "A tiny clockwork dragon sat on the library shelf, waiting for its owner.",
        "The moon turned a bright shade of teal, and suddenly everyone could hear each other's thoughts.",
        "In a city where it only rained neon light, a detective found a real umbrella."
    ];

    const BOT_RESPONSES = [
        "Suddenly, a strange whistling sound echoed from the distance.",
        "A shimmering portal flickered into existence right before their eyes.",
        "Without warning, the gravity in the room shifted, sending books flying.",
        "A cat wearing a top hat stepped out from the shadows and winked.",
        "The air grew cold, and the smell of jasmine filled the hallway."
    ];

    const ENDINGS = {
        happy: "And so, with a smile, they realized that the greatest adventure was only just beginning.",
        mystery: "But as the dust settled, the mysterious key was gone, leaving only a faint trail of stardust.",
        drama: "The choice was made, and the world would never be the same again, for better or for worse."
    };

    let currentStory = [];
    let savedStories = JSON.parse(localStorage.getItem('weaver_stories')) || [];

    function init() {
        const starter = STARTERS[Math.floor(Math.random() * STARTERS.length)];
        currentStory = [{ text: starter, type: 'bot' }];
        renderStory();
        renderHistory();
    }

    function renderStory() {
        const box = document.getElementById('storyBox');
        box.innerHTML = currentStory.map(s => 
            `<span class="sentence-${s.type}">${s.text} </span>`
        ).join('');
        box.scrollTop = box.scrollHeight;
    }

    function submitSentence() {
        const input = document.getElementById('userInput');
        const text = input.value.trim();
        if (!text) return;

        currentStory.push({ text: text, type: 'user' });
        input.value = '';
        renderStory();

        // Bot turn
        document.getElementById('bot-status').classList.remove('hidden');
        setTimeout(() => {
            const response = BOT_RESPONSES[Math.floor(Math.random() * BOT_RESPONSES.length)];
            currentStory.push({ text: response, type: 'bot' });
            document.getElementById('bot-status').classList.add('hidden');
            renderStory();
        }, 1500);
    }

    function showEndingChoices() {
        document.getElementById('input-area').classList.add('hidden');
        document.getElementById('ending-area').classList.remove('hidden');
    }

    function wrapUp(style) {
        currentStory.push({ text: ENDINGS[style], type: 'bot' });
        renderStory();

        // Save logic
        const fullText = currentStory.map(s => s.text).join(' ');
        const storyObj = {
            id: Date.now(),
            content: fullText,
            date: new Date().toLocaleDateString()
        };
        
        savedStories.unshift(storyObj);
        localStorage.setItem('weaver_stories', JSON.stringify(savedStories));
        
        renderHistory();
        
        // Reset UI after a delay
        setTimeout(() => {
            alert("Story Saved to your collection! ✨");
            document.getElementById('input-area').classList.remove('hidden');
            document.getElementById('ending-area').classList.add('hidden');
            init();
        }, 1000);
    }

    function renderHistory() {
        const list = document.getElementById('savedStories');
        if (savedStories.length === 0) {
            list.innerHTML = '<p style="color: var(--text-muted); font-size: 0.9rem;">No stories yet. Start writing!</p>';
            return;
        }
        
        list.innerHTML = savedStories.map(s => `
            <div class="history-item">
                <div style="font-size: 0.8rem; color: var(--primary); font-weight: 700;">${s.date}</div>
                <div style="font-size: 0.9rem; margin-top: 5px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">
                    ${s.content}
                </div>
            </div>
        `).join('');
    }

    init();
</script>
</body>
</html>
