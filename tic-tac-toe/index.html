<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GRID — Tic Tac Toe</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- Scanline overlay -->
  <div class="scanlines"></div>

  <!-- Grid background -->
  <div class="bg-grid"></div>

  <!-- Vignette -->
  <div class="vignette"></div>

  <div class="app">

    <!-- Title -->
    <header class="header">
      <div class="header__eyebrow">
        <span class="dot dot--x"></span>
        <span class="eyebrow-text">ARCADE v2.0</span>
        <span class="dot dot--o"></span>
      </div>
      <h1 class="title" data-text="GRID">GRID</h1>
      <p class="subtitle">TIC · TAC · TOE</p>
    </header>

    <!-- Mode Toggle -->
    <div class="mode-row">
      <button class="mode-btn active" id="pvpBtn" data-mode="pvp">
        <span class="mode-btn__icon">⚔</span>
        <span>2 Players</span>
      </button>
      <button class="mode-btn" id="aiBtn" data-mode="ai">
        <span class="mode-btn__icon">◈</span>
        <span>vs AI</span>
      </button>
    </div>

    <!-- Score Board -->
    <div class="scoreboard">
      <div class="score-block score-block--x" id="scoreX">
        <span class="score-block__sym">X</span>
        <span class="score-block__name" id="nameX">PLAYER 1</span>
        <span class="score-block__val" id="valX">0</span>
      </div>
      <div class="score-block score-block--draw">
        <span class="score-block__sym">=</span>
        <span class="score-block__name">DRAWS</span>
        <span class="score-block__val" id="valDraw">0</span>
      </div>
      <div class="score-block score-block--o" id="scoreO">
        <span class="score-block__sym">O</span>
        <span class="score-block__name" id="nameO">PLAYER 2</span>
        <span class="score-block__val" id="valO">0</span>
      </div>
    </div>

    <!-- Turn Indicator -->
    <div class="turn-bar">
      <div class="turn-indicator" id="turnIndicator">
        <span class="turn-indicator__sym" id="turnSym">X</span>
        <span class="turn-indicator__text" id="turnText">PLAYER 1'S TURN</span>
      </div>
    </div>

    <!-- Board -->
    <div class="board-container">
      <div class="board" id="board">
        <!-- 9 cells rendered by JS -->
      </div>
      <!-- Win line overlay -->
      <svg class="win-line-svg" id="winLineSvg" viewBox="0 0 3 3" xmlns="http://www.w3.org/2000/svg">
        <line id="winLine" x1="0" y1="0" x2="0" y2="0" />
      </svg>
    </div>

    <!-- Controls -->
    <div class="controls">
      <button class="ctrl-btn ctrl-btn--ghost" id="resetRoundBtn">New Round</button>
      <button class="ctrl-btn ctrl-btn--ghost ctrl-btn--danger" id="resetAllBtn">Reset All</button>
    </div>

  </div>

  <!-- Result Overlay -->
  <div class="result-overlay" id="resultOverlay">
    <div class="result-box" id="resultBox">
      <div class="result-box__glitch" id="resultGlitch"></div>
      <div class="result-sym" id="resultSym"></div>
      <p class="result-label" id="resultLabel"></p>
      <p class="result-sub" id="resultSub"></p>
      <button class="ctrl-btn ctrl-btn--solid" id="nextRoundBtn">NEXT ROUND</button>
    </div>
  </div>

  <!-- Particle layer -->
  <div id="particles" class="particles"></div>

  <script src="app.js"></script>
</body>
</html>
