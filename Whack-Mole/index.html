<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Whack-Mole</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ─── Scorecard ─── -->
  <header class="scorecard">
    <div class="stat-block">
      <span class="stat-label">Points</span>
      <span class="stat-value" id="points">0</span>
    </div>
    <div class="stat-block">
      <span class="stat-label">Combo</span>
      <span class="stat-value accent" id="combo">×1</span>
    </div>
    <div class="stat-block timer-block">
      <div class="timer-bar" id="timer-bar"></div>
    </div>
    <div class="stat-block">
      <span class="stat-label">Best</span>
      <span class="stat-value" id="high-score">0</span>
    </div>
  </header>

  <!-- ─── Field ─── -->
  <main class="field">
    <div class="grid" id="grid">
      <div class="hole" data-index="0"></div>
      <div class="hole" data-index="1"></div>
      <div class="hole" data-index="2"></div>
      <div class="hole" data-index="3"></div>
      <div class="hole" data-index="4"></div>
      <div class="hole" data-index="5"></div>
      <div class="hole" data-index="6"></div>
      <div class="hole" data-index="7"></div>
      <div class="hole" data-index="8"></div>
    </div>
  </main>

  <!-- ─── Floating combo text container ─── -->
  <div class="float-container" id="float-container"></div>

  <!-- ─── Controls ─── -->
  <div class="controls">
    <button class="btn-control primary" id="btn-start">▶ Start Round</button>
  </div>

  <!-- ─── Game Over Overlay ─── -->
  <div class="game-over" id="game-over">
    <div class="go-card">
      <h2 class="go-title">GAME OVER</h2>
      <div class="go-stats">
        <div class="go-row"><span>Final Score</span><span id="go-score">0</span></div>
        <div class="go-row"><span>Best Score</span><span id="go-best">0</span></div>
      </div>
      <button class="btn-restart" id="btn-restart">⟳ Play Again</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
