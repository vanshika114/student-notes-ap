<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <rect width="128" height="128" rx="16" fill="#070a13"/>
  <!-- Scorecard strip -->
  <g transform="translate(8,6)">
    <rect x="0" y="0" width="112" height="14" rx="7" fill="rgba(30,41,59,0.4)" stroke="rgba(51,65,85,0.3)" stroke-width="0.5"/>
    <text x="10" y="5" font-size="3.5" fill="#475569" font-family="sans-serif" letter-spacing="1">POINTS</text>
    <text x="8" y="12" font-size="8" fill="#e2e8f0" font-weight="700" font-family="sans-serif">1280</text>
    <text x="44" y="5" font-size="3.5" fill="#475569" font-family="sans-serif" letter-spacing="1">COMBO</text>
    <text x="44" y="12" font-size="8" fill="#d946ef" font-weight="700" font-family="sans-serif">×7</text>
    <!-- Timer bar bg -->
    <rect x="78" y="3" width="28" height="4" rx="2" fill="rgba(255,255,255,0.06)"/>
    <rect x="78" y="3" width="20" height="4" rx="2" fill="#06b6d4"/>
    <!-- Best -->
    <text x="78" y="11" font-size="3.5" fill="#475569" font-family="sans-serif" letter-spacing="1">BEST</text>
    <text x="98" y="12" font-size="6" fill="#e2e8f0" font-weight="700" font-family="sans-serif">2K</text>
  </g>
  <!-- 3x3 Grid -->
  <g transform="translate(14,26)">
    <!-- Row 1: 3 holes -->
    <circle cx="16" cy="16" r="15" fill="rgba(15,23,42,0.7)" stroke="rgba(51,65,85,0.3)" stroke-width="0.8"/>
    <circle cx="16" cy="16" r="10" fill="rgba(30,41,59,0.5)" stroke="#06b6d4" stroke-width="1.2"/>
    <circle cx="16" cy="16" r="6" fill="#d946ef" opacity="0.4"/>

    <circle cx="50" cy="16" r="15" fill="rgba(15,23,42,0.7)" stroke="rgba(51,65,85,0.3)" stroke-width="0.8"/>
    <circle cx="50" cy="16" r="10" fill="rgba(30,41,59,0.5)" stroke="rgba(51,65,85,0.3)" stroke-width="0.8"/>
    <!-- Mole up -->
    <circle cx="50" cy="10" r="7" fill="rgba(30,41,59,0.6)" stroke="#06b6d4" stroke-width="1.2"/>
    <text x="50" y="11" font-size="6" fill="#e2e8f0" text-anchor="middle" font-family="sans-serif">🐭</text>

    <circle cx="84" cy="16" r="15" fill="rgba(15,23,42,0.7)" stroke="rgba(51,65,85,0.3)" stroke-width="0.8"/>
    <circle cx="84" cy="16" r="10" fill="rgba(30,41,59,0.5)" stroke="rgba(51,65,85,0.3)" stroke-width="0.8"/>

    <!-- Row 2 -->
    <circle cx="16" cy="50" r="15" fill="rgba(15,23,42,0.7)" stroke="rgba(51,65,85,0.3)" stroke-width="0.8"/>
    <circle cx="16" cy="50" r="10" fill="rgba(30,41,59,0.5)" stroke="rgba(51,65,85,0.3)" stroke-width="0.8"/>

    <circle cx="50" cy="50" r="15" fill="rgba(15,23,42,0.7)" stroke="rgba(51,65,85,0.3)" stroke-width="0.8"/>
    <circle cx="50" cy="50" r="10" fill="rgba(30,41,59,0.5)" stroke="rgba(51,65,85,0.3)" stroke-width="0.8"/>

    <circle cx="84" cy="50" r="15" fill="rgba(15,23,42,0.7)" stroke="rgba(51,65,85,0.3)" stroke-width="0.8"/>
    <circle cx="84" cy="50" r="10" fill="rgba(30,41,59,0.5)" stroke="rgba(51,65,85,0.3)" stroke-width="0.8"/>

    <!-- Row 3 -->
    <circle cx="16" cy="84" r="15" fill="rgba(15,23,42,0.7)" stroke="rgba(51,65,85,0.3)" stroke-width="0.8"/>
    <circle cx="16" cy="84" r="10" fill="rgba(30,41,59,0.5)" stroke="rgba(51,65,85,0.3)" stroke-width="0.8"/>

    <circle cx="50" cy="84" r="15" fill="rgba(15,23,42,0.7)" stroke="rgba(51,65,85,0.3)" stroke-width="0.8"/>
    <circle cx="50" cy="84" r="10" fill="rgba(30,41,59,0.5)" stroke="rgba(51,65,85,0.3)" stroke-width="0.8"/>

    <circle cx="84" cy="84" r="15" fill="rgba(15,23,42,0.7)" stroke="rgba(51,65,85,0.3)" stroke-width="0.8"/>
    <circle cx="84" cy="84" r="10" fill="rgba(30,41,59,0.5)" stroke="rgba(51,65,85,0.3)" stroke-width="0.8"/>
  </g>
  <!-- Floating combo text -->
  <text x="50" y="120" font-size="5" fill="#d946ef" text-anchor="middle" font-family="sans-serif" opacity="0.8">+10  ×7</text>
</svg>
