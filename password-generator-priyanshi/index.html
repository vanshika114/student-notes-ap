<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Password Generator</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <div class="container">
    <h1>Password Generator</h1>
    <div class="output-box">
      <span id="password">Click Generate</span>
      <button class="copy-btn" onclick="copyPassword()" title="Copy">⎘</button>
    </div>
    <div id="copy-msg" class="copy-msg">Copied!</div>
    <div class="strength-bar">
      <div class="strength-fill" id="strength-fill"></div>
    </div>
    <p class="strength-label" id="strength-label">—</p>
    <div class="controls">
      <div class="control-row">
        <label>Length: <span id="len-val">16</span></label>
        <input type="range" min="6" max="32" value="16" id="length" oninput="updateLength()"/>
      </div>
      <div class="control-row">
        <label>Uppercase (A-Z)</label>
        <input type="checkbox" id="upper" checked/>
      </div>
      <div class="control-row">
        <label>Lowercase (a-z)</label>
        <input type="checkbox" id="lower" checked/>
      </div>
      <div class="control-row">
        <label>Numbers (0-9)</label>
        <input type="checkbox" id="numbers" checked/>
      </div>
      <div class="control-row">
        <label>Symbols (!@#$)</label>
        <input type="checkbox" id="symbols"/>
      </div>
    </div>
    <button class="gen-btn" onclick="generatePassword()">Generate Password</button>
  </div>
  <script src="script.js"></script>
</body>
</html>
