<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Quiz App</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <div class="container">
    <div id="quiz-box">
      <div class="progress-bar"><div class="progress" id="progress"></div></div>
      <p class="question-count" id="question-count">Question 1 of 5</p>
      <h2 class="question" id="question">Loading...</h2>
      <div class="options" id="options"></div>
      <button class="next-btn" id="next-btn" onclick="nextQuestion()">Next →</button>
    </div>
    <div id="result-box" class="hidden">
      <div class="trophy">🏆</div>
      <h2>Quiz Complete!</h2>
      <p class="score-text" id="score-text"></p>
      <p class="score-msg" id="score-msg"></p>
      <button class="restart-btn" onclick="restartQuiz()">Play Again</button>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
