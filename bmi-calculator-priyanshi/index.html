<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BMI Calculator</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <div class="container">
    <h1>BMI Calculator</h1>
    <div class="unit-toggle">
      <button class="unit-btn active" id="metricBtn" onclick="setUnit('metric')">Metric (kg/cm)</button>
      <button class="unit-btn" id="imperialBtn" onclick="setUnit('imperial')">Imperial (lb/in)</button>
    </div>
    <div class="form-group">
      <label id="weightLabel">Weight (kg)</label>
      <input type="number" id="weight" placeholder="Enter weight" min="1"/>
    </div>
    <div class="form-group">
      <label id="heightLabel">Height (cm)</label>
      <input type="number" id="height" placeholder="Enter height" min="1"/>
    </div>
    <button class="calc-btn" onclick="calculateBMI()">Calculate BMI</button>
    <div class="result" id="result">
      <div class="bmi-value" id="bmiValue">--</div>
      <div class="bmi-category" id="bmiCategory">Enter your details</div>
      <div class="bmi-bar">
        <div class="bmi-indicator" id="bmiIndicator"></div>
      </div>
      <div class="bmi-scale">
        <span>Underweight</span>
        <span>Normal</span>
        <span>Overweight</span>
        <span>Obese</span>
      </div>
    </div>
    <div class="info-cards">
      <div class="info-card underweight">
        <h3>Underweight</h3>
        <p>BMI &lt; 18.5</p>
      </div>
      <div class="info-card normal">
        <h3>Normal</h3>
        <p>18.5 - 24.9</p>
      </div>
      <div class="info-card overweight">
        <h3>Overweight</h3>
        <p>25 - 29.9</p>
      </div>
      <div class="info-card obese">
        <h3>Obese</h3>
        <p>BMI ≥ 30</p>
      </div>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
