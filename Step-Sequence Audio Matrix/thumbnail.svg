<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <rect width="128" height="128" rx="16" fill="#0b0d13"/>
  <!-- Toolbar -->
  <g transform="translate(6,5)">
    <rect x="0" y="0" width="116" height="16" rx="8" fill="rgba(255,255,255,0.02)" stroke="rgba(51,65,85,0.15)" stroke-width="0.5"/>
    <rect x="6" y="3" width="24" height="10" rx="5" fill="#8b5cf6"/>
    <text x="18" y="10" font-size="5" fill="#fff" text-anchor="middle" font-family="monospace">▶</text>
    <text x="44" y="6" font-size="3" fill="#475569" font-family="monospace" letter-spacing="1">BPM</text>
    <rect x="52" y="4" width="24" height="2" rx="1" fill="rgba(51,65,85,0.3)"/>
    <circle cx="70" cy="5" r="3" fill="#8b5cf6"/>
    <text x="84" y="6" font-size="5" fill="#e2e8f0" font-family="monospace" font-weight="700">120</text>
    <text x="100" y="6" font-size="4" fill="#475569" font-family="monospace">✕</text>
  </g>
  <!-- Grid 4x16 -->
  <g transform="translate(6,26)">
    <rect x="0" y="0" width="116" height="76" rx="6" fill="rgba(255,255,255,0.02)" stroke="rgba(51,65,85,0.15)" stroke-width="0.5"/>
    <!-- Row labels -->
    <text x="6" y="12" font-size="3" fill="#475569" font-family="monospace">Kick</text>
    <text x="6" y="27" font-size="3" fill="#475569" font-family="monospace">Snare</text>
    <text x="6" y="42" font-size="3" fill="#475569" font-family="monospace">HHat</text>
    <text x="6" y="57" font-size="3" fill="#475569" font-family="monospace">Synth</text>
    <!-- Active cells (example pattern) -->
    <rect x="24" y="4" width="5" height="5" rx="1.5" fill="#8b5cf6"/>
    <rect x="82" y="4" width="5" height="5" rx="1.5" fill="#8b5cf6"/>
    <rect x="41" y="19" width="5" height="5" rx="1.5" fill="#8b5cf6"/>
    <rect x="94" y="19" width="5" height="5" rx="1.5" fill="#8b5cf6"/>
    <rect x="53" y="34" width="5" height="5" rx="1.5" fill="#8b5cf6"/>
    <rect x="76" y="34" width="5" height="5" rx="1.5" fill="#8b5cf6"/>
    <rect x="106" y="34" width="5" height="5" rx="1.5" fill="#8b5cf6"/>
    <rect x="30" y="49" width="5" height="5" rx="1.5" fill="#8b5cf6"/>
    <rect x="88" y="49" width="5" height="5" rx="1.5" fill="#8b5cf6"/>
    <!-- Inactive cells (some) -->
    <rect x="53" y="4" width="5" height="5" rx="1.5" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.04)" stroke-width="0.3"/>
    <rect x="65" y="4" width="5" height="5" rx="1.5" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.04)" stroke-width="0.3"/>
    <rect x="71" y="19" width="5" height="5" rx="1.5" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.04)" stroke-width="0.3"/>
    <rect x="59" y="34" width="5" height="5" rx="1.5" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.04)" stroke-width="0.3"/>
    <rect x="36" y="49" width="5" height="5" rx="1.5" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.04)" stroke-width="0.3"/>
    <!-- Playhead -->
    <line x1="52" y1="2" x2="52" y2="70" stroke="#06b6d4" stroke-width="1.5" opacity="0.8"/>
  </g>
  <!-- Step numbers -->
  <g transform="translate(6,104)">
    <text x="18" y="3" font-size="2.5" fill="#475569" font-family="monospace">1</text>
    <text x="30" y="3" font-size="2.5" fill="#475569" font-family="monospace">3</text>
    <text x="42" y="3" font-size="2.5" fill="#475569" font-family="monospace">5</text>
    <text x="54" y="3" font-size="2.5" fill="#475569" font-family="monospace">7</text>
    <text x="66" y="3" font-size="2.5" fill="#475569" font-family="monospace">9</text>
    <text x="78" y="3" font-size="2.5" fill="#475569" font-family="monospace">11</text>
    <text x="90" y="3" font-size="2.5" fill="#475569" font-family="monospace">13</text>
    <text x="102" y="3" font-size="2.5" fill="#475569" font-family="monospace">15</text>
  </g>
</svg>
