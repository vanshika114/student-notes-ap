<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Step-Sequence Audio Matrix</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="app">

    <!-- ─── Toolbar ─── -->
    <header class="toolbar">
      <button class="tb-btn primary" id="play-btn">▶ Play</button>
      <div class="bpm-group">
        <label class="bpm-label">BPM</label>
        <input type="range" class="bpm-slider" id="bpm-slider" min="60" max="180" value="120" step="1" />
        <span class="bpm-value" id="bpm-display">120</span>
      </div>
      <button class="tb-btn" id="clear-btn">✕ Clear</button>
    </header>

    <!-- ─── Grid container ─── -->
    <div class="grid-wrap">
      <!-- Playhead line (visually overlaid) -->
      <div class="playhead" id="playhead"></div>

      <!-- 4 rows × 16 cells -->
      <div class="grid" id="grid">
        <!-- Row 0 — Kick -->
        <div class="row-label">Kick</div>
        <div class="cells" data-row="0"></div>
        <!-- Row 1 — Snare -->
        <div class="row-label">Snare</div>
        <div class="cells" data-row="1"></div>
        <!-- Row 2 — Hi-Hat -->
        <div class="row-label">Hi‑Hat</div>
        <div class="cells" data-row="2"></div>
        <!-- Row 3 — Synth -->
        <div class="row-label">Synth</div>
        <div class="cells" data-row="3"></div>
      </div>

      <!-- Step indicators -->
      <div class="step-bar">
        <span class="step-num" data-s="0">1</span>
        <span class="step-num" data-s="1">2</span>
        <span class="step-num" data-s="2">3</span>
        <span class="step-num" data-s="3">4</span>
        <span class="step-num" data-s="4">5</span>
        <span class="step-num" data-s="5">6</span>
        <span class="step-num" data-s="6">7</span>
        <span class="step-num" data-s="7">8</span>
        <span class="step-num" data-s="8">9</span>
        <span class="step-num" data-s="9">10</span>
        <span class="step-num" data-s="10">11</span>
        <span class="step-num" data-s="11">12</span>
        <span class="step-num" data-s="12">13</span>
        <span class="step-num" data-s="13">14</span>
        <span class="step-num" data-s="14">15</span>
        <span class="step-num" data-s="15">16</span>
      </div>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
