<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kinetic Typography Canvas</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <div id="console">
      <div class="cgroup">
        <label class="clbl">TEXT</label>
        <div class="cinput">
          <input type="text" id="textInput" value="The quick brown fox jumps over the lazy dog" spellcheck="false">
          <button id="applyBtn">APPLY</button>
        </div>
      </div>
      <div class="cgroup">
        <label class="clbl">RADIUS</label>
        <input type="range" id="radiusSlider" min="20" max="250" value="110">
        <span class="cval" id="radiusVal">110px</span>
      </div>
      <div class="cgroup">
        <label class="clbl">INTENSITY</label>
        <input type="range" id="intensitySlider" min="0.1" max="3" step="0.05" value="1.2">
        <span class="cval" id="intensityVal">1.2x</span>
      </div>
      <div class="cgroup">
        <label class="clbl">PRESET</label>
        <select id="presetSelect">
          <option value="The quick brown fox jumps over the lazy dog">Pangram</option>
          <option value="Hello, World! This is kinetic typography.">Hello World</option>
          <option value="Make it dance, make it move, make it groove!">Make it Dance</option>
          <option value="In the beginning there was the word.">The Word</option>
          <option value="Code is poetry in motion.">Code Poetry</option>
          <option value="Almost before we knew it, we had left the ground.">Leave Ground</option>
        </select>
      </div>
    </div>

    <div id="viewport">
      <div id="kineticBody"></div>
    </div>

    <div id="diag">
      <span>CHARS: <span id="dChars">0</span></span>
      <span>ACTIVE: <span id="dActive">0</span></span>
      <span>POS: <span id="dPos">--, --</span></span>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
