<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app">
      <header class="header">
        <h1>Quick Quiz</h1>
        <p>Test yourself with a few questions.</p>
      </header>

      <section id="quiz-card" class="quiz-card">
        <p id="progress" class="progress">Question 1 of 3</p>
        <h2 id="question">What does HTML stand for?</h2>
        <div id="answers" class="answers"></div>
      </section>

      <section id="result" class="result" hidden>
        <h2>Your score</h2>
        <p>
          <span id="score">0</span> / <span id="total">0</span>
        </p>
        <button id="restart" type="button">Restart quiz</button>
      </section>
    </main>
    <script src="script.js"></script>
  </body>
</html>
