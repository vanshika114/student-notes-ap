<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pagination UI</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="hero">
      <p class="eyebrow">UI Pattern</p>
      <h1>Pagination Component</h1>
      <p class="subtext">
        Navigate through content with a clean, accessible pagination control.
      </p>
    </header>

    <main class="page">
      <section class="card">
        <div class="list" id="itemList"></div>
      </section>

      <nav class="pagination" aria-label="Pagination controls">
        <button class="nav-btn" id="prevBtn" type="button">Prev</button>
        <div class="pages" id="pageButtons"></div>
        <button class="nav-btn" id="nextBtn" type="button">Next</button>
      </nav>
      <p class="meta" id="pageMeta">Page 1 of 1</p>
    </main>

    <script src="script.js"></script>
  </body>
</html>
