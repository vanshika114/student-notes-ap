<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Assignment Deadline Tracker</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      min-height:100vh; font-family:'Poppins',sans-serif;
      background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);
      padding:1.5rem 1rem; display:flex; flex-direction:column; align-items:center;
    }
    .header { text-align:center; margin-bottom:1.8rem; }
    .header h1 { font-size:clamp(1.5rem,4vw,2rem); font-weight:700; color:#fff; }
    .header h1 span { color:#fd79a8; }
    .header p { font-size:0.78rem; color:rgba(255,255,255,0.35); margin-top:0.3rem; }

    .wrapper { width:100%; max-width:680px; display:flex; flex-direction:column; gap:1.2rem; }

    .card {
      background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.1);
      border-radius:20px; padding:1.5rem;
    }
    .card h2 { font-size:0.85rem; font-weight:600; color:rgba(255,255,255,0.5);
      text-transform:uppercase; letter-spacing:0.08em; margin-bottom:1.2rem; }

    /* Stats */
    .stats { display:grid; grid-template-columns:repeat(4,1fr); gap:0.7rem; margin-bottom:1.2rem; }
    .stat { background:rgba(255,255,255,0.05); border-radius:12px; padding:0.8rem; text-align:center; }
    .stat .val { font-size:1.4rem; font-weight:700; color:#fd79a8; }
    .stat .lbl { font-size:0.62rem; color:rgba(255,255,255,0.35); text-transform:uppercase; letter-spacing:0.06em; }
    .stat.done .val { color:#00b894; }
    .stat.overdue .val { color:#e17055; }
    .stat.pending .val { color:#fdcb6e; }

    /* Add form */
    .form-grid { display:grid; grid-template-columns:1fr 1fr; gap:0.6rem; margin-bottom:0.8rem; }
    .inp {
      padding:0.65rem 1rem; border-radius:10px;
      border:1px solid rgba(255,255,255,0.1); background:rgba(255,255,255,0.07);
      color:#fff; font-family:'Poppins',sans-serif; font-size:0.82rem; outline:none;
    }
    .inp:focus { border-color:#fd79a8; }
    .inp::placeholder { color:rgba(255,255,255,0.25); }
    select.inp { cursor:pointer; }
    .full { grid-column:1/-1; }
    .add-btn {
      width:100%; padding:0.75rem; border-radius:12px; border:none;
      background:linear-gradient(135deg,#fd79a8,#e84393); color:#fff;
      font-family:'Poppins',sans-serif; font-weight:700; font-size:0.9rem;
      cursor:pointer; transition:transform 0.15s;
    }
    .add-btn:active { transform:scale(0.98); }

    /* Filters */
    .filters { display:flex; gap:0.5rem; flex-wrap:wrap; margin-bottom:1rem; }
    .filter-btn {
      padding:0.3rem 0.9rem; border-radius:999px; border:1px solid rgba(255,255,255,0.12);
      background:rgba(255,255,255,0.06); color:rgba(255,255,255,0.5);
      font-size:0.72rem; font-family:'Poppins',sans-serif; cursor:pointer; transition:all 0.2s;
    }
    .filter-btn.active { background:#fd79a8; border-color:#fd79a8; color:#fff; font-weight:600; }

    /* Assignment cards */
    .assignment {
      background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.08);
      border-radius:14px; padding:1rem 1.2rem; margin-bottom:0.7rem;
      transition:transform 0.15s;
    }
    .assignment:hover { transform:translateY(-1px); }
    .assignment.overdue { border-color:rgba(225,112,85,0.4); background:rgba(225,112,85,0.06); }
    .assignment.done    { opacity:0.5; }
    .assignment.done .assign-name { text-decoration:line-through; }

    .assign-top { display:flex; align-items:center; gap:0.8rem; margin-bottom:0.6rem; }
    .assign-name { font-size:0.92rem; font-weight:600; color:#fff; flex:1; }
    .priority-dot {
      width:8px; height:8px; border-radius:50%; flex-shrink:0;
    }
    .priority-dot.high   { background:#e17055; box-shadow:0 0 6px rgba(225,112,85,0.6); }
    .priority-dot.medium { background:#fdcb6e; }
    .priority-dot.low    { background:#00b894; }

    .assign-meta { display:flex; gap:0.6rem; flex-wrap:wrap; margin-bottom:0.7rem; }
    .badge {
      font-size:0.65rem; padding:0.2rem 0.7rem; border-radius:999px;
      font-weight:600; text-transform:uppercase; letter-spacing:0.06em;
    }
    .badge.subject  { background:rgba(162,155,254,0.15); color:#a29bfe; }
    .badge.overdue  { background:rgba(225,112,85,0.2);   color:#e17055; }
    .badge.due-soon { background:rgba(253,203,110,0.2);  color:#fdcb6e; }
    .badge.on-time  { background:rgba(0,184,148,0.2);    color:#00b894; }
    .badge.done     { background:rgba(0,184,148,0.15);   color:#00b894; }
    .badge.priority-high   { background:rgba(225,112,85,0.15);  color:#e17055; }
    .badge.priority-medium { background:rgba(253,203,110,0.15); color:#fdcb6e; }
    .badge.priority-low    { background:rgba(0,184,148,0.15);   color:#00b894; }

    /* Countdown */
    .countdown {
      font-size:0.78rem; font-weight:600; color:rgba(255,255,255,0.6);
      font-variant-numeric:tabular-nums; margin-bottom:0.7rem;
    }
    .countdown.red    { color:#e17055; }
    .countdown.yellow { color:#fdcb6e; }
    .countdown.green  { color:#00b894; }

    /* Progress bar */
    .time-track { height:4px; background:rgba(255,255,255,0.07); border-radius:999px; overflow:hidden; margin-bottom:0.8rem; }
    .time-fill  { height:100%; border-radius:999px; transition:width 0.5s; }

    .assign-actions { display:flex; gap:0.5rem; }
    .action-btn {
      padding:0.35rem 0.9rem; border-radius:8px; border:none;
      font-family:'Poppins',sans-serif; font-size:0.72rem; font-weight:600;
      cursor:pointer; transition:transform 0.1s;
    }
    .action-btn:active { transform:scale(0.95); }
    .done-btn   { background:rgba(0,184,148,0.15); color:#00b894; border:1px solid rgba(0,184,148,0.3); }
    .delete-btn { background:rgba(225,112,85,0.12); color:#e17055; border:1px solid rgba(225,112,85,0.25); }

    .empty { text-align:center; color:rgba(255,255,255,0.2); padding:2rem; font-size:0.85rem; }

    .footer { text-align:center; margin-top:1rem; font-size:0.7rem; color:rgba(255,255,255,0.2); }
    .footer span { color:#fd79a8; font-weight:600; }
  </style>
</head>
<body>

  <div class="header">
    <h1>📅 Deadline <span>Tracker</span></h1>
    <p>Never miss an assignment deadline again! ⏰</p>
  </div>

  <div class="wrapper">

    <!-- Stats -->
    <div class="card">
      <div class="stats">
        <div class="stat"><div class="val" id="sTotal">0</div><div class="lbl">Total</div></div>
        <div class="stat pending"><div class="val" id="sPending">0</div><div class="lbl">Pending</div></div>
        <div class="stat done"><div class="val" id="sDone">0</div><div class="lbl">Done</div></div>
        <div class="stat overdue"><div class="val" id="sOverdue">0</div><div class="lbl">Overdue</div></div>
      </div>
    </div>

    <!-- Add Assignment -->
    <div class="card">
      <h2>➕ Add Assignment</h2>
      <div class="form-grid">
        <input class="inp full" id="aName"    placeholder="Assignment name e.g. DSA Lab Report" />
        <input class="inp"      id="aSubject" placeholder="Subject e.g. Computer Science" />
        <select class="inp" id="aPriority">
          <option value="high">🔴 High Priority</option>
          <option value="medium" selected>🟡 Medium Priority</option>
          <option value="low">🟢 Low Priority</option>
        </select>
        <input class="inp" id="aDate" type="date" />
        <input class="inp" id="aTime" type="time" value="23:59" />
      </div>
      <button class="add-btn" onclick="addAssignment()">📌 Add Assignment</button>
    </div>

    <!-- List -->
    <div class="card">
      <h2>📋 Assignments</h2>
      <div class="filters">
        <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
        <button class="filter-btn" onclick="setFilter('pending',this)">Pending</button>
        <button class="filter-btn" onclick="setFilter('done',this)">Done</button>
        <button class="filter-btn" onclick="setFilter('overdue',this)">Overdue</button>
        <button class="filter-btn" onclick="setFilter('high',this)">🔴 High</button>
      </div>
      <div id="assignmentList"></div>
    </div>

  </div>

  <div class="footer">Made with ❤️ for <span>NSoC '26</span> · Student Notes App</div>

  <script>
    let assignments = JSON.parse(localStorage.getItem('dt_assignments') || '[]');
    let filter = 'all';

    function save() { localStorage.setItem('dt_assignments', JSON.stringify(assignments)); }

    function addAssignment() {
      const name    = document.getElementById('aName').value.trim();
      const subject = document.getElementById('aSubject').value.trim();
      const date    = document.getElementById('aDate').value;
      const time    = document.getElementById('aTime').value;
      if (!name || !date) { alert('Please enter name and deadline date!'); return; }
      assignments.push({
        id: Date.now(), name, subject: subject || 'General',
        priority: document.getElementById('aPriority').value,
        deadline: new Date(`${date}T${time}`).getTime(),
        done: false
      });
      document.getElementById('aName').value = '';
      document.getElementById('aSubject').value = '';
      save(); render();
    }

    function toggleDone(id) {
      const a = assignments.find(a => a.id === id);
      if (a) a.done = !a.done;
      save(); render();
    }

    function deleteAssignment(id) {
      assignments = assignments.filter(a => a.id !== id);
      save(); render();
    }

    function setFilter(f, btn) {
      filter = f;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    }

    function getCountdown(deadline) {
      const diff = deadline - Date.now();
      if (diff <= 0) return { text:'⚠️ Overdue!', cls:'red', overdue:true };
      const d = Math.floor(diff / 86400000);
      const h = Math.floor((diff % 86400000) / 3600000);
      const m = Math.floor((diff % 3600000)  / 60000);
      const s = Math.floor((diff % 60000)    / 1000);
      if (d > 0)  return { text:`⏳ ${d}d ${h}h ${m}m left`, cls: d<=2?'yellow':'green', overdue:false };
      if (h > 0)  return { text:`⏳ ${h}h ${m}m ${s}s left`, cls:'yellow', overdue:false };
      return       { text:`🚨 ${m}m ${s}s left`, cls:'red', overdue:false };
    }

    function render() {
      const list = document.getElementById('assignmentList');
      const now  = Date.now();

      // Stats
      const total   = assignments.length;
      const done    = assignments.filter(a => a.done).length;
      const overdue = assignments.filter(a => !a.done && a.deadline < now).length;
      document.getElementById('sTotal').textContent   = total;
      document.getElementById('sPending').textContent = total - done;
      document.getElementById('sDone').textContent    = done;
      document.getElementById('sOverdue').textContent = overdue;

      // Filter
      let filtered = assignments.filter(a => {
        if (filter === 'pending') return !a.done;
        if (filter === 'done')    return a.done;
        if (filter === 'overdue') return !a.done && a.deadline < now;
        if (filter === 'high')    return a.priority === 'high';
        return true;
      });

      // Sort: overdue first, then by deadline
      filtered.sort((a,b) => {
        if (!a.done && a.deadline < now) return -1;
        if (!b.done && b.deadline < now) return 1;
        return a.deadline - b.deadline;
      });

      if (!filtered.length) { list.innerHTML = '<div class="empty">No assignments here 🎉</div>'; return; }

      list.innerHTML = filtered.map(a => {
        const cd      = getCountdown(a.deadline);
        const isOver  = !a.done && cd.overdue;
        const dStr    = new Date(a.deadline).toLocaleString('en-IN',{dateStyle:'medium',timeStyle:'short'});
        // progress: from creation (assume 7 days before) to deadline
        const total7  = 7 * 86400000;
        const elapsed = total7 - (a.deadline - now);
        const pct     = Math.min(100, Math.max(0, (elapsed / total7) * 100));
        const barColor= isOver ? '#e17055' : (pct > 80 ? '#fdcb6e' : '#00b894');
        return `
        <div class="assignment ${isOver?'overdue':''} ${a.done?'done':''}">
          <div class="assign-top">
            <div class="priority-dot ${a.priority}"></div>
            <div class="assign-name">${a.name}</div>
          </div>
          <div class="assign-meta">
            <span class="badge subject">📚 ${a.subject}</span>
            <span class="badge priority-${a.priority}">${a.priority}</span>
            ${isOver ? '<span class="badge overdue">Overdue</span>' : a.done ? '<span class="badge done">✓ Done</span>' : ''}
            <span class="badge ${isOver?'overdue':pct>80?'due-soon':'on-time'}">📅 ${dStr}</span>
          </div>
          ${!a.done ? `<div class="countdown ${cd.cls}" id="cd_${a.id}">${cd.text}</div>` : ''}
          <div class="time-track"><div class="time-fill" style="width:${pct}%;background:${barColor}"></div></div>
          <div class="assign-actions">
            <button class="action-btn done-btn" onclick="toggleDone(${a.id})">${a.done?'↩ Undo':'✓ Done'}</button>
            <button class="action-btn delete-btn" onclick="deleteAssignment(${a.id})">🗑 Delete</button>
          </div>
        </div>`;
      }).join('');
    }

    // Live countdown update
    setInterval(() => {
      assignments.filter(a => !a.done).forEach(a => {
        const el = document.getElementById(`cd_${a.id}`);
        if (el) {
          const cd = getCountdown(a.deadline);
          el.textContent = cd.text;
          el.className   = `countdown ${cd.cls}`;
        }
      });
      // Re-render stats every minute
    }, 1000);

    // Set min date to today
    document.getElementById('aDate').min = new Date().toISOString().split('T')[0];

    render();
  </script>
</body>
</html>
