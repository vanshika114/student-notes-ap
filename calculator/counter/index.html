<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Counter</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="counter-card">
      <h1>Counter</h1>
      <p class="hint">Tap the buttons to change the value.</p>
      <div class="value" id="value" aria-live="polite">0</div>
      <div class="controls">
        <button id="decrease" type="button">-</button>
        <button id="reset" type="button">Reset</button>
        <button id="increase" type="button">+</button>
      </div>
    </main>
    <script src="script.js"></script>
  </body>
</html>
