<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Color Palette</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="palette">
      <header class="header">
        <h1>Color Palette</h1>
        <p>Generate fresh color ideas and copy the hex code.</p>
      </header>

      <button id="generate" class="generate-btn" type="button">
        Generate Palette
      </button>

      <section id="swatches" class="swatches" aria-live="polite"></section>
      <p id="hint" class="hint">Click a color to copy its hex value.</p>
    </main>
    <script src="script.js"></script>
  </body>
</html>
