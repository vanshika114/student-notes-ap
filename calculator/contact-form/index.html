<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact Form</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="contact">
      <section class="card">
        <header class="header">
          <h1>Contact us</h1>
          <p>Have a question? Send a message and we'll get back to you.</p>
        </header>

        <form id="contact-form" class="form">
          <label class="field">
            Full name
            <input id="name-input" type="text" placeholder="Your name" required />
          </label>

          <label class="field">
            Email
            <input
              id="email-input"
              type="email"
              placeholder="you@example.com"
              autocomplete="email"
              required
            />
          </label>

          <label class="field">
            Subject
            <input id="subject-input" type="text" placeholder="How can we help?" required />
          </label>

          <label class="field">
            Message
            <textarea
              id="message-input"
              rows="4"
              placeholder="Write your message here..."
              required
            ></textarea>
          </label>

          <button type="submit">Send message</button>
        </form>

        <p id="status" class="status" role="status" aria-live="polite"></p>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
