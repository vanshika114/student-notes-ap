<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Notes</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app">
      <header class="header">
        <h1>Notes</h1>
        <p>Capture quick ideas and reminders.</p>
      </header>

      <form id="note-form" class="note-form">
        <input
          id="note-title"
          type="text"
          placeholder="Note title"
          aria-label="Note title"
          autocomplete="off"
        />
        <textarea
          id="note-body"
          rows="4"
          placeholder="Write your note..."
          aria-label="Note details"
          required
        ></textarea>
        <button type="submit">Add note</button>
      </form>

      <section class="stats">
        <span id="count">0</span> notes
      </section>

      <p id="empty" class="empty">No notes yet. Add your first note above.</p>
      <ul id="note-list" class="note-list" aria-live="polite"></ul>
    </main>
    <script src="script.js"></script>
  </body>
</html>
