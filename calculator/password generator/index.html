<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Password Generator</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app">
      <header class="header">
        <h1>Password Generator</h1>
        <p>Create secure passwords in seconds.</p>
      </header>

      <section class="generator">
        <div class="output">
          <input id="password" type="text" readonly aria-label="Generated password" />
          <button id="copy" type="button">Copy</button>
        </div>

        <div class="controls">
          <label>
            Length
            <input id="length" type="number" min="6" max="24" value="12" />
          </label>
          <label>
            <input id="uppercase" type="checkbox" checked />
            Uppercase
          </label>
          <label>
            <input id="numbers" type="checkbox" checked />
            Numbers
          </label>
          <label>
            <input id="symbols" type="checkbox" />
            Symbols
          </label>
        </div>

        <button id="generate" type="button" class="primary">Generate</button>
        <p id="status" class="status" aria-live="polite"></p>
      </section>
    </main>
    <script src="script.js"></script>
  </body>
</html>
