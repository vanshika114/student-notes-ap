<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Notifications Toast</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="page">
      <header class="header">
        <h1>Notifications Toast</h1>
        <p>Quick toast alerts with status colors and auto-dismiss.</p>
      </header>

      <section class="controls">
        <button class="btn" data-type="success">Show Success</button>
        <button class="btn" data-type="info">Show Info</button>
        <button class="btn" data-type="warning">Show Warning</button>
        <button class="btn" data-type="error">Show Error</button>
      </section>

      <div class="toasts" id="toasts"></div>
    </main>

    <script src="script.js"></script>
  </body>
</html>
