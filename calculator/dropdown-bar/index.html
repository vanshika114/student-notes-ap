<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dropdown Bar</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="page">
      <header class="header">
        <h1>Dropdown Bar</h1>
        <p>Top bar navigation with dropdown menus.</p>
      </header>

      <nav class="nav">
        <div class="nav__brand">UI Kit</div>
        <ul class="nav__links">
          <li class="nav__item"><a href="#">Home</a></li>
          <li class="nav__item nav__item--dropdown">
            <button class="nav__toggle" type="button" aria-expanded="false">
              Products <span class="nav__caret">▾</span>
            </button>
            <div class="nav__menu">
              <a href="#">Analytics</a>
              <a href="#">Commerce</a>
              <a href="#">Automation</a>
            </div>
          </li>
          <li class="nav__item nav__item--dropdown">
            <button class="nav__toggle" type="button" aria-expanded="false">
              Resources <span class="nav__caret">▾</span>
            </button>
            <div class="nav__menu">
              <a href="#">Docs</a>
              <a href="#">Community</a>
              <a href="#">Support</a>
            </div>
          </li>
          <li class="nav__item"><a href="#">Pricing</a></li>
        </ul>
        <button class="nav__cta">Get Started</button>
      </nav>
    </main>

    <script src="script.js"></script>
  </body>
</html>
