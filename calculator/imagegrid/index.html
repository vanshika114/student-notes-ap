<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Image Grid</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="page">
      <header class="header">
        <h1>Image Grid</h1>
        <p>Responsive, filterable gallery layout.</p>
      </header>

      <section class="controls">
        <button class="chip is-active" data-filter="all">All</button>
        <button class="chip" data-filter="nature">Nature</button>
        <button class="chip" data-filter="city">City</button>
        <button class="chip" data-filter="people">People</button>
      </section>

      <section class="grid" id="grid">
        <article class="card" data-category="nature">
          <img src="https://picsum.photos/id/1015/600/400" alt="Mountain lake" />
          <div class="card__meta">
            <h3>Mountain Lake</h3>
            <span>Nature</span>
          </div>
        </article>
        <article class="card" data-category="city">
          <img src="https://picsum.photos/id/1011/600/400" alt="City skyline" />
          <div class="card__meta">
            <h3>City Skyline</h3>
            <span>City</span>
          </div>
        </article>
        <article class="card" data-category="people">
          <img src="https://picsum.photos/id/1005/600/400" alt="Portrait" />
          <div class="card__meta">
            <h3>Portrait</h3>
            <span>People</span>
          </div>
        </article>
        <article class="card" data-category="nature">
          <img src="https://picsum.photos/id/1022/600/400" alt="Forest path" />
          <div class="card__meta">
            <h3>Forest Path</h3>
            <span>Nature</span>
          </div>
        </article>
        <article class="card" data-category="city">
          <img src="https://picsum.photos/id/1031/600/400" alt="Bridge lights" />
          <div class="card__meta">
            <h3>Bridge Lights</h3>
            <span>City</span>
          </div>
        </article>
        <article class="card" data-category="people">
          <img src="https://picsum.photos/id/1027/600/400" alt="Street portrait" />
          <div class="card__meta">
            <h3>Street Portrait</h3>
            <span>People</span>
          </div>
        </article>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
