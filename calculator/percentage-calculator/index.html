<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Percentage Calculator</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="calculator">
      <header class="header">
        <h1>Percentage Calculator</h1>
        <p>Find percentages, discounts, and increases instantly.</p>
      </header>

      <section class="card">
        <h2>What is <span id="percent-label">0</span>% of <span id="of-label">0</span>?</h2>
        <div class="field-grid">
          <label>
            Percentage
            <input id="percent-input" type="number" min="0" step="0.01" placeholder="e.g. 15" />
          </label>
          <label>
            Of number
            <input id="of-input" type="number" min="0" step="0.01" placeholder="e.g. 240" />
          </label>
        </div>
        <div class="result" id="basic-result">0</div>
      </section>

      <section class="card">
        <h2>Discount / Increase</h2>
        <div class="field-grid">
          <label>
            Original value
            <input id="value-input" type="number" min="0" step="0.01" placeholder="e.g. 1200" />
          </label>
          <label>
            Change %
            <input id="change-input" type="number" step="0.01" placeholder="e.g. 10" />
          </label>
        </div>
        <div class="result-row">
          <div>
            <span class="result-label">New value</span>
            <div class="result" id="change-result">0</div>
          </div>
          <div>
            <span class="result-label">Difference</span>
            <div class="result muted" id="difference-result">0</div>
          </div>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
