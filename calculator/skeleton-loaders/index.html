<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Skeleton Loaders</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="page">
      <header class="header">
        <h1>Skeleton Loaders</h1>
        <p>Shimmer placeholders for cards and lists.</p>
      </header>

      <section class="grid">
        <article class="card">
          <div class="skeleton skeleton--image"></div>
          <div class="skeleton skeleton--title"></div>
          <div class="skeleton skeleton--line"></div>
          <div class="skeleton skeleton--line short"></div>
        </article>
        <article class="card">
          <div class="skeleton skeleton--image"></div>
          <div class="skeleton skeleton--title"></div>
          <div class="skeleton skeleton--line"></div>
          <div class="skeleton skeleton--line short"></div>
        </article>
        <article class="card">
          <div class="skeleton skeleton--image"></div>
          <div class="skeleton skeleton--title"></div>
          <div class="skeleton skeleton--line"></div>
          <div class="skeleton skeleton--line short"></div>
        </article>
      </section>

      <section class="list">
        <div class="list-item">
          <div class="skeleton skeleton--avatar"></div>
          <div class="list-item__content">
            <div class="skeleton skeleton--line"></div>
            <div class="skeleton skeleton--line short"></div>
          </div>
        </div>
        <div class="list-item">
          <div class="skeleton skeleton--avatar"></div>
          <div class="list-item__content">
            <div class="skeleton skeleton--line"></div>
            <div class="skeleton skeleton--line short"></div>
          </div>
        </div>
        <div class="list-item">
          <div class="skeleton skeleton--avatar"></div>
          <div class="list-item__content">
            <div class="skeleton skeleton--line"></div>
            <div class="skeleton skeleton--line short"></div>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
