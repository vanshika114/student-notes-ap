<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tip Calculator</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="tip-card">
      <h1>Tip Calculator</h1>
      <p class="hint">Split the bill and calculate tips in seconds.</p>

      <div class="field">
        <label for="bill">Bill amount</label>
        <input id="bill" type="number" min="0" step="0.01" placeholder="0.00" />
      </div>

      <div class="field">
        <label for="tip">Tip percentage</label>
        <input id="tip" type="number" min="0" step="1" placeholder="15" />
      </div>

      <div class="field">
        <label for="people">Number of people</label>
        <input id="people" type="number" min="1" step="1" placeholder="1" />
      </div>

      <section class="results" aria-live="polite">
        <div>
          <span>Tip amount</span>
          <strong id="tip-amount">0.00</strong>
        </div>
        <div>
          <span>Total amount</span>
          <strong id="total-amount">0.00</strong>
        </div>
        <div>
          <span>Per person</span>
          <strong id="per-person">0.00</strong>
        </div>
      </section>
    </main>
    <script src="script.js"></script>
  </body>
</html>
