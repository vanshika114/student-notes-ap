<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Signup Form</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="signup-card">
      <h1>Create your account</h1>
      <p class="hint">Join the community in a few clicks.</p>

      <form id="signup-form" novalidate>
        <div class="field">
          <label for="name">Full name</label>
          <input id="name" name="name" type="text" placeholder="Your name" />
          <small class="error" id="name-error"></small>
        </div>

        <div class="field">
          <label for="email">Email address</label>
          <input id="email" name="email" type="email" placeholder="name@email.com" />
          <small class="error" id="email-error"></small>
        </div>

        <div class="field">
          <label for="password">Password</label>
          <input id="password" name="password" type="password" placeholder="Minimum 8 characters" />
          <small class="error" id="password-error"></small>
        </div>

        <div class="field">
          <label for="confirm">Confirm password</label>
          <input id="confirm" name="confirm" type="password" placeholder="Re-enter password" />
          <small class="error" id="confirm-error"></small>
        </div>

        <button id="submit" type="submit">Sign up</button>
        <p class="success" id="success-message" role="status"></p>
      </form>
    </main>
    <script src="script.js"></script>
  </body>
</html>
