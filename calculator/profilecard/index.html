<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile Card</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="card">
      <div class="avatar" role="img" aria-label="Profile photo"></div>
      <h1>Jordan Lee</h1>
      <p class="role">Product Designer</p>
      <p class="bio">
        Crafting thoughtful digital experiences with a focus on simplicity and
        accessibility.
      </p>

      <div class="stats">
        <div>
          <span>Projects</span>
          <strong id="projects">24</strong>
        </div>
        <div>
          <span>Followers</span>
          <strong id="followers">1.8k</strong>
        </div>
        <div>
          <span>Following</span>
          <strong id="following">320</strong>
        </div>
      </div>

      <div class="actions">
        <button id="follow" type="button">Follow</button>
        <button id="message" type="button">Message</button>
      </div>
    </main>
    <script src="script.js"></script>
  </body>
</html>
