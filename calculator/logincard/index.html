<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login Card</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="login-card">
      <h1>Welcome back</h1>
      <p class="hint">Log in to continue.</p>

      <form id="login-form" novalidate>
        <div class="field">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" placeholder="name@email.com" />
          <small class="error" id="email-error"></small>
        </div>

        <div class="field">
          <label for="password">Password</label>
          <input id="password" name="password" type="password" placeholder="Your password" />
          <small class="error" id="password-error"></small>
        </div>

        <div class="options">
          <label class="remember">
            <input id="remember" type="checkbox" />
            Remember me
          </label>
          <button id="forgot" type="button">Forgot password?</button>
        </div>

        <button id="submit" type="submit">Log in</button>
        <p class="success" id="success-message" role="status"></p>
      </form>
    </main>
    <script src="script.js"></script>
  </body>
</html>
