<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <rect width="128" height="128" rx="16" fill="#060813"/>
  <!-- Dashboard -->
  <g transform="translate(4,4)">
    <rect x="0" y="0" width="120" height="16" rx="7" fill="rgba(255,255,255,0.02)" stroke="rgba(51,65,85,0.2)" stroke-width="0.5"/>
    <text x="8" y="4.5" font-size="3" fill="#475569" font-family="monospace" letter-spacing="1">POINTS</text>
    <text x="6" y="13" font-size="6" fill="#e2e8f0" font-family="monospace" font-weight="700">320</text>
    <text x="36" y="4.5" font-size="3" fill="#475569" font-family="monospace" letter-spacing="1">MULT</text>
    <text x="36" y="13" font-size="6" fill="#ff2a5f" font-family="monospace" font-weight="700">×4</text>
    <text x="62" y="4.5" font-size="3" fill="#475569" font-family="monospace" letter-spacing="1">TIME</text>
    <text x="62" y="13" font-size="6" fill="#e2e8f0" font-family="monospace" font-weight="700">23</text>
    <text x="88" y="4.5" font-size="3" fill="#475569" font-family="monospace" letter-spacing="1">BEST</text>
    <text x="88" y="13" font-size="6" fill="#e2e8f0" font-family="monospace" font-weight="700">520</text>
  </g>
  <!-- Sky -->
  <g transform="translate(4,24)">
    <rect x="0" y="0" width="120" height="82" rx="6" fill="url(#skyGrad)" stroke="rgba(51,65,85,0.2)" stroke-width="0.5"/>
    <defs>
      <radialGradient id="skyGrad" cx="50%" cy="100%" r="60%">
        <stop offset="0%" stop-color="#0a1630"/>
        <stop offset="100%" stop-color="#060813"/>
      </radialGradient>
    </defs>
    <!-- Pink balloon -->
    <ellipse cx="28" cy="22" rx="8" ry="10" fill="#ff2a5f" opacity="0.85"/>
    <ellipse cx="25" cy="19" rx="3" ry="4" fill="rgba(255,255,255,0.1)"/>
    <line x1="28" y1="32" x2="28" y2="36" stroke="rgba(255,255,255,0.1)" stroke-width="0.5"/>
    <!-- Cyan balloon -->
    <ellipse cx="60" cy="42" rx="8" ry="10" fill="#00f0ff" opacity="0.85"/>
    <ellipse cx="57" cy="39" rx="3" ry="4" fill="rgba(255,255,255,0.1)"/>
    <line x1="60" y1="52" x2="60" y2="56" stroke="rgba(255,255,255,0.1)" stroke-width="0.5"/>
    <!-- Violet balloon -->
    <ellipse cx="92" cy="12" rx="8" ry="10" fill="#a855f7" opacity="0.85"/>
    <ellipse cx="89" cy="9" rx="3" ry="4" fill="rgba(255,255,255,0.1)"/>
    <line x1="92" y1="22" x2="92" y2="26" stroke="rgba(255,255,255,0.1)" stroke-width="0.5"/>
    <!-- Popped balloon particles -->
    <circle cx="44" cy="62" r="1.5" fill="#ff2a5f" opacity="0.6"/>
    <circle cx="48" cy="64" r="1.5" fill="#ff2a5f" opacity="0.5"/>
    <circle cx="40" cy="66" r="1.2" fill="#ff2a5f" opacity="0.4"/>
    <circle cx="50" cy="60" r="1" fill="#ff2a5f" opacity="0.3"/>
  </g>
  <!-- Controls hint -->
  <text x="64" y="114" font-size="3.5" fill="#475569" text-anchor="middle" font-family="monospace">click / tap balloons to pop!</text>
</svg>
