<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stopwatch</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app">
      <header class="header">
        <h1>Stopwatch</h1>
        <p>Track time with a simple timer.</p>
      </header>

      <section class="timer">
        <p id="display" class="display">00:00.00</p>
        <div class="controls">
          <button id="start" type="button">Start</button>
          <button id="pause" type="button" disabled>Pause</button>
          <button id="reset" type="button" disabled>Reset</button>
        </div>
      </section>

      <section class="laps">
        <div class="laps-header">
          <h2>Lap times</h2>
          <button id="lap" type="button" disabled>Lap</button>
        </div>
        <ol id="lap-list" class="lap-list"></ol>
      </section>
    </main>
    <script src="script.js"></script>
  </body>
</html>
