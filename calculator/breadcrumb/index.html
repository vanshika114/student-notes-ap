<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Breadcrumb Navigation</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="page">
      <header class="header">
        <h1>Breadcrumb</h1>
        <p>Navigate the trail and see the active path update.</p>
      </header>

      <nav class="breadcrumb" aria-label="Breadcrumb">
        <ol id="breadcrumb-list">
          <li><button class="crumb" data-index="0">Home</button></li>
          <li><button class="crumb" data-index="1">Projects</button></li>
          <li><button class="crumb" data-index="2">UI Components</button></li>
          <li><button class="crumb" data-index="3">Breadcrumb</button></li>
        </ol>
      </nav>

      <section class="card">
        <h2 id="active-title">Breadcrumb</h2>
        <p id="active-path">Home / Projects / UI Components / Breadcrumb</p>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
