<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Star Rating</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="page">
      <header class="header">
        <h1>Star Rating</h1>
        <p>Hover and click to rate the experience.</p>
      </header>

      <section class="rating-card">
        <div class="stars" role="radiogroup" aria-label="Star rating">
          <button class="star" data-value="1" aria-label="1 star">★</button>
          <button class="star" data-value="2" aria-label="2 stars">★</button>
          <button class="star" data-value="3" aria-label="3 stars">★</button>
          <button class="star" data-value="4" aria-label="4 stars">★</button>
          <button class="star" data-value="5" aria-label="5 stars">★</button>
        </div>
        <p class="rating-text" id="ratingText">Select a rating</p>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
