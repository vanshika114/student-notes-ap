<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dropdown UI</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="page">
      <header class="header">
        <h1>Dropdown UI</h1>
        <p>Custom dropdown with search and keyboard support.</p>
      </header>

      <section class="dropdown" id="dropdown">
        <button class="dropdown__toggle" type="button" aria-haspopup="listbox" aria-expanded="false">
          <span class="dropdown__label">Choose a topic</span>
          <span class="dropdown__icon">▾</span>
        </button>

        <div class="dropdown__panel" role="listbox" aria-hidden="true">
          <input
            class="dropdown__search"
            type="text"
            placeholder="Search topics..."
            aria-label="Search dropdown"
          />
          <ul class="dropdown__list">
            <li class="dropdown__item" data-value="ui">UI Design</li>
            <li class="dropdown__item" data-value="frontend">Frontend</li>
            <li class="dropdown__item" data-value="backend">Backend</li>
            <li class="dropdown__item" data-value="devops">DevOps</li>
            <li class="dropdown__item" data-value="data">Data Science</li>
            <li class="dropdown__item" data-value="mobile">Mobile</li>
          </ul>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
