<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Newsletter Subscription</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="newsletter">
      <section class="card">
        <div class="badge">Weekly digest</div>
        <h1>Stay in the loop</h1>
        <p class="subtitle">
          Get the latest tips, resources, and product updates delivered every Monday.
        </p>

        <form id="subscribe-form" class="form">
          <label class="label">
            Email address
            <input
              id="email-input"
              type="email"
              name="email"
              placeholder="you@example.com"
              autocomplete="email"
              required
            />
          </label>
          <button type="submit">Subscribe</button>
        </form>

        <p class="meta" id="status" role="status" aria-live="polite"></p>
        <ul class="benefits">
          <li>✅ No spam, unsubscribe anytime.</li>
          <li>⚡ Early access to new features.</li>
          <li>📌 Curated resources for students.</li>
        </ul>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
