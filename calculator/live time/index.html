<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Live Time</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="time-card">
      <h1 class="title">Live Time</h1>
      <p class="subtitle">Your local time updates every second.</p>
      <div class="time-box" role="timer" aria-live="polite">
        <span id="hours">00</span>
        <span class="separator">:</span>
        <span id="minutes">00</span>
        <span class="separator">:</span>
        <span id="seconds">00</span>
      </div>
      <p id="timezone" class="timezone">Loading timezone...</p>
    </main>
    <script src="script.js"></script>
  </body>
</html>
