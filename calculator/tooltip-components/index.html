<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tooltip Components</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="page">
      <header class="header">
        <h1>Tooltip Components</h1>
        <p>Hover or focus to view contextual tooltips.</p>
      </header>

      <section class="grid">
        <button class="tooltip" data-tip="Create a new project">
          New Project
        </button>
        <button class="tooltip" data-tip="Invite team members">
          Invite
        </button>
        <button class="tooltip" data-tip="View analytics dashboard">
          Analytics
        </button>
        <button class="tooltip" data-tip="Secure your account">
          Security
        </button>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
