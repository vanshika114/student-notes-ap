<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recipe App</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app">
      <header class="header">
        <h1>Recipe Finder</h1>
        <p>Save quick recipes and filter by ingredient.</p>
      </header>

      <section class="search">
        <input
          id="search-input"
          type="text"
          placeholder="Search by ingredient..."
          aria-label="Search by ingredient"
          autocomplete="off"
        />
      </section>

      <form id="recipe-form" class="recipe-form">
        <input
          id="recipe-name"
          type="text"
          placeholder="Recipe name"
          aria-label="Recipe name"
          autocomplete="off"
          required
        />
        <input
          id="recipe-ingredient"
          type="text"
          placeholder="Main ingredient"
          aria-label="Main ingredient"
          autocomplete="off"
          required
        />
        <textarea
          id="recipe-steps"
          rows="3"
          placeholder="Short steps"
          aria-label="Recipe steps"
          required
        ></textarea>
        <button type="submit">Add recipe</button>
      </form>

      <p id="empty" class="empty">No recipes yet. Add one above.</p>
      <ul id="recipe-list" class="recipe-list" aria-live="polite"></ul>
    </main>
    <script src="script.js"></script>
  </body>
</html>
