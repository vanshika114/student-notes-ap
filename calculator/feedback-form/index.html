<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Feedback Form</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="feedback">
      <section class="card">
        <header class="header">
          <h1>Share your feedback</h1>
          <p>Your input helps us improve the student notes experience.</p>
        </header>

        <form id="feedback-form" class="form">
          <label class="field">
            Name
            <input id="name-input" type="text" placeholder="Your name" />
          </label>

          <label class="field">
            Email
            <input
              id="email-input"
              type="email"
              placeholder="you@example.com"
              autocomplete="email"
              required
            />
          </label>

          <label class="field">
            Rating
            <div class="rating" role="radiogroup" aria-label="Rating">
              <label><input type="radio" name="rating" value="1" />1</label>
              <label><input type="radio" name="rating" value="2" />2</label>
              <label><input type="radio" name="rating" value="3" />3</label>
              <label><input type="radio" name="rating" value="4" />4</label>
              <label><input type="radio" name="rating" value="5" checked />5</label>
            </div>
          </label>

          <label class="field">
            Message
            <textarea
              id="message-input"
              rows="4"
              placeholder="Tell us what you liked or want improved."
              required
            ></textarea>
          </label>

          <button type="submit">Send feedback</button>
        </form>

        <p id="status" class="status" role="status" aria-live="polite"></p>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
