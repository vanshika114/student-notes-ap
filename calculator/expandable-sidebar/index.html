<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Expandable Sidebar</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <span class="brand-icon">◎</span>
        <span class="brand-text">FocusBoard</span>
      </div>
      <nav class="nav">
        <button class="nav-item active" type="button">
          <span class="icon">🏠</span>
          <span class="label">Home</span>
        </button>
        <button class="nav-item" type="button">
          <span class="icon">📁</span>
          <span class="label">Projects</span>
        </button>
        <button class="nav-item" type="button">
          <span class="icon">📊</span>
          <span class="label">Analytics</span>
        </button>
        <button class="nav-item" type="button">
          <span class="icon">💬</span>
          <span class="label">Messages</span>
        </button>
        <button class="nav-item" type="button">
          <span class="icon">⚙️</span>
          <span class="label">Settings</span>
        </button>
      </nav>
      <div class="sidebar-footer">
        <div class="user">
          <span class="avatar">AJ</span>
          <div class="user-info">
            <p class="name">Alex Jordan</p>
            <p class="role">Product Lead</p>
          </div>
        </div>
      </div>
    </aside>

    <main class="content">
      <header class="topbar">
        <button class="toggle" id="toggleBtn" type="button">
          <span class="toggle-icon">☰</span>
          <span class="toggle-text">Collapse</span>
        </button>
        <div class="search">
          <input type="search" placeholder="Search tasks, teams, or notes" />
        </div>
        <div class="actions">
          <button class="ghost-btn" type="button">Share</button>
          <button class="primary-btn" type="button">New Board</button>
        </div>
      </header>

      <section class="cards">
        <article class="card">
          <h2>Weekly Goals</h2>
          <p>Stay aligned with the sprint focus and prioritize top tasks.</p>
        </article>
        <article class="card">
          <h2>Upcoming Reviews</h2>
          <p>Keep an eye on reviews scheduled for this week.</p>
        </article>
        <article class="card">
          <h2>Recent Updates</h2>
          <p>New activity is waiting in your notifications feed.</p>
        </article>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
