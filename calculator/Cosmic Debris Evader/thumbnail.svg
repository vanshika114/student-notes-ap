<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <rect width="128" height="128" rx="16" fill="#03050a"/>
  <!-- Stars -->
  <circle cx="10" cy="8" r="0.4" fill="#fff" opacity="0.5"/>
  <circle cx="120" cy="15" r="0.3" fill="#fff" opacity="0.3"/>
  <circle cx="35" cy="20" r="0.5" fill="#fff" opacity="0.6"/>
  <circle cx="105" cy="50" r="0.4" fill="#fff" opacity="0.4"/>
  <circle cx="15" cy="70" r="0.3" fill="#fff" opacity="0.5"/>
  <circle cx="118" cy="100" r="0.5" fill="#fff" opacity="0.3"/>
  <!-- Dashboard -->
  <g transform="translate(6,4)">
    <rect x="0" y="0" width="116" height="14" rx="7" fill="rgba(255,255,255,0.02)" stroke="rgba(51,65,85,0.2)" stroke-width="0.5"/>
    <text x="10" y="4.5" font-size="3.5" fill="#475569" font-family="monospace" letter-spacing="1">SCORE</text>
    <text x="8" y="11.5" font-size="6" fill="#e2e8f0" font-family="monospace" font-weight="700">640</text>
    <text x="36" y="4.5" font-size="3.5" fill="#475569" font-family="monospace" letter-spacing="1">SHIELD</text>
    <text x="36" y="11.5" font-size="6" fill="#06b6d4" font-family="monospace" font-weight="700">72%</text>
    <text x="64" y="4.5" font-size="3.5" fill="#475569" font-family="monospace" letter-spacing="1">FIELD</text>
    <text x="64" y="11.5" font-size="6" fill="#e2e8f0" font-family="monospace" font-weight="700">88</text>
    <text x="90" y="4.5" font-size="3.5" fill="#475569" font-family="monospace" letter-spacing="1">BEST</text>
    <text x="90" y="11.5" font-size="6" fill="#e2e8f0" font-family="monospace" font-weight="700">1.2K</text>
  </g>
  <!-- Game area -->
  <g transform="translate(6,23)">
    <rect x="0" y="0" width="116" height="86" rx="6" fill="#060b18" stroke="rgba(51,65,85,0.15)" stroke-width="0.5"/>
    <!-- Debris pieces -->
    <circle cx="30" cy="18" r="8" fill="#f97316" opacity="0.8"/>
    <circle cx="28" cy="16" r="4" fill="rgba(255,200,100,0.15)"/>
    <!-- Medium debris -->
    <circle cx="78" cy="35" r="6" fill="#f97316" opacity="0.7"/>
    <circle cx="77" cy="34" r="3" fill="rgba(255,200,100,0.15)"/>
    <!-- Small debris -->
    <circle cx="50" cy="50" r="4" fill="#f97316" opacity="0.6"/>
    <!-- Magnetic field ring -->
    <circle cx="58" cy="72" r="28" fill="rgba(6,182,212,0.04)" stroke="rgba(6,182,212,0.15)" stroke-width="1" stroke-dasharray="4,4"/>
    <!-- Player shield -->
    <circle cx="58" cy="72" r="7" fill="#06b6d4"/>
    <circle cx="56" cy="70" r="3" fill="rgba(255,255,255,0.12)"/>
  </g>
  <text x="64" y="116" font-size="3.5" fill="#475569" text-anchor="middle" font-family="monospace">Space / hold = magnetic field</text>
</svg>
