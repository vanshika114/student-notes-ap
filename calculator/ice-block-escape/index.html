<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ice Block Escape — #1063</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <header id="hud">
      <div class="hud-cell">
        <span class="hud-label">Time</span>
        <span id="scoreValue" class="hud-value">0.0</span>
      </div>
      <div class="hud-cell">
        <span class="hud-label">Mult</span>
        <span id="multValue" class="hud-value">&times;1</span>
      </div>
      <div class="hud-cell">
        <span class="hud-label">Best</span>
        <span id="bestValue" class="hud-value">0.0</span>
      </div>
    </header>

    <div id="canvasWrapper">
      <canvas id="gameCanvas" width="600" height="700"></canvas>

      <div id="startOverlay" class="overlay">
        <div class="overlay-box">
          <h1>ICE BLOCK<br>ESCAPE</h1>
          <p class="sub">Dodge the falling ice blocks!</p>
          <p class="sub">Move with <kbd>&larr;</kbd> <kbd>&rarr;</kbd>, <kbd>A</kbd> <kbd>D</kbd>, or your <kbd>Mouse</kbd></p>
          <p class="sub-sm">Press <kbd>P</kbd> to pause</p>
          <button id="startBtn" class="btn">SURVIVE</button>
        </div>
      </div>

      <div id="pauseOverlay" class="overlay hidden">
        <div class="overlay-box">
          <h2>PAUSED</h2>
          <p class="sub">Press <kbd>P</kbd> to resume</p>
        </div>
      </div>

      <div id="gameOverOverlay" class="overlay hidden">
        <div class="overlay-box">
          <h2>FROZEN!</h2>
          <div class="report">
            <div class="r-row"><span>Survived</span><span id="finalScore">0.0s</span></div>
            <div class="r-row"><span>Best</span><span id="finalBest">0.0s</span></div>
            <div class="r-row"><span>Multiplier</span><span id="finalMult">&times;1</span></div>
          </div>
          <button id="restartBtn" class="btn">TRY AGAIN</button>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
