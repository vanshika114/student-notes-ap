<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Image Slider</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="slider-card">
      <h1>Image Slider</h1>
      <p class="hint">Swipe through a simple photo carousel.</p>

      <section class="slider" aria-live="polite">
        <button id="prev" class="nav-btn" type="button" aria-label="Previous image">
          ‹
        </button>
        <div class="slide">
          <img id="slide-image" src="" alt="" />
        </div>
        <button id="next" class="nav-btn" type="button" aria-label="Next image">
          ›
        </button>
      </section>

      <div id="dots" class="dots" role="tablist" aria-label="Slide selector"></div>
    </main>
    <script src="script.js"></script>
  </body>
</html>
