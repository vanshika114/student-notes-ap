<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Button Animation</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="hero">
      <p class="eyebrow">UI Pattern</p>
      <h1>Animated Buttons</h1>
      <p class="subtext">
        Tap into micro-interactions with hover, ripple, and loading animations.
      </p>
    </header>

    <main class="page">
      <section class="card">
        <h2>Hover Lift</h2>
        <div class="button-row">
          <button class="btn btn-lift" type="button">Get Started</button>
          <button class="btn btn-lift secondary" type="button">Explore</button>
        </div>
      </section>

      <section class="card">
        <h2>Pulse</h2>
        <div class="button-row">
          <button class="btn btn-pulse" type="button">Live Now</button>
          <button class="btn btn-pulse ghost" type="button">Notify Me</button>
        </div>
      </section>

      <section class="card">
        <h2>Ripple</h2>
        <div class="button-row">
          <button class="btn btn-ripple" type="button">Send</button>
          <button class="btn btn-ripple dark" type="button">Share</button>
        </div>
      </section>

      <section class="card">
        <h2>Loading</h2>
        <div class="button-row">
          <button class="btn btn-load" id="loadBtn" type="button">
            <span class="label">Upload</span>
            <span class="spinner" aria-hidden="true"></span>
          </button>
        </div>
        <p class="hint" id="loadHint">Click to trigger a short loading state.</p>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
