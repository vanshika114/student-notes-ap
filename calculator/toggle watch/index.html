<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Toggle Watch</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="watch">
      <h1 class="title">Toggle Watch</h1>
      <p class="subtitle">Switch between 24-hour and 12-hour time.</p>
      <div class="display" role="timer" aria-live="polite">
        <span id="time">00:00:00</span>
        <span id="period" class="period">AM</span>
      </div>
      <button id="toggle" class="toggle-btn" type="button">Use 24-hour</button>
    </main>
    <script src="script.js"></script>
  </body>
</html>
