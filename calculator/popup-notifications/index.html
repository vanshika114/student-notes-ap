<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Popup Notifications</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="page">
      <header class="header">
        <h1>Popup Notifications</h1>
        <p>Modal-style notification with actions.</p>
      </header>

      <button class="btn" id="openPopup">Show Notification</button>
    </main>

    <div class="overlay" id="overlay" aria-hidden="true">
      <div class="popup" role="dialog" aria-modal="true" aria-labelledby="popupTitle">
        <h2 id="popupTitle">Update Available</h2>
        <p>A new version is ready. Install it to get the latest features.</p>
        <div class="popup__actions">
          <button class="btn btn--secondary" id="laterBtn">Later</button>
          <button class="btn btn--primary" id="installBtn">Install</button>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
