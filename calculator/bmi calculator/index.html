<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BMI Calculator</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app">
      <header class="header">
        <h1>BMI Calculator</h1>
        <p>Calculate your body mass index.</p>
      </header>

      <form id="bmi-form" class="bmi-form">
        <label>
          Height (cm)
          <input id="height" type="number" min="50" max="250" required />
        </label>
        <label>
          Weight (kg)
          <input id="weight" type="number" min="10" max="300" required />
        </label>
        <button type="submit">Calculate</button>
      </form>

      <section id="result" class="result" hidden>
        <h2>Your BMI</h2>
        <p class="value"><span id="bmi-value">0</span></p>
        <p id="bmi-category" class="category"></p>
      </section>
    </main>
    <script src="script.js"></script>
  </body>
</html>
