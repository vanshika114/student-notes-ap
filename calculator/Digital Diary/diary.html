<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Private Journal</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');

        :root {
            --primary: #818cf8;
            --bg: #0f172a;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #c084fc;
        }

        [data-theme="light"] {
            --bg: #f8fafc;
            --glass: rgba(0, 0, 0, 0.03);
            --glass-border: rgba(0, 0, 0, 0.1);
            --text: #0f172a;
            --text-muted: #64748b;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            transition: background-color 0.3s, color 0.3s;
        }

        .mesh-bg {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: -1;
            background: radial-gradient(circle at 10% 20%, rgba(129, 140, 248, 0.15) 0%, transparent 40%),
                        radial-gradient(circle at 90% 80%, rgba(192, 132, 252, 0.1) 0%, transparent 40%);
        }

        .container { max-width: 600px; width: 100%; z-index: 1; }

        /* Lock Screen */
        #lockScreen {
            position: fixed;
            inset: 0;
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            padding: 2rem;
            border-radius: 24px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.2);
            margin-bottom: 2rem;
        }

        input, textarea {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: var(--text);
            font-size: 1rem;
            margin-bottom: 12px;
            box-sizing: border-box;
            outline: none;
        }

        button {
            padding: 12px 24px;
            border-radius: 12px;
            border: none;
            background: var(--primary);
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        button:hover { transform: translateY(-2px); }

        /* Journal UI */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .mood-selector {
            display: flex;
            gap: 10px;
            margin: 10px 0;
        }

        .mood-btn {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            font-size: 1.5rem;
            padding: 8px;
            border-radius: 12px;
            cursor: pointer;
            filter: grayscale(1);
            transition: 0.2s;
        }

        .mood-btn.active { filter: grayscale(0); transform: scale(1.1); border-color: var(--primary); }

        .entry-card {
            position: relative;
            padding: 1.5rem;
        }

        .entry-header {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .entry-title { font-weight: 700; font-size: 1.2rem; margin-bottom: 8px; }
        .entry-body { line-height: 1.6; white-space: pre-wrap; }

        .search-bar { margin-bottom: 1.5rem; }

        .hidden { display: none !important; }

        .theme-toggle {
            background: none;
            border: 1px solid var(--glass-border);
            color: var(--text);
            padding: 8px;
        }
    </style>
</head>
<body>

<div class="mesh-bg"></div>

<!-- Lock Screen -->
<div id="lockScreen">
    <div class="glass-card" style="text-align: center;">
        <h2 id="lockTitle">Welcome Back</h2>
        <p id="lockDesc" style="color: var(--text-muted); font-size: 0.9rem;">Enter password to unlock your journal</p>
        <input type="password" id="passwordInput" placeholder="Password">
        <button onclick="handleUnlock()" id="unlockBtn">Unlock</button>
    </div>
</div>

<!-- Main Content -->
<div class="container hidden" id="mainContent">
    <div class="header">
        <h1 style="margin: 0;">My Diary</h1>
        <div style="display: flex; gap: 10px;">
            <button class="theme-toggle" onclick="toggleTheme()">🌓</button>
            <button onclick="lockJournal()" style="background: rgba(251, 113, 133, 0.2); color: #fb7185;">Lock</button>
        </div>
    </div>

    <!-- Search -->
    <div class="search-bar">
        <input type="text" id="searchInput" placeholder="Search entries..." oninput="renderEntries()">
    </div>

    <!-- New Entry -->
    <div class="glass-card">
        <h3>New Entry</h3>
        <input type="text" id="newTitle" placeholder="Title">
        <textarea id="newContent" rows="4" placeholder="How was your day?"></textarea>
        <div class="mood-selector" id="moodSelector">
            <button class="mood-btn" onclick="selectMood('😊', this)">😊</button>
            <button class="mood-btn" onclick="selectMood('😔', this)">😔</button>
            <button class="mood-btn" onclick="selectMood('😠', this)">😠</button>
            <button class="mood-btn" onclick="selectMood('😴', this)">😴</button>
            <button class="mood-btn" onclick="selectMood('✨', this)">✨</button>
        </div>
        <button onclick="saveEntry()" style="width: 100%; margin-top: 10px;">Save Entry</button>
    </div>

    <div id="entriesList"></div>
</div>

<script>
    let entries = JSON.parse(localStorage.getItem('journal_entries')) || [];
    let selectedMood = '😊';
    let isLocked = true;

    // --- Password Logic ---
    function checkPasswordSet() {
        const pwd = localStorage.getItem('journal_password');
        if (!pwd) {
            document.getElementById('lockTitle').innerText = "Setup Privacy Lock";
            document.getElementById('lockDesc').innerText = "Create a password for your private journal";
            document.getElementById('unlockBtn').innerText = "Set Password";
        }
    }

    function handleUnlock() {
        const input = document.getElementById('passwordInput');
        const stored = localStorage.getItem('journal_password');
        
        if (!stored) {
            if (input.value.length < 4) return alert("Password must be at least 4 characters");
            localStorage.setItem('journal_password', input.value);
            unlock();
        } else if (input.value === stored) {
            unlock();
        } else {
            alert("Incorrect password!");
            input.value = '';
        }
    }

    function unlock() {
        document.getElementById('lockScreen').classList.add('hidden');
        document.getElementById('mainContent').classList.remove('hidden');
        isLocked = false;
        renderEntries();
    }

    function lockJournal() {
        location.reload(); // Simple way to reset state and show lock screen
    }

    // --- Theme Logic ---
    function toggleTheme() {
        const current = document.body.getAttribute('data-theme');
        const target = current === 'light' ? 'dark' : 'light';
        document.body.setAttribute('data-theme', target);
        localStorage.setItem('journal_theme', target);
    }

    // --- Entry Logic ---
    function selectMood(mood, btn) {
        selectedMood = mood;
        document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    function saveEntry() {
        const title = document.getElementById('newTitle').value.trim();
        const content = document.getElementById('newContent').value.trim();

        if (!content) return alert("Please write something!");

        const entry = {
            id: Date.now(),
            title: title || "Untitled Entry",
            content: content,
            mood: selectedMood,
            date: new Date().toLocaleString()
        };

        entries.unshift(entry);
        localStorage.setItem('journal_entries', JSON.stringify(entries));
        
        // Clear inputs
        document.getElementById('newTitle').value = '';
        document.getElementById('newContent').value = '';
        renderEntries();
    }

    function deleteEntry(id) {
        if (!confirm("Delete this memory?")) return;
        entries = entries.filter(e => e.id !== id);
        localStorage.setItem('journal_entries', JSON.stringify(entries));
        renderEntries();
    }

    function renderEntries() {
        const list = document.getElementById('entriesList');
        const searchTerm = document.getElementById('searchInput').value.toLowerCase();
        list.innerHTML = '';

        const filtered = entries.filter(e => 
            e.title.toLowerCase().includes(searchTerm) || 
            e.content.toLowerCase().includes(searchTerm)
        );

        filtered.forEach(e => {
            const div = document.createElement('div');
            div.className = 'glass-card entry-card';
            div.innerHTML = `
                <div class="entry-header">
                    <span>${e.date}</span>
                    <span>${e.mood}</span>
                </div>
                <div class="entry-title">${e.title}</div>
                <div class="entry-body">${e.content}</div>
                <button onclick="deleteEntry(${e.id})" 
                        style="position: absolute; top: 1.5rem; right: 1.5rem; background: none; color: var(--text-muted); font-size: 0.8rem; padding: 4px;">
                    Delete
                </button>
            `;
            list.appendChild(div);
        });
    }

    // Init
    checkPasswordSet();
    const savedTheme = localStorage.getItem('journal_theme') || 'dark';
    document.body.setAttribute('data-theme', savedTheme);

    // Default active mood
    document.querySelector('.mood-btn').classList.add('active');

    // Allow Enter key for password
    document.getElementById('passwordInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') handleUnlock();
    });
</script>

</body>
</html>
