<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance Tracker & Bunk Calculator</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');

        :root {
            --primary: #818cf8;
            --success: #4ade80;
            --warning: #f59e0b;
            --danger: #fb7185;
            --bg: #0f172a;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text: #f8fafc;
            --text-muted: #94a3b8;
        }

        :root {
            --primary: #818cf8;
            --success: #4ade80;
            --warning: #f59e0b;
            --danger: #fb7185;
            --bg: #0f172a;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Background Blobs */
        .mesh-bg {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: -1;
            background: radial-gradient(circle at 10% 20%, rgba(99, 102, 241, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(244, 63, 94, 0.1) 0%, transparent 40%);
        }

        .blob {
            position: absolute;
            width: 400px;
            height: 400px;
            background: linear-gradient(135deg, var(--primary), #c084fc);
            filter: blur(80px);
            border-radius: 50%;
            z-index: -1;
            opacity: 0.2;
            animation: move 20s infinite alternate;
        }

        @keyframes move {
            from {
                transform: translate(-10%, -10%) rotate(0deg);
            }

            to {
                transform: translate(20%, 20%) rotate(360deg);
            }
        }

        .container {
            max-width: 500px;
            width: 100%;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
        }

        header h1 {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(to right, #fff, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            padding: 1.5rem;
            border-radius: 24px;
            margin-bottom: 2rem;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .input-group {
            display: flex;
            gap: 12px;
            margin-top: 10px;
        }

        input {
            padding: 0.8rem 1rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            flex: 1;
            font-size: 1rem;
            color: white;
            outline: none;
            transition: border-color 0.3s;
        }

        input:focus {
            border-color: var(--primary);
        }

        button {
            padding: 0.6rem 1.2rem;
            border: none;
            border-radius: 12px;
            background: var(--primary);
            color: white;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.4);
        }

        button.btn-danger {
            background: rgba(251, 113, 133, 0.15);
            color: var(--danger);
            border: 1px solid rgba(251, 113, 133, 0.2);
        }

        button.btn-success {
            background: var(--success);
        }

        button.btn-success:hover {
            box-shadow: 0 10px 15px -3px rgba(74, 222, 128, 0.4);
            color: #000;
        }

        .subject-card {
            border-left: 4px solid var(--primary);
        }

        .subject-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .subject-name {
            font-weight: 700;
            font-size: 1.25rem;
            letter-spacing: -0.025em;
        }

        .stats {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .percentage {
            font-size: 2rem;
            font-weight: 800;
            font-variant-numeric: tabular-nums;
        }

        .bunk-status {
            margin: 15px 0;
            padding: 10px 15px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 10px;
            font-size: 0.85rem;
            font-weight: 400;
            color: var(--text-muted);
        }

        .controls {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }

        .low-attendance {
            border-left-color: var(--danger);
        }

        .safe-attendance {
            border-left-color: var(--success);
        }

        .text-danger {
            color: var(--danger);
        }

        .text-success {
            color: var(--success);
        }
    </style>
</head>

<body>

    <div class="mesh-bg"></div>
    <div class="blob"></div>

    <div class="container">
        <header>
            <h1>Attendance</h1>
            <p>Keep track of your classes and plan your bunks wisely.</p>
        </header>

        <div class="glass-card">
            <label for="targetPercent" style="font-size: 0.85rem; color: var(--text-muted);">Global Target Percentage
                (%)</label>
            <div class="input-group">
                <input type="number" id="targetPercent" value="75" min="1" max="100">
            </div>
        </div>

        <div class="glass-card">
            <h3>Add New Subject</h3>
            <div class="input-group">
                <input type="text" id="subjectName" placeholder="e.g. Mathematics">
                <button id="addBtn">Add</button>
            </div>
        </div>

        <div id="subjectList"></div>
    </div>

    <script>
        let subjects = JSON.parse(localStorage.getItem('attendanceData')) || [];
        const listEl = document.getElementById('subjectList');
        const targetInput = document.getElementById('targetPercent');

        function saveData() {
            localStorage.setItem('attendanceData', JSON.stringify(subjects));
            render();
        }

        function calculateStatus(attended, total) {
            if (total === 0) return { percent: 0, message: "No classes yet.", colorClass: "" };

            const target = parseFloat(targetInput.value) / 100;
            const currentPercent = (attended / total) * 100;
            let message = "";
            let colorClass = "";

            if (currentPercent >= target * 100) {
                // Safe to bunk calculation: A / (T + x) >= target
                const maxBunks = Math.floor(attended / target - total);
                message = `✨ You're safe! You can bunk <b>${maxBunks}</b> more classes.`;
                colorClass = "safe-attendance";
            } else {
                // Classes needed calculation: (A + y) / (T + y) >= target
                const reqClasses = Math.ceil((target * total - attended) / (1 - target));
                message = `⚠️ Warning: Attend <b>${reqClasses}</b> more classes to reach target.`;
                colorClass = "low-attendance";
            }

            return {
                percent: currentPercent.toFixed(1),
                message,
                colorClass
            };
        }

        function updateSubject(id, type) {
            const sub = subjects.find(s => s.id === id);
            if (type === 'att') {
                sub.attended++;
                sub.total++;
            } else if (type === 'miss') {
                sub.total++;
            } else if (type === 'reset') {
                sub.attended = 0;
                sub.total = 0;
            } else if (type === 'del') {
                subjects = subjects.filter(s => s.id !== id);
            }
            saveData();
        }

        function render() {
            listEl.innerHTML = '';
            subjects.forEach(sub => {
                const status = calculateStatus(sub.attended, sub.total);
                const card = document.createElement('div');
                card.className = `glass-card subject-card ${status.colorClass}`;

                card.innerHTML = `
                <div class="subject-header">
                    <span class="subject-name">${sub.name}</span>
                    <button class="btn-danger" style="padding: 4px 8px; font-size: 12px;" onclick="updateSubject(${sub.id}, 'del')">Remove</button>
                </div>
                <div class="stats">
                    <div>
                        Attended: <strong>${sub.attended}</strong> / Total: <strong>${sub.total}</strong>
                    </div>
                    <div class="percentage ${parseFloat(status.percent) < targetInput.value ? 'text-danger' : 'text-success'}">
                        ${status.percent}%
                    </div>
                </div>
                <div class="bunk-status">
                    ${status.message}
                </div>
                <div class="controls">
                    <button class="btn-success" onclick="updateSubject(${sub.id}, 'att')">Present ✅</button>
                    <button onclick="updateSubject(${sub.id}, 'miss')" style="background: rgba(255,255,255,0.05); color: #fff;">Absent ❌</button>
                    <button style="background: transparent; color: var(--text-muted); padding: 0.6rem 0.5rem;" onclick="updateSubject(${sub.id}, 'reset')">↺</button>
                </div>
            `;
                listEl.appendChild(card);
            });

            // Alerting if overall or specific falls below target
            const lowAttendanceSubjects = subjects.filter(s => {
                const p = s.total === 0 ? 100 : (s.attended / s.total) * 100;
                return p < targetInput.value;
            });

            if (lowAttendanceSubjects.length > 0 && subjects.length > 0) {
                // Simple visual alert/label rather than annoying popups on every render
                console.log("Warning: Low attendance in " + lowAttendanceSubjects.map(s => s.name).join(', '));
            }
        }

        document.getElementById('addBtn').addEventListener('click', () => {
            const nameInput = document.getElementById('subjectName');
            const name = nameInput.value.trim();

            if (!name) {
                alert("Please enter a subject name.");
                return;
            }

            subjects.push({
                id: Date.now(),
                name: name,
                attended: 0,
                total: 0
            });

            nameInput.value = '';
            saveData();
        });

        targetInput.addEventListener('change', render);

        // Initial render
        render();

        // Feature: Simple Alert for "Danger Zone"
        setInterval(() => {
            const threshold = parseFloat(targetInput.value);
            subjects.forEach(s => {
                const p = (s.attended / s.total) * 100;
                if (s.total > 0 && p < threshold - 10) {
                    // Only alert if significantly below target to avoid spam
                    console.warn(`Critical: ${s.name} is at ${p.toFixed(1)}%`);
                }
            });
        }, 60000); // Check every minute
    </script>

</body>

</html>
