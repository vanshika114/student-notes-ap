<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Animated Loader</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="page">
      <header class="header">
        <h1>Animated Loader</h1>
        <p>Multi-dot loader with pulse and rotate animation.</p>
      </header>

      <section class="loader-card">
        <div class="loader" aria-label="Loading" role="status">
          <span></span>
          <span></span>
          <span></span>
          <span></span>
        </div>
        <p class="loader-text">Loading content...</p>
      </section>
    </main>
  </body>
</html>
