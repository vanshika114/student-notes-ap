<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pomodoro Timer</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app">
      <header class="header">
        <h1>Pomodoro Timer</h1>
        <p>Focus in short sprints with breaks.</p>
      </header>

      <section class="timer">
        <p id="mode" class="mode">Focus</p>
        <p id="display" class="display">25:00</p>
        <div class="controls">
          <button id="start" type="button">Start</button>
          <button id="pause" type="button" disabled>Pause</button>
          <button id="reset" type="button">Reset</button>
        </div>
      </section>

      <section class="settings">
        <label>
          Focus (min)
          <input id="focus-input" type="number" min="5" max="60" value="25" />
        </label>
        <label>
          Break (min)
          <input id="break-input" type="number" min="1" max="30" value="5" />
        </label>
      </section>
    </main>
    <script src="script.js"></script>
  </body>
</html>
