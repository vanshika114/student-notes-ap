<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SURVIVE — Resource Protocol</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=Oswald:wght@500;700&display=swap');

        :root {
            --bg: #050505;
            --danger: #ff1111;
            --danger-glow: rgba(255, 17, 17, 0.4);
            --warning: #ffaa00;
            --text: #ffffff;
            --surface: rgba(20, 20, 20, 0.8);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            padding: 0;
            background: var(--bg);
            color: var(--text);
            font-family: 'JetBrains Mono', monospace;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .game-container {
            width: 95%;
            max-width: 600px;
            background: var(--surface);
            border: 2px solid var(--danger);
            border-radius: 4px;
            padding: 30px;
            box-shadow: 0 0 50px rgba(255, 0, 0, 0.2), inset 0 0 30px rgba(255, 0, 0, 0.1);
            position: relative;
            border-style: double;
        }

        .glitch-header {
            font-family: 'Oswald', sans-serif;
            font-size: 2.5rem;
            text-transform: uppercase;
            color: var(--danger);
            margin: 0 0 20px;
            text-align: center;
            letter-spacing: 5px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { text-shadow: 0 0 5px var(--danger); }
            50% { text-shadow: 0 0 20px var(--danger); }
            100% { text-shadow: 0 0 5px var(--danger); }
        }

        .resource-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }

        .res-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border: 1px solid var(--border);
            text-align: center;
        }

        .res-label { font-size: 0.7rem; color: #888; text-transform: uppercase; margin-bottom: 5px; }
        .res-val { font-size: 1.5rem; font-weight: 800; color: var(--text); }
        .res-val.low { color: var(--danger); animation: blink 0.5s infinite; }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .event-log {
            background: #000;
            height: 100px;
            padding: 15px;
            border: 1px solid var(--danger);
            margin-bottom: 25px;
            font-size: 0.85rem;
            overflow-y: auto;
            color: var(--warning);
            border-left: 5px solid var(--danger);
        }

        .action-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .action-btn {
            background: transparent;
            border: 1px solid var(--text);
            color: var(--text);
            padding: 12px;
            cursor: pointer;
            font-weight: 700;
            text-transform: uppercase;
            transition: all 0.2s;
            font-family: inherit;
        }

        .action-btn:hover:not(:disabled) {
            background: var(--text);
            color: var(--bg);
        }

        .action-btn:disabled { opacity: 0.3; cursor: not-allowed; }

        .day-counter {
            position: absolute;
            top: -15px;
            right: 20px;
            background: var(--danger);
            color: white;
            padding: 5px 15px;
            font-weight: 800;
            font-size: 0.9rem;
        }

        .overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            text-align: center;
            padding: 20px;
        }

        .btn-danger {
            background: var(--danger);
            color: white;
            border: none;
            padding: 15px 40px;
            font-weight: 800;
            text-transform: uppercase;
            cursor: pointer;
            letter-spacing: 2px;
            margin-top: 20px;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="game-container">
        <div class="day-counter">DAY <span id="day-val">1</span></div>
        
        <div id="start-screen" class="overlay">
            <h1 class="glitch-header">REMAINING ALIVE</h1>
            <p style="color: #888; font-size: 0.9rem; margin-bottom: 30px;">
                Resources are depleting. The environment is hostile.<br>
                Manage Food, Water, and Health to survive the protocol.
            </p>
            <button class="btn-danger" onclick="startGame()">Initiate Survival</button>
        </div>

        <div id="game-over-screen" class="overlay hidden">
            <h1 class="glitch-header" style="color: var(--danger);">FATAL ERROR</h1>
            <p id="cause-of-death"></p>
            <p style="margin-top: 10px;">Survival Duration: <span id="final-day"></span> Days</p>
            <button class="btn-danger" onclick="startGame()">Restart Protocol</button>
        </div>

        <h1 class="glitch-header">SURVIVAL PROTOCOL</h1>

        <div class="resource-grid">
            <div class="res-card">
                <div class="res-label">Nutrition</div>
                <div id="food-val" class="res-val">50</div>
            </div>
            <div class="res-card">
                <div class="res-label">Hydration</div>
                <div id="water-val" class="res-val">50</div>
            </div>
            <div class="res-card">
                <div class="res-label">Vitals</div>
                <div id="health-val" class="res-val">100</div>
            </div>
        </div>

        <div id="log" class="event-log">System initialized. Waiting for input...</div>

        <div class="action-grid">
            <button class="action-btn" onclick="takeAction('scavenge')">Scavenge (Food+)</button>
            <button class="action-btn" onclick="takeAction('purify')">Purify (Water+)</button>
            <button class="action-btn" onclick="takeAction('rest')">Rest (Health+)</button>
            <button class="action-btn" onclick="takeAction('fortify')">Fortify (Def+)</button>
        </div>
    </div>

    <script>
        let state = {
            day: 1,
            food: 50,
            water: 50,
            health: 100,
            fortified: false,
            active: false
        };

        const EVENTS = [
            { msg: "Acid rain detected. Water supplies contaminated.", f: 0, w: -15, h: -5 },
            { msg: "A heatwave strikes. Hydration critical.", f: 0, w: -25, h: 0 },
            { msg: "Local fauna raid the pantry. Food lost.", f: -20, w: 0, h: 0 },
            { msg: "Clear skies. Resource consumption normalized.", f: -5, w: -5, h: 0 },
            { msg: "Toxic spores released. Health deteriorating.", f: 0, w: 0, h: -15 },
            { msg: "A quiet day... perhaps too quiet.", f: -5, w: -5, h: 0 }
        ];

        function startGame() {
            state = { day: 1, food: 50, water: 50, health: 100, fortified: false, active: true };
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('game-over-screen').classList.add('hidden');
            updateUI();
            log("Protocol active. High danger detected.");
        }

        function takeAction(type) {
            if (!state.active) return;

            if (type === 'scavenge') {
                state.food += Math.floor(Math.random() * 20) + 10;
                log("Scavenged old rations. Energy depleted.");
            } else if (type === 'purify') {
                state.water += Math.floor(Math.random() * 20) + 10;
                log("Purified wastewater. Thirst reduced.");
            } else if (type === 'rest') {
                state.health = Math.min(100, state.health + 15);
                log("Resting... Vitals stabilizing.");
            } else if (type === 'fortify') {
                state.fortified = true;
                log("Shelter fortified. Hazard resistance increased.");
            }

            endDay();
        }

        function endDay() {
            state.day++;
            
            // Base Consumption
            state.food -= 10;
            state.water -= 12;

            // Random Event
            const event = EVENTS[Math.floor(Math.random() * EVENTS.length)];
            let foodHit = event.f;
            let waterHit = event.w;
            let healthHit = event.h;

            if (state.fortified) {
                foodHit = Math.floor(foodHit / 2);
                waterHit = Math.floor(waterHit / 2);
                healthHit = Math.floor(healthHit / 2);
                state.fortified = false; // Reset for next day
            }

            state.food += foodHit;
            state.water += waterHit;
            state.health += healthHit;

            log(`DAY ${state.day}: ${event.msg}`);

            // Check Death
            if (state.food <= 0) endGame("Starvation detected.");
            else if (state.water <= 0) endGame("Dehydration detected.");
            else if (state.health <= 0) endGame("Critical organ failure.");
            
            updateUI();
        }

        function updateUI() {
            document.getElementById('day-val').innerText = state.day;
            document.getElementById('food-val').innerText = state.food;
            document.getElementById('water-val').innerText = state.water;
            document.getElementById('health-val').innerText = state.health;

            document.getElementById('food-val').className = state.food < 20 ? 'res-val low' : 'res-val';
            document.getElementById('water-val').className = state.water < 20 ? 'res-val low' : 'res-val';
            document.getElementById('health-val').className = state.health < 30 ? 'res-val low' : 'res-val';
        }

        function log(msg) {
            const logEl = document.getElementById('log');
            logEl.innerText = msg;
        }

        function endGame(cause) {
            state.active = false;
            document.getElementById('game-over-screen').classList.remove('hidden');
            document.getElementById('cause-of-death').innerText = cause;
            document.getElementById('final-day').innerText = state.day;
        }
    </script>
</body>
</html>
