name: Bug Report
description: Report a bug
title: "[BUG] "
labels: ["bug"]

body:

* type: textarea
  id: bug
  attributes:
  label: Describe the Bug
  placeholder: What went wrong?
  validations:
  required: true

* type: textarea
  id: steps
  attributes:
  label: Steps to Reproduce
  placeholder: |
  1. Go to...
  2. Click...
  3. See issue...
  validations:
  required: true

* type: textarea
  id: expected
  attributes:
  label: Expected Behavior
  placeholder: What should happen?
  validations:
  required: true
