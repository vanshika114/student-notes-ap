<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Scientific Calculator | NSOC'26</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .calculator-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            width: 100%;
            max-width: 550px;
            backdrop-filter: blur(10px);
        }

        /* History Panel */
        .history-panel {
            background: #f7f9fc;
            border-bottom: 1px solid #e1e8ed;
            max-height: 150px;
            overflow-y: auto;
            padding: 10px 20px;
        }

        .history-title {
            font-size: 12px;
            color: #657786;
            margin-bottom: 8px;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .clear-history {
            background: none;
            border: none;
            color: #e74c3c;
            cursor: pointer;
            font-size: 12px;
            padding: 2px 8px;
            border-radius: 5px;
            transition: all 0.3s;
        }

        .clear-history:hover {
            background: #ffe5e5;
        }

        .history-list {
            list-style: none;
            font-size: 13px;
            color: #555;
        }

        .history-list li {
            padding: 5px 0;
            border-bottom: 1px solid #e1e8ed;
            font-family: 'Courier New', monospace;
            cursor: pointer;
            transition: all 0.2s;
        }

        .history-list li:hover {
            background: #e8ecf1;
            padding-left: 10px;
        }

        /* Display */
        .display {
            background: #1a1a2e;
            color: #fff;
            padding: 25px 20px;
            text-align: right;
        }

        .expression {
            font-size: 18px;
            color: #aaa;
            min-height: 30px;
            word-wrap: break-word;
            word-break: break-all;
        }

        .result {
            font-size: 42px;
            font-weight: bold;
            margin-top: 10px;
            word-wrap: break-word;
            word-break: break-all;
            font-family: 'Courier New', monospace;
        }

        /* Buttons */
        .buttons {
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 10px;
            background: #fff;
        }

        button {
            padding: 15px 0;
            font-size: 16px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 600;
            background: #f0f0f0;
            color: #333;
        }

        button:hover {
            transform: translateY(-2px);
            filter: brightness(0.95);
        }

        button:active {
            transform: translateY(0);
        }

        .btn-number {
            background: #fff;
            border: 1px solid #ddd;
            font-weight: 700;
            font-size: 18px;
        }

        .btn-operator {
            background: #ff6b6b;
            color: white;
        }

        .btn-scientific {
            background: #4ecdc4;
            color: white;
            font-size: 14px;
        }

        .btn-equals {
            background: #45b7d1;
            color: white;
            grid-column: span 2;
        }

        .btn-clear {
            background: #fe5f57;
            color: white;
        }

        .btn-backspace {
            background: #ffa502;
            color: white;
        }

        .btn-parenthesis {
            background: #a55eea;
            color: white;
        }

        @media (max-width: 600px) {
            .buttons {
                grid-template-columns: repeat(5, 1fr);
                gap: 8px;
            }
            
            button {
                padding: 12px 0;
                font-size: 14px;
            }
            
            .result {
                font-size: 32px;
            }
        }

        @media (max-width: 450px) {
            .buttons {
                grid-template-columns: repeat(4, 1fr);
            }
            
            .btn-equals {
                grid-column: span 1;
            }
        }

        .error {
            color: #ff6b6b;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="calculator-container">
        <!-- History Panel -->
        <div class="history-panel">
            <div class="history-title">
                <span>📜 Calculation History</span>
                <button class="clear-history" onclick="clearHistory()">Clear All</button>
            </div>
            <ul class="history-list" id="historyList">
                <li style="color:#999; text-align:center;">No history yet</li>
            </ul>
        </div>

        <!-- Display -->
        <div class="display">
            <div class="expression" id="expression"></div>
            <div class="result" id="result">0</div>
        </div>

        <!-- Buttons -->
        <div class="buttons">
            <!-- Row 1 -->
            <button class="btn-clear" onclick="clearAll()">AC</button>
            <button class="btn-backspace" onclick="backspace()">⌫</button>
            <button class="btn-parenthesis" onclick="addToExpression('(')">(</button>
            <button class="btn-parenthesis" onclick="addToExpression(')')">)</button>
            <button class="btn-scientific" onclick="addFunction('sqrt(')">√</button>
            <button class="btn-scientific" onclick="addFunction('cbrt(')">∛</button>

            <!-- Row 2 -->
            <button class="btn-number" onclick="addToExpression('7')">7</button>
            <button class="btn-number" onclick="addToExpression('8')">8</button>
            <button class="btn-number" onclick="addToExpression('9')">9</button>
            <button class="btn-operator" onclick="addToExpression('/')">÷</button>
            <button class="btn-scientific" onclick="addFunction('sin(')">sin</button>
            <button class="btn-scientific" onclick="addFunction('cos(')">cos</button>

            <!-- Row 3 -->
            <button class="btn-number" onclick="addToExpression('4')">4</button>
            <button class="btn-number" onclick="addToExpression('5')">5</button>
            <button class="btn-number" onclick="addToExpression('6')">6</button>
            <button class="btn-operator" onclick="addToExpression('*')">×</button>
            <button class="btn-scientific" onclick="addFunction('tan(')">tan</button>
            <button class="btn-scientific" onclick="addFunction('log(')">log</button>

            <!-- Row 4 -->
            <button class="btn-number" onclick="addToExpression('1')">1</button>
            <button class="btn-number" onclick="addToExpression('2')">2</button>
            <button class="btn-number" onclick="addToExpression('3')">3</button>
            <button class="btn-operator" onclick="addToExpression('-')">-</button>
            <button class="btn-scientific" onclick="addFunction('ln(')">ln</button>
            <button class="btn-scientific" onclick="addToExpression('^')">xʸ</button>

            <!-- Row 5 -->
            <button class="btn-number" onclick="addToExpression('0')">0</button>
            <button class="btn-number" onclick="addToExpression('.')">.</button>
            <button class="btn-scientific" onclick="addFunction('factorial(')">n!</button>
            <button class="btn-operator" onclick="addToExpression('+')">+</button>
            <button class="btn-scientific" onclick="addToExpression('**2')">x²</button>
            <button class="btn-scientific" onclick="addToExpression('**3')">x³</button>

            <!-- Row 6 -->
            <button class="btn-scientific" onclick="addConstant('pi')">π</button>
            <button class="btn-scientific" onclick="addConstant('e')">e</button>
            <button class="btn-scientific" onclick="addFunction('10^')">10ˣ</button>
            <button class="btn-scientific" onclick="addFunction('abs(')">|x|</button>
            <button class="btn-equals" onclick="calculate()" style="grid-column: span 2;">=</button>
        </div>
    </div>

    <script>
        let currentExpression = '';
        let history = [];

        // Load history from localStorage
        function loadHistory() {
            const saved = localStorage.getItem('calculatorHistory');
            if (saved) {
                history = JSON.parse(saved);
                updateHistoryDisplay();
            }
        }

        // Save history to localStorage
        function saveHistory() {
            localStorage.setItem('calculatorHistory', JSON.stringify(history.slice(-20))); // Keep last 20
        }

        // Update history UI
        function updateHistoryDisplay() {
            const historyList = document.getElementById('historyList');
            if (history.length === 0) {
                historyList.innerHTML = '<li style="color:#999; text-align:center;">No history yet</li>';
                return;
            }
            
            historyList.innerHTML = history.map(item => 
                `<li onclick="useHistory('${item.expression.replace(/'/g, "\\'")}')">
                    ${item.expression} = ${item.result}
                </li>`
            ).join('');
        }

        // Use history item
        function useHistory(expr) {
            currentExpression = expr;
            updateDisplay();
        }

        // Clear history
        function clearHistory() {
            history = [];
            saveHistory();
            updateHistoryDisplay();
        }

        // Add to expression
        function addToExpression(value) {
            currentExpression += value;
            updateDisplay();
        }

        // Add function with proper formatting
        function addFunction(func) {
            currentExpression += func;
            updateDisplay();
        }

        // Add constants
        function addConstant(constant) {
            if (constant === 'pi') {
                currentExpression += Math.PI;
            } else if (constant === 'e') {
                currentExpression += Math.E;
            }
            updateDisplay();
        }

        // Update display
        function updateDisplay() {
            document.getElementById('expression').innerHTML = currentExpression || ' ';
            document.getElementById('result').innerHTML = '0';
        }

        // Clear everything
        function clearAll() {
            currentExpression = '';
            updateDisplay();
        }

        // Backspace
        function backspace() {
            currentExpression = currentExpression.slice(0, -1);
            updateDisplay();
        }

        // Evaluate expression safely
        function evaluateExpression(expr) {
            // Replace display operators with JavaScript operators
            let processed = expr.replace(/×/g, '*').replace(/÷/g, '/').replace(/\^/g, '**');
            
            // Handle scientific functions
            processed = processed.replace(/sin\(/g, 'Math.sin(');
            processed = processed.replace(/cos\(/g, 'Math.cos(');
            processed = processed.replace(/tan\(/g, 'Math.tan(');
            processed = processed.replace(/log\(/g, 'Math.log10(');
            processed = processed.replace(/ln\(/g, 'Math.log(');
            processed = processed.replace(/sqrt\(/g, 'Math.sqrt(');
            processed = processed.replace(/cbrt\(/g, 'Math.cbrt(');
            processed = processed.replace(/abs\(/g, 'Math.abs(');
            
            // Handle factorial
            processed = processed.replace(/factorial\(([^)]+)\)/g, (match, num) => {
                return factorial(eval(num));
            });
            
            // Handle power of 10
            processed = processed.replace(/10\^\(([^)]+)\)/g, (match, num) => {
                return Math.pow(10, eval(num));
            });
            processed = processed.replace(/10\^([0-9.]+)/g, (match, num) => {
                return Math.pow(10, parseFloat(num));
            });
            
            // Handle pi and e
            processed = processed.replace(/π/g, Math.PI);
            
            // Handle implicit multiplication (e.g., 2sin(30) -> 2*sin(30))
            processed = processed.replace(/(\d)([a-zA-Z])/g, '$1*$2');
            
            try {
                // Use Function constructor for safer evaluation with restricted scope
                const result = Function('"use strict";return (' + processed + ')')();
                if (isNaN(result) || !isFinite(result)) {
                    throw new Error('Invalid calculation');
                }
                return Number(result.toFixed(10));
            } catch (error) {
                throw new Error('Invalid expression');
            }
        }
        
        // Factorial function
        function factorial(n) {
            if (n < 0) return NaN;
            if (n === 0 || n === 1) return 1;
            if (n > 170) return Infinity; // Prevent overflow
            let result = 1;
            for (let i = 2; i <= n; i++) {
                result *= i;
            }
            return result;
        }

        // Main calculate function
        function calculate() {
            if (!currentExpression.trim()) {
                document.getElementById('result').innerHTML = '0';
                return;
            }
            
            try {
                let result = evaluateExpression(currentExpression);
                
                // Format result
                let formattedResult = result;
                if (Number.isInteger(result)) {
                    formattedResult = result.toString();
                } else {
                    formattedResult = parseFloat(result.toFixed(8)).toString();
                }
                
                document.getElementById('result').innerHTML = formattedResult;
                
                // Add to history
                const historyItem = {
                    expression: currentExpression,
                    result: formattedResult,
                    timestamp: new Date().toLocaleTimeString()
                };
                history.unshift(historyItem);
                if (history.length > 20) history.pop();
                saveHistory();
                updateHistoryDisplay();
                
                // Optional: Set current expression to result for chaining calculations
                // currentExpression = formattedResult;
                
            } catch (error) {
                document.getElementById('result').innerHTML = 'Error';
                document.getElementById('result').classList.add('error');
                setTimeout(() => {
                    document.getElementById('result').classList.remove('error');
                }, 1000);
            }
        }

        // Keyboard Support
        document.addEventListener('keydown', (e) => {
            const key = e.key;
            
            // Numbers and operators
            if (/[0-9]/.test(key)) {
                e.preventDefault();
                addToExpression(key);
            }
            else if (key === '+' || key === '-' || key === '*' || key === '/') {
                e.preventDefault();
                let op = key;
                if (key === '*') op = '*';
                if (key === '/') op = '/';
                addToExpression(op);
            }
            else if (key === '.') {
                e.preventDefault();
                addToExpression('.');
            }
            else if (key === '(') {
                e.preventDefault();
                addToExpression('(');
            }
            else if (key === ')') {
                e.preventDefault();
                addToExpression(')');
            }
            else if (key === 'Enter' || key === '=') {
                e.preventDefault();
                calculate();
            }
            else if (key === 'Backspace') {
                e.preventDefault();
                backspace();
            }
            else if (key === 'Escape') {
                e.preventDefault();
                clearAll();
            }
            else if (key === '^') {
                e.preventDefault();
                addToExpression('^');
            }
        });

        // Load history on startup
        loadHistory();
        
        // Prevent default behavior for some keys
        window.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' || e.key === ' ' || e.key === 'Backspace' || e.key === 'Escape') {
                if (!e.target.matches('input, textarea, button')) {
                    e.preventDefault();
                }
            }
        });
    </script>
</body>
</html>
