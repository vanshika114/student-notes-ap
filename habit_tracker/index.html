<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daily Habit Tracker</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="tracker-shell">
    <header class="tracker-header">
      <h1>Daily Habit Tracker</h1>
      <p>Toggle habits for today and keep your streak going.</p>
      <div class="date-label" id="currentDate"></div>
    </header>

    <section class="habit-grid" id="habitGrid">
      <!-- Habit rows generated by script -->
    </section>

    <footer class="tracker-footer">
      <p>Data is saved locally in your browser.</p>
    </footer>
  </main>
  <script src="script.js"></script>
</body>
</html>
