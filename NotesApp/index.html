<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Notes App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>📝 Smart Notes App</h1>

        <div class="note-form">
            <input type="text" id="title" placeholder="Enter Note Title">
            <textarea id="description" placeholder="Write your note..."></textarea>

            <button id="saveBtn">Add Note</button>
        </div>

        <div class="notes-container" id="notesContainer"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
