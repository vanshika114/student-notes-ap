<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <style>
      .bg { fill: #f4f7f5; }
      .panel { fill: #ffffff; stroke: #e2ebd9; stroke-width: 1.5; }
      .router { fill: #1b3a24; stroke: #e2ebd9; stroke-width: 1; }
      .host { fill: #2e7d32; stroke: #e2ebd9; stroke-width: 1; }
      .link-line { stroke: #a5d6a7; stroke-width: 2; fill: none; }
      .path-line { stroke: #2e7d32; stroke-width: 3.5; fill: none; }
      .packet { fill: #e65100; stroke: #bf360c; stroke-width: 1; }
      .load-text { fill: #557a61; font-family: ui-monospace, Consolas, monospace; font-size: 8px; }
      .text-primary { fill: #1b3a24; font-family: ui-monospace, Consolas, monospace; }
      .text-secondary { fill: #557a61; font-family: ui-monospace, Consolas, monospace; }
      .text-white { fill: #ffffff; font-family: ui-monospace, Consolas, monospace; font-weight: bold; }
    </style>
  </defs>

  <rect class="bg" width="512" height="512" rx="12"/>
  <rect class="panel" x="24" y="24" width="464" height="464" rx="10"/>

  <text x="256" y="55" text-anchor="middle" class="text-primary" font-size="13" font-weight="bold" letter-spacing="1">NET-SPROUT</text>
  <text x="256" y="70" text-anchor="middle" class="text-secondary" font-size="9" letter-spacing="0.5">Packet Routing Simulator</text>

  <line x1="40" y1="80" x2="472" y2="80" stroke="#e2ebd9" stroke-width="1"/>

  <circle cx="96" cy="240" r="16" class="router"/>
  <text x="96" y="244" text-anchor="middle" class="text-white" font-size="9">R1</text>
  <text x="96" y="264" text-anchor="middle" class="load-text">192.168.1.1</text>

  <circle cx="256" cy="140" r="16" class="router"/>
  <text x="256" y="144" text-anchor="middle" class="text-white" font-size="9">R2</text>
  <text x="256" y="164" text-anchor="middle" class="load-text">192.168.1.2</text>

  <circle cx="416" cy="220" r="16" class="router"/>
  <text x="416" y="224" text-anchor="middle" class="text-white" font-size="9">R3</text>
  <text x="416" y="244" text-anchor="middle" class="load-text">192.168.1.3</text>

  <circle cx="256" cy="360" r="12" class="host"/>
  <text x="256" y="364" text-anchor="middle" class="text-white" font-size="7">H</text>
  <text x="256" y="380" text-anchor="middle" class="load-text">Host-A</text>

  <circle cx="60" cy="380" r="12" class="host"/>
  <text x="60" y="384" text-anchor="middle" class="text-white" font-size="7">H</text>
  <text x="60" y="400" text-anchor="middle" class="load-text">Host-B</text>

  <circle cx="460" cy="380" r="12" class="host"/>
  <text x="460" y="384" text-anchor="middle" class="text-white" font-size="7">H</text>
  <text x="460" y="400" text-anchor="middle" class="load-text">Host-C</text>

  <line x1="96" y1="240" x2="256" y2="140" class="link-line"/>
  <line x1="256" y1="140" x2="416" y2="220" class="link-line"/>
  <line x1="416" y1="220" x2="256" y2="360" class="link-line"/>
  <line x1="96" y1="240" x2="60" y2="380" class="link-line"/>
  <line x1="96" y1="240" x2="256" y2="360" class="link-line"/>
  <line x1="256" y1="140" x2="460" y2="380" class="link-line"/>

  <line x1="96" y1="240" x2="416" y2="220" class="path-line" stroke-dasharray="8,4"/>

  <text x="175" y="182" text-anchor="middle" class="load-text" transform="rotate(-20, 175, 182)">500 Mbps | 200m</text>
  <text x="340" y="175" text-anchor="middle" class="load-text" transform="rotate(30, 340, 175)">300 Mbps | 150m</text>

  <circle cx="180" cy="178" r="6" class="packet"/>
  <circle cx="340" cy="170" r="6" class="packet"/>

  <line x1="40" y1="425" x2="472" y2="425" stroke="#e2ebd9" stroke-width="1"/>

  <rect x="60" y="432" width="160" height="28" rx="4" fill="#e8f5e9" stroke="#e2ebd9" stroke-width="1"/>
  <text x="140" y="450" text-anchor="middle" class="text-secondary" font-size="9">Dijkstra SPF</text>

  <rect x="240" y="432" width="160" height="28" rx="4" fill="#e8f5e9" stroke="#e2ebd9" stroke-width="1"/>
  <text x="320" y="450" text-anchor="middle" class="text-secondary" font-size="9">Hop-Count</text>

  <rect x="420" y="432" width="50" height="28" rx="4" fill="#f5f0eb" stroke="#e2ebd9" stroke-width="1"/>
  <text x="445" y="450" text-anchor="middle" class="text-secondary" font-size="9">T</text>

  <path d="M80 80 Q76 74 82 70 Q88 66 84 60" fill="none" stroke="#2e7d32" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M430 80 Q434 74 428 70 Q422 66 426 60" fill="none" stroke="#2e7d32" stroke-width="1.5" stroke-linecap="round"/>
</svg>
