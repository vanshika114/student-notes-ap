<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Endless Runner</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="app">
    <div id="telemetry">
      <div class="tm"><span class="tl">DISTANCE</span><span id="distVal" class="tv">0</span></div>
      <div class="tm"><span class="tl">SPEED</span><span id="speedVal" class="tv">1.0&#x00D7;</span></div>
      <div class="tm"><span class="tl">BEST</span><span id="bestVal" class="tv">0</span></div>
    </div>

    <div id="canvasWrap">
      <canvas id="gameCanvas"></canvas>

      <div id="overlay" class="overlay">
        <div class="ol-title">ENDLESS RUNNER</div>
        <div class="ol-sub">Jump with Click, Tap, Space, or Up Arrow</div>
        <button id="startBtn">START RUN</button>
      </div>

      <div id="gameover" class="overlay hidden">
        <div class="ol-title go">CRASH</div>
        <div id="goStats" class="ol-sub"></div>
        <button id="restartBtn">TRY AGAIN</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
