<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Cracker — Brute Force Logic</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=JetBrains+Mono:wght@500;700&display=swap');

        :root {
            --bg: #020617;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent: #22d3ee;
            --primary: #f472b6;
            --secondary: #8b5cf6;
            --success: #10b981;
            --error: #f43f5e;
            --text: #f1f5f9;
        }

        body {
            margin: 0;
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            background: radial-gradient(circle at top right, #1e1b4b 0%, #020617 100%);
            color: var(--text);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .container {
            width: 90%;
            max-width: 480px;
            position: relative;
        }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(25px) saturate(180%);
            border: 1px solid var(--glass-border);
            border-radius: 40px;
            padding: 40px 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 800;
            margin: 0 0 10px;
            background: linear-gradient(to bottom right, #fff, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        .stats {
            display: flex;
            justify-content: space-between;
            margin-bottom: 30px;
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .hint-container {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 30px;
            border: 1px solid var(--glass-border);
            text-align: left;
        }

        .hint-item {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1rem;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            color: var(--accent);
        }

        .hint-item::before {
            content: "◆";
            margin-right: 12px;
            font-size: 0.8rem;
            color: var(--primary);
        }

        .input-group {
            position: relative;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid var(--glass-border);
            border-radius: 20px;
            padding: 18px;
            color: white;
            font-size: 1.2rem;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 2px;
            outline: none;
            transition: all 0.3s;
            box-sizing: border-box;
        }

        input:focus {
            border-color: var(--accent);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 20px rgba(34, 211, 238, 0.2);
        }

        .btn-main {
            background: linear-gradient(135deg, var(--accent), var(--secondary));
            color: white;
            border: none;
            padding: 18px 48px;
            border-radius: 24px;
            font-weight: 800;
            font-size: 1.1rem;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s;
            box-shadow: 0 10px 25px -5px rgba(139, 92, 246, 0.4);
        }

        .btn-main:hover {
            transform: translateY(-3px);
            filter: brightness(1.1);
        }

        .feedback {
            margin-top: 20px;
            font-weight: 600;
            min-height: 24px;
        }

        .overlay {
            position: absolute;
            inset: 0;
            background: rgba(2, 6, 23, 0.95);
            backdrop-filter: blur(20px);
            z-index: 10;
            border-radius: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="container">
        <div class="glass-card">
            <div id="game-overlay" class="overlay">
                <h1>Password Cracker</h1>
                <p style="margin-bottom: 30px; opacity: 0.7;">Decrypt the sequence using provided clues.</p>
                <button class="btn-main" onclick="startGame()">Access Terminal</button>
            </div>

            <div class="stats">
                <span>Round: <span id="round-val">1</span>/5</span>
                <span>Score: <span id="score-val">0</span></span>
            </div>

            <div class="hint-container" id="hint-list">
                <!-- Hints go here -->
            </div>

            <div class="input-group">
                <input type="text" id="user-input" placeholder="ENTER PASSWORD" autocomplete="off" onkeydown="if(event.key==='Enter') checkGuess()">
            </div>

            <button class="btn-main" onclick="checkGuess()">Crack Password</button>
            <div id="feedback" class="feedback"></div>
        </div>
    </div>

    <script>
        const WORDS = ["BRAIN", "LIGHT", "SPACE", "GHOST", "PIZZA", "CLOUD", "STORM", "WIZARD", "DRAGON", "COFFEE"];
        let state = { score: 0, round: 0, currentWord: "" };

        function startGame() {
            state.score = 0;
            state.round = 0;
            document.getElementById('game-overlay').classList.add('hidden');
            nextRound();
        }

        function nextRound() {
            if (state.round >= 5) return endGame();
            
            state.round++;
            state.currentWord = WORDS[Math.floor(Math.random() * WORDS.length)];
            
            document.getElementById('round-val').innerText = state.round;
            document.getElementById('score-val').innerText = state.score;
            document.getElementById('feedback').innerText = "";
            document.getElementById('user-input').value = "";
            document.getElementById('user-input').focus();

            generateHints();
        }

        function generateHints() {
            const word = state.currentWord;
            const hints = [
                `Length = ${word.length}`,
                `Starts with ${word[0]}`,
                `Contains a vowel: ${/[AEIOU]/i.test(word) ? "YES" : "NO"}`
            ];

            const hintList = document.getElementById('hint-list');
            hintList.innerHTML = hints.map(h => `<div class="hint-item">${h}</div>`).join('');
        }

        function checkGuess() {
            const input = document.getElementById('user-input').value.trim().toUpperCase();
            const feedback = document.getElementById('feedback');

            if (input === state.currentWord) {
                state.score += 100;
                feedback.innerText = "ACCESS GRANTED! 🔓";
                feedback.style.color = "var(--success)";
                setTimeout(nextRound, 1500);
            } else {
                feedback.innerText = "ACCESS DENIED! ❌";
                feedback.style.color = "var(--error)";
                document.getElementById('user-input').select();
            }
        }

        function endGame() {
            const overlay = document.getElementById('game-overlay');
            overlay.classList.remove('hidden');
            overlay.querySelector('h1').innerText = "System Breached";
            overlay.querySelector('p').innerText = `You cracked the encryption with a score of ${state.score}!`;
            overlay.querySelector('button').innerText = "Reboot Terminal";
        }
    </script>
</body>
</html>
