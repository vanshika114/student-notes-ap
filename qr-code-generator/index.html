<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code Generator | NSOC Contribution</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            transition: background 0.3s ease;
        }

        body.dark {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            transition: all 0.3s ease;
        }

        body.dark .container {
            background: #1e1e2e;
            color: white;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 24px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .theme-toggle {
            background: #f0f0f0;
            border: none;
            padding: 10px 15px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 18px;
            transition: 0.3s;
        }

        body.dark .theme-toggle {
            background: #2d2d44;
            color: white;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
        }

        input, textarea, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            transition: 0.3s;
            background: white;
        }

        body.dark input,
        body.dark textarea,
        body.dark select {
            background: #2d2d44;
            border-color: #3d3d5e;
            color: white;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        .size-group {
            margin-bottom: 20px;
        }

        .size-buttons {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .size-btn {
            flex: 1;
            padding: 10px;
            border: 2px solid #e0e0e0;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        body.dark .size-btn {
            background: #2d2d44;
            border-color: #3d3d5e;
            color: white;
        }

        .size-btn.active {
            background: #667eea;
            border-color: #667eea;
            color: white;
        }

        .generate-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            margin-bottom: 20px;
        }

        .generate-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102,126,234,0.4);
        }

        .qr-container {
            text-align: center;
            padding: 20px;
            background: #f9f9f9;
            border-radius: 15px;
            margin-bottom: 20px;
        }

        body.dark .qr-container {
            background: #2d2d44;
        }

        #qrCode {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 200px;
        }

        canvas {
            border-radius: 10px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        .download-btn {
            width: 100%;
            padding: 12px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .download-btn:hover {
            background: #218838;
        }

        .copy-btn {
            background: #17a2b8;
            margin-top: 10px;
        }

        .copy-btn:hover {
            background: #138496;
        }

        .history-section {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 2px solid #e0e0e0;
        }

        body.dark .history-section {
            border-top-color: #3d3d5e;
        }

        .history-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .history-list {
            list-style: none;
        }

        .history-list li {
            padding: 8px;
            background: #f0f0f0;
            margin-bottom: 5px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        body.dark .history-list li {
            background: #2d2d44;
        }

        .history-list li:hover {
            background: #667eea;
            color: white;
        }

        @media (max-width: 480px) {
            .container {
                padding: 20px;
            }
            h1 {
                font-size: 20px;
            }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📱 QR Code Generator</h1>
            <button class="theme-toggle" onclick="toggleTheme()">🌙</button>
        </div>

        <div class="input-group">
            <label>🔗 Enter Text or URL</label>
            <textarea id="textInput" placeholder="Enter text, URL, or any data..."></textarea>
        </div>

        <div class="size-group">
            <label>📏 QR Code Size</label>
            <div class="size-buttons">
                <button class="size-btn" data-size="100">Small</button>
                <button class="size-btn active" data-size="150">Medium</button>
                <button class="size-btn" data-size="200">Large</button>
            </div>
        </div>

        <button class="generate-btn" onclick="generateQR()">✨ Generate QR Code</button>

        <div class="qr-container">
            <div id="qrCode"></div>
            <button class="download-btn" onclick="downloadQR()">💾 Download as PNG</button>
            <button class="download-btn copy-btn" onclick="copyURL()">📋 Copy URL</button>
        </div>

        <div class="history-section">
            <div class="history-title">🕒 Last 5 Generated QR Codes</div>
            <ul class="history-list" id="historyList"></ul>
        </div>
    </div>

    <script>
        let currentQR = null;
        let currentSize = 150;
        let history = [];

        // Load history from local storage
        function loadHistory() {
            const saved = localStorage.getItem('qrHistory');
            if (saved) {
                history = JSON.parse(saved);
                displayHistory();
            }
        }

        // Save history to local storage
        function saveHistory() {
            localStorage.setItem('qrHistory', JSON.stringify(history));
        }

        // Display history
        function displayHistory() {
            const historyList = document.getElementById('historyList');
            historyList.innerHTML = '';
            history.slice(-5).reverse().forEach(item => {
                const li = document.createElement('li');
                li.textContent = item.length > 40 ? item.substring(0, 40) + '...' : item;
                li.onclick = () => {
                    document.getElementById('textInput').value = item;
                    generateQR();
                };
                historyList.appendChild(li);
            });
        }

        // Add to history
        function addToHistory(text) {
            if (!text.trim()) return;
            if (!history.includes(text)) {
                history.push(text);
                if (history.length > 5) history.shift();
                saveHistory();
                displayHistory();
            }
        }

        // Generate QR Code
        function generateQR() {
            const text = document.getElementById('textInput').value.trim();
            if (!text) {
                alert('Please enter some text or URL!');
                return;
            }

            // Clear previous QR
            document.getElementById('qrCode').innerHTML = '';

            // Generate new QR
            currentQR = new QRCode(document.getElementById('qrCode'), {
                text: text,
                width: currentSize,
                height: currentSize,
                colorDark: "#000000",
                colorLight: "#ffffff",
                correctLevel: QRCode.CorrectLevel.H
            });

            addToHistory(text);
        }

        // Download QR as PNG
        function downloadQR() {
            const canvas = document.querySelector('#qrCode canvas');
            if (!canvas) {
                alert('Please generate a QR code first!');
                return;
            }
            const link = document.createElement('a');
            link.download = 'qrcode.png';
            link.href = canvas.toDataURL();
            link.click();
        }

        // Copy URL/text to clipboard
        function copyURL() {
            const text = document.getElementById('textInput').value.trim();
            if (!text) {
                alert('Nothing to copy!');
                return;
            }
            navigator.clipboard.writeText(text);
            alert('Copied to clipboard! ✅');
        }

        // Theme toggle
        function toggleTheme() {
            document.body.classList.toggle('dark');
            const btn = document.querySelector('.theme-toggle');
            if (document.body.classList.contains('dark')) {
                btn.textContent = '☀️';
            } else {
                btn.textContent = '🌙';
            }
        }

        // Size selection
        document.querySelectorAll('.size-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentSize = parseInt(btn.dataset.size);
                const text = document.getElementById('textInput').value.trim();
                if (text) generateQR();
            });
        });

        // Load history on page load
        loadHistory();

        // Enter key shortcut
        document.getElementById('textInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                generateQR();
            }
        });
    </script>
</body>
</html>
