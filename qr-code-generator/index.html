<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>QR Code Generator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="qr-app">
    <h1>QR Code Generator</h1>
    <p class="muted">Enter text or a URL and generate a downloadable QR code (no external APIs).</p>

    <label for="inputText">Text / URL</label>
    <input id="inputText" placeholder="https://example.com or any text" />

    <div class="row">
      <div>
        <label for="size">Size (px)</label>
        <input id="size" type="number" value="256" min="64" max="1024" />
      </div>
      <div>
        <label for="margin">Margin</label>
        <input id="margin" type="number" value="2" min="0" max="20" />
      </div>
    </div>

    <div class="actions">
      <button id="generate">Generate</button>
      <button id="download" disabled>Download PNG</button>
      <button id="clear">Clear</button>
    </div>

    <div class="output">
      <canvas id="qrcanvas"></canvas>
      <div id="qrplaceholder">Your QR will appear here</div>
    </div>

    <footer class="note">Uses lightweight client-side library `qrcode`.</footer>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
