<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Password Generator | NSOC Contribution</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 30px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.2);
        }

        h1 {
            text-align: center;
            color: white;
            font-size: 28px;
            margin-bottom: 20px;
            text-shadow: 0 0 10px rgba(0,255,255,0.5);
        }

        .password-display {
            background: rgba(0,0,0,0.5);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }

        #password {
            font-size: 20px;
            color: #00ffcc;
            word-break: break-all;
            flex: 1;
            font-family: monospace;
            letter-spacing: 1px;
        }

        .password-actions {
            display: flex;
            gap: 10px;
        }

        .icon-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            border-radius: 10px;
            padding: 10px;
            cursor: pointer;
            font-size: 18px;
            transition: 0.3s;
            color: white;
        }

        .icon-btn:hover {
            background: rgba(255,255,255,0.2);
            transform: scale(1.05);
        }

        .length-control {
            margin-bottom: 20px;
        }

        .length-control label {
            color: white;
            display: block;
            margin-bottom: 10px;
        }

        #lengthSlider {
            width: 100%;
            height: 5px;
            border-radius: 5px;
            background: rgba(255,255,255,0.2);
            outline: none;
            cursor: pointer;
        }

        #lengthSlider::-webkit-slider-thumb {
            appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #00ffcc;
            cursor: pointer;
        }

        #lengthValue {
            color: #00ffcc;
            font-weight: bold;
            margin-left: 10px;
        }

        .options {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .option {
            display: flex;
            align-items: center;
            gap: 10px;
            color: white;
            cursor: pointer;
        }

        .option input {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #00ffcc;
        }

        .strength-indicator {
            margin-bottom: 20px;
        }

        .strength-label {
            color: white;
            margin-bottom: 10px;
        }

        .strength-bar {
            height: 10px;
            background: rgba(255,255,255,0.2);
            border-radius: 5px;
            overflow: hidden;
            margin-bottom: 10px;
        }

        .strength-fill {
            height: 100%;
            width: 0%;
            transition: 0.3s;
            border-radius: 5px;
        }

        .strength-text {
            color: white;
            font-size: 14px;
        }

        .generate-btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            transition: 0.3s;
            margin-bottom: 10px;
        }

        .generate-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102,126,234,0.4);
        }

        @media (max-width: 480px) {
            .container {
                padding: 20px;
            }
            #password {
                font-size: 14px;
            }
            .options {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 Random Password Generator</h1>

        <div class="password-display">
            <div id="password">Click Generate</div>
            <div class="password-actions">
                <button class="icon-btn" id="copyBtn" title="Copy to clipboard">📋</button>
                <button class="icon-btn" id="toggleVisibility" title="Show/Hide">👁️</button>
            </div>
        </div>

        <div class="length-control">
            <label>Password Length: <span id="lengthValue">12</span></label>
            <input type="range" id="lengthSlider" min="6" max="20" value="12">
        </div>

        <div class="options">
            <label class="option">
                <input type="checkbox" id="uppercase" checked> Uppercase (A-Z)
            </label>
            <label class="option">
                <input type="checkbox" id="lowercase" checked> Lowercase (a-z)
            </label>
            <label class="option">
                <input type="checkbox" id="numbers" checked> Numbers (0-9)
            </label>
            <label class="option">
                <input type="checkbox" id="symbols" checked> Symbols (!@#$%^&*)
            </label>
        </div>

        <div class="strength-indicator">
            <div class="strength-label">Password Strength:</div>
            <div class="strength-bar">
                <div class="strength-fill" id="strengthFill"></div>
            </div>
            <div class="strength-text" id="strengthText">Medium</div>
        </div>

        <button class="generate-btn" id="generateBtn">✨ Generate Password</button>
    </div>

    <script>
        // Character sets
        const uppercaseChars = 'ABCDEFGHJKLMNPQRSTUVWXYZ';
        const lowercaseChars = 'abcdefghijkmnopqrstuvwxyz';
        const numberChars = '23456789';
        const symbolChars = '!@#$%^&*()_+[]{}<>?';

        let isPasswordVisible = true;

        // DOM Elements
        const passwordDisplay = document.getElementById('password');
        const lengthSlider = document.getElementById('lengthSlider');
        const lengthValue = document.getElementById('lengthValue');
        const uppercaseCheck = document.getElementById('uppercase');
        const lowercaseCheck = document.getElementById('lowercase');
        const numbersCheck = document.getElementById('numbers');
        const symbolsCheck = document.getElementById('symbols');
        const generateBtn = document.getElementById('generateBtn');
        const copyBtn = document.getElementById('copyBtn');
        const toggleVisibility = document.getElementById('toggleVisibility');
        const strengthFill = document.getElementById('strengthFill');
        const strengthText = document.getElementById('strengthText');

        // Update length display
        lengthSlider.addEventListener('input', () => {
            lengthValue.textContent = lengthSlider.value;
            generatePassword();
        });

        // Generate password
        function generatePassword() {
            let availableChars = '';
            
            if(uppercaseCheck.checked) availableChars += uppercaseChars;
            if(lowercaseCheck.checked) availableChars += lowercaseChars;
            if(numbersCheck.checked) availableChars += numberChars;
            if(symbolsCheck.checked) availableChars += symbolChars;
            
            // Check if at least one option is selected
            if(availableChars === '') {
                passwordDisplay.textContent = 'Select at least one option!';
                return;
            }
            
            const length = parseInt(lengthSlider.value);
            let password = '';
            
            // Secure random generation
            const randomValues = new Uint32Array(length);
            crypto.getRandomValues(randomValues);
            
            for(let i = 0; i < length; i++) {
                const randomIndex = randomValues[i] % availableChars.length;
                password += availableChars[randomIndex];
            }
            
            // Shuffle password for better randomness
            password = shuffleString(password);
            
            if(!isPasswordVisible) {
                passwordDisplay.textContent = '•'.repeat(password.length);
                passwordDisplay.dataset.password = password;
            } else {
                passwordDisplay.textContent = password;
            }
            
            calculateStrength(password);
        }
        
        // Shuffle string for better randomness
        function shuffleString(str) {
            const arr = str.split('');
            for(let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(crypto.getRandomValues(new Uint32Array(1))[0] % (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr.join('');
        }
        
        // Calculate password strength
        function calculateStrength(password) {
            let score = 0;
            
            // Length score
            if(password.length >= 12) score += 2;
            else if(password.length >= 8) score += 1;
            
            // Character variety
            if(/[A-Z]/.test(password)) score += 1;
            if(/[a-z]/.test(password)) score += 1;
            if(/[0-9]/.test(password)) score += 1;
            if(/[^A-Za-z0-9]/.test(password)) score += 2;
            
            let strength = '';
            let color = '';
            let width = '';
            
            if(score >= 6) {
                strength = 'Strong 💪';
                color = '#00ff00';
                width = '100%';
            } else if(score >= 4) {
                strength = 'Medium 👍';
                color = '#ffd200';
                width = '66%';
            } else {
                strength = 'Weak ⚠️';
                color = '#ff6b6b';
                width = '33%';
            }
            
            strengthText.textContent = strength;
            strengthFill.style.width = width;
            strengthFill.style.backgroundColor = color;
        }
        
        // Copy to clipboard
        async function copyPassword() {
            let passwordToCopy = '';
            
            if(!isPasswordVisible && passwordDisplay.dataset.password) {
                passwordToCopy = passwordDisplay.dataset.password;
            } else {
                passwordToCopy = passwordDisplay.textContent;
            }
            
            if(passwordToCopy === 'Click Generate' || passwordToCopy === 'Select at least one option!') {
                alert('Generate a password first!');
                return;
            }
            
            try {
                await navigator.clipboard.writeText(passwordToCopy);
                
                // Show feedback
                const originalText = copyBtn.textContent;
                copyBtn.textContent = '✅';
                setTimeout(() => {
                    copyBtn.textContent = originalText;
                }, 1500);
            } catch(err) {
                alert('Copy failed: Permission denied');
            }
        }
        
        // Toggle password visibility
        function togglePasswordVisibility() {
            isPasswordVisible = !isPasswordVisible;
            
            if(passwordDisplay.dataset.password) {
                if(isPasswordVisible) {
                    passwordDisplay.textContent = passwordDisplay.dataset.password;
                } else {
                    passwordDisplay.dataset.password = passwordDisplay.textContent;
                    passwordDisplay.textContent = '•'.repeat(passwordDisplay.textContent.length);
                }
            } else {
                const currentPassword = passwordDisplay.textContent;
                if(!isPasswordVisible && currentPassword !== 'Click Generate') {
                    passwordDisplay.dataset.password = currentPassword;
                    passwordDisplay.textContent = '•'.repeat(currentPassword.length);
                } else if(isPasswordVisible && passwordDisplay.dataset.password) {
                    passwordDisplay.textContent = passwordDisplay.dataset.password;
                    delete passwordDisplay.dataset.password;
                }
            }
            
            toggleVisibility.textContent = isPasswordVisible ? '👁️' : '🔒';
        }
        
        // Event listeners
        generateBtn.addEventListener('click', generatePassword);
        copyBtn.addEventListener('click', copyPassword);
        toggleVisibility.addEventListener('click', togglePasswordVisibility);
        
        document.querySelectorAll('.option input').forEach(checkbox => {
            checkbox.addEventListener('change', generatePassword);
        });
        
        // Generate initial password
        generatePassword();
    </script>
</body>
</html>
