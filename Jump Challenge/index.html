<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jump Challenge</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="app">
    <div id="telemetry">
      <div class="tm"><span class="tl">SCORE</span><span id="scoreVal" class="tv">0</span></div>
      <div class="tm"><span class="tl">LEVEL</span><span id="levelVal" class="tv">1</span></div>
      <div class="tm"><span class="tl">BEST</span><span id="bestVal" class="tv">0</span></div>
    </div>

    <div id="canvasWrap">
      <canvas id="gameCanvas"></canvas>

      <div id="overlay" class="overlay">
        <div class="ol-title">JUMP CHALLENGE</div>
        <div class="ol-sub">Click, Tap, or Press Space to Jump</div>
        <button id="startBtn">START GAME</button>
      </div>

      <div id="gameover" class="overlay hidden">
        <div class="ol-title go">GAME OVER</div>
        <div id="goScore" class="ol-sub"></div>
        <button id="restartBtn">PLAY AGAIN</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
