<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Habit Tracker | Build Better Habits</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .header p {
            opacity: 0.9;
            font-size: 1.1rem;
        }

        /* Stats Cards */
        .stats-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: transform 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-card h3 {
            color: #667eea;
            font-size: 0.9rem;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: bold;
            color: #333;
        }

        /* Add Habit Section */
        .add-habit-section {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .add-habit-form {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .habit-input {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid #e1e8ed;
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .habit-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .add-btn {
            padding: 12px 25px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.3s;
        }

        .add-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102,126,234,0.4);
        }

        /* Habits Grid */
        .habits-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }

        .habit-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            transition: all 0.3s;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .habit-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.15);
        }

        .habit-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #f0f0f0;
        }

        .habit-name {
            font-size: 1.3rem;
            font-weight: bold;
            color: #333;
            word-break: break-word;
        }

        .delete-habit {
            background: #ff6b6b;
            color: white;
            border: none;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2rem;
            transition: all 0.3s;
        }

        .delete-habit:hover {
            background: #ff4757;
            transform: scale(1.1);
        }

        .streak-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding: 10px;
            background: #f7f9fc;
            border-radius: 10px;
        }

        .streak-badge {
            background: #ffa502;
            color: white;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: bold;
        }

        .best-streak {
            color: #2ed573;
            font-size: 0.85rem;
        }

        /* Weekly View */
        .weekly-view {
            margin-top: 15px;
        }

        .week-days {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
            text-align: center;
        }

        .day {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .day-name {
            font-size: 0.7rem;
            color: #666;
            font-weight: 600;
        }

        .check-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 2px solid #ddd;
            background: white;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .check-btn.checked {
            background: #2ed573;
            border-color: #2ed573;
            color: white;
        }

        .check-btn:hover {
            transform: scale(1.1);
        }

        .date-label {
            font-size: 0.65rem;
            color: #999;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            background: white;
            border-radius: 15px;
            color: #999;
        }

        .empty-state svg {
            width: 100px;
            height: 100px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .habits-container {
                grid-template-columns: 1fr;
            }
            
            .header h1 {
                font-size: 1.8rem;
            }
            
            .check-btn {
                width: 35px;
                height: 35px;
                font-size: 1rem;
            }
            
            .day-name {
                font-size: 0.6rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>
                📊 Habit Tracker
            </h1>
            <p>Build better habits, one day at a time 🔥</p>
        </div>

        <!-- Stats -->
        <div class="stats-container">
            <div class="stat-card">
                <h3>Total Habits</h3>
                <div class="stat-value" id="totalHabits">0</div>
            </div>
            <div class="stat-card">
                <h3>Total Check-ins</h3>
                <div class="stat-value" id="totalCheckins">0</div>
            </div>
            <div class="stat-card">
                <h3>Longest Streak</h3>
                <div class="stat-value" id="globalBestStreak">0</div>
            </div>
        </div>

        <!-- Add Habit -->
        <div class="add-habit-section">
            <form id="addHabitForm" class="add-habit-form">
                <input type="text" id="habitNameInput" class="habit-input" placeholder="Enter a new habit... (e.g., Read for 30 mins)" required>
                <button type="submit" class="add-btn">➕ Add Habit</button>
            </form>
        </div>

        <!-- Habits List -->
        <div id="habitsContainer" class="habits-container"></div>
    </div>

    <script>
        // Habit Tracker Class
        class HabitTracker {
            constructor() {
                this.habits = [];
                this.loadFromLocalStorage();
                this.render();
            }

            // Load data from localStorage
            loadFromLocalStorage() {
                const saved = localStorage.getItem('habitTrackerData');
                if (saved) {
                    this.habits = JSON.parse(saved);
                } else {
                    // Sample habits for demo
                    this.habits = [
                        {
                            id: Date.now() + 1,
                            name: "Morning Meditation 🧘",
                            streak: 0,
                            bestStreak: 0,
                            lastCheckDate: this.getTodayString(),
                            history: this.generateLast7Days()
                        },
                        {
                            id: Date.now() + 2,
                            name: "Read Books 📚",
                            streak: 0,
                            bestStreak: 0,
                            lastCheckDate: this.getTodayString(),
                            history: this.generateLast7Days()
                        }
                    ];
                    this.saveToLocalStorage();
                }
            }

            // Save to localStorage
            saveToLocalStorage() {
                localStorage.setItem('habitTrackerData', JSON.stringify(this.habits));
            }

            // Get today's date as string (YYYY-MM-DD)
            getTodayString() {
                const today = new Date();
                return today.toISOString().split('T')[0];
            }

            // Get last 7 days dates
            getLast7Days() {
                const dates = [];
                for (let i = 6; i >= 0; i--) {
                    const date = new Date();
                    date.setDate(date.getDate() - i);
                    dates.push(date.toISOString().split('T')[0]);
                }
                return dates;
            }

            // Generate initial history for last 7 days
            generateLast7Days() {
                const history = {};
                const dates = this.getLast7Days();
                dates.forEach(date => {
                    history[date] = false;
                });
                return history;
            }

            // Add new habit
            addHabit(name) {
                if (!name.trim()) return false;
                
                const newHabit = {
                    id: Date.now(),
                    name: name.trim(),
                    streak: 0,
                    bestStreak: 0,
                    lastCheckDate: this.getTodayString(),
                    history: this.generateLast7Days()
                };
                
                this.habits.push(newHabit);
                this.saveToLocalStorage();
                this.render();
                return true;
            }

            // Delete habit
            deleteHabit(id) {
                this.habits = this.habits.filter(habit => habit.id !== id);
                this.saveToLocalStorage();
                this.render();
            }

            // Toggle habit check for a specific date
            toggleHabitCheck(habitId, date) {
                const habit = this.habits.find(h => h.id === habitId);
                if (!habit) return;

                // Toggle the check
                habit.history[date] = !habit.history[date];
                
                // Update streak
                this.updateStreak(habit);
                
                this.saveToLocalStorage();
                this.render();
            }

            // Update streak count for a habit
            updateStreak(habit) {
                const dates = this.getLast7Days();
                let currentStreak = 0;
                let maxStreak = 0;
                
                // Calculate current streak from today going backwards
                for (let i = 0; i < dates.length; i++) {
                    const date = dates[i];
                    if (habit.history[date] === true) {
                        currentStreak++;
                        maxStreak = Math.max(maxStreak, currentStreak);
                    } else {
                        break; // Break streak if a day is missed
                    }
                }
                
                habit.streak = currentStreak;
                habit.bestStreak = Math.max(habit.bestStreak, currentStreak);
                habit.lastCheckDate = this.getTodayString();
            }

            // Get total check-ins across all habits
            getTotalCheckins() {
                let total = 0;
                this.habits.forEach(habit => {
                    Object.values(habit.history).forEach(checked => {
                        if (checked) total++;
                    });
                });
                return total;
            }

            // Get global best streak
            getGlobalBestStreak() {
                let best = 0;
                this.habits.forEach(habit => {
                    best = Math.max(best, habit.bestStreak);
                });
                return best;
            }

            // Render all habits
            render() {
                const container = document.getElementById('habitsContainer');
                const totalHabitsSpan = document.getElementById('totalHabits');
                const totalCheckinsSpan = document.getElementById('totalCheckins');
                const globalBestStreakSpan = document.getElementById('globalBestStreak');
                
                // Update stats
                totalHabitsSpan.textContent = this.habits.length;
                totalCheckinsSpan.textContent = this.getTotalCheckins();
                globalBestStreakSpan.textContent = this.getGlobalBestStreak();
                
                if (this.habits.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <div style="font-size: 4rem;">📭</div>
                            <h3>No habits yet!</h3>
                            <p>Add your first habit above to start tracking 📊</p>
                        </div>
                    `;
                    return;
                }
                
                const dates = this.getLast7Days();
                const today = this.getTodayString();
                
                container.innerHTML = this.habits.map(habit => {
                    // Generate week days HTML
                    const weekHtml = dates.map(date => {
                        const isChecked = habit.history[date] || false;
                        const dayName = new Date(date).toLocaleDateString('en-US', { weekday: 'short' });
                        const dateDisplay = date.split('-')[2];
                        const isToday = date === today;
                        
                        return `
                            <div class="day">
                                <div class="day-name" style="${isToday ? 'color: #667eea; font-weight: bold;' : ''}">
                                    ${dayName}
                                </div>
                                <button 
                                    class="check-btn ${isChecked ? 'checked' : ''}"
                                    onclick="tracker.toggleHabitCheck(${habit.id}, '${date}')"
                                >
                                    ${isChecked ? '✓' : '○'}
                                </button>
                                <div class="date-label">${dateDisplay}</div>
                            </div>
                        `;
                    }).join('');
                    
                    return `
                        <div class="habit-card" data-id="${habit.id}">
                            <div class="habit-header">
                                <div class="habit-name">${this.escapeHtml(habit.name)}</div>
                                <button class="delete-habit" onclick="tracker.deleteHabit(${habit.id})">×</button>
                            </div>
                            <div class="streak-info">
                                <div class="streak-badge">🔥 ${habit.streak} day streak</div>
                                <div class="best-streak">🏆 Best: ${habit.bestStreak}</div>
                            </div>
                            <div class="weekly-view">
                                <div class="week-days">
                                    ${weekHtml}
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');
            }

            // Escape HTML to prevent XSS
            escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }
        }

        // Initialize tracker
        const tracker = new HabitTracker();

        // Handle add habit form
        document.getElementById('addHabitForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const input = document.getElementById('habitNameInput');
            if (tracker.addHabit(input.value)) {
                input.value = '';
            }
        });

        // Auto-save is handled in each action
        // Keyboard shortcut: Enter to add habit
        document.getElementById('habitNameInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                document.getElementById('addHabitForm').dispatchEvent(new Event('submit'));
            }
        });
    </script>
</body>
</html>
