<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hangman Game</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --success-color: #27ae60;
            --error-color: #e74c3c;
            --bg-color: #ecf0f1;
            --card-bg: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: var(--bg-color);
            color: var(--primary-color);
        }

        .game-card {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            width: 90%;
            max-width: 600px;
        }

        h1 { margin-top: 0; }

        #gallows-canvas {
            background: #fafafa;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            max-width: 100%;
        }

        #word-display {
            font-size: 2.5rem;
            font-weight: bold;
            letter-spacing: 0.4rem;
            margin: 1.5rem 0;
            text-transform: uppercase;
        }

        #keyboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(40px, 1fr));
            gap: 8px;
            margin-bottom: 1.5rem;
        }

        .key {
            padding: 10px 5px;
            font-size: 1rem;
            border: 2px solid #ddd;
            background: white;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: bold;
        }

        .key:hover:not(:disabled) {
            border-color: var(--accent-color);
            color: var(--accent-color);
        }

        .key:disabled {
            cursor: not-allowed;
            opacity: 0.6;
        }

        .key.correct {
            background-color: var(--success-color);
            border-color: var(--success-color);
            color: white;
        }

        .key.wrong {
            background-color: var(--error-color);
            border-color: var(--error-color);
            color: white;
        }

        #status-msg {
            font-size: 1.2rem;
            font-weight: 600;
            height: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .btn-reset {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 0.8rem 2rem;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-reset:hover {
            background-color: #2980b9;
        }
    </style>
</head>
<body>

    <div class="game-card">
        <h1>Hangman</h1>
        <canvas id="gallows-canvas" width="200" height="250"></canvas>
        <div id="status-msg"></div>
        <div id="word-display">_ _ _ _ _</div>
        <div id="keyboard"></div>
        <button class="btn-reset" id="reset-btn">New Game</button>
    </div>

    <script>
        const WORDS = [
            'JAVASCRIPT', 'TYPESCRIPT', 'NODEJS', 'REACT', 'ANGULAR', 
            'PROGRAMMING', 'DEVELOPER', 'SOFTWARE', 'DATABASE', 'ALGORITHM'
        ];
        
        const MAX_WRONG = 6;
        
        let state = {
            word: '',
            guesses: new Set(),
            wrongCount: 0,
            isGameOver: false
        };

        const canvas = document.getElementById('gallows-canvas');
        const ctx = canvas.getContext('2d');
        const wordEl = document.getElementById('word-display');
        const keyboardEl = document.getElementById('keyboard');
        const msgEl = document.getElementById('status-msg');
        const resetBtn = document.getElementById('reset-btn');

        function initGame() {
            state.word = WORDS[Math.floor(Math.random() * WORDS.length)];
            state.guesses = new Set();
            state.wrongCount = 0;
            state.isGameOver = false;
            
            msgEl.textContent = '';
            msgEl.style.color = 'inherit';
            
            renderKeyboard();
            renderWord();
            drawGallows();
        }

        function renderKeyboard() {
            keyboardEl.innerHTML = '';
            const alphabet = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
            alphabet.forEach(letter => {
                const btn = document.createElement('button');
                btn.textContent = letter;
                btn.classList.add('key');
                btn.addEventListener('click', () => handleGuess(letter, btn));
                keyboardEl.appendChild(btn);
            });
        }

        function handleGuess(letter, btn) {
            if (state.isGameOver || state.guesses.has(letter)) return;

            state.guesses.add(letter);
            btn.disabled = true;

            if (state.word.includes(letter)) {
                btn.classList.add('correct');
            } else {
                state.wrongCount++;
                btn.classList.add('wrong');
                drawGallows();
            }

            renderWord();
            checkGameState();
        }

        function renderWord() {
            const display = state.word
                .split('')
                .map(char => state.guesses.has(char) ? char : '_')
                .join(' ');
            wordEl.textContent = display;
        }

        function checkGameState() {
            const isWon = state.word.split('').every(char => state.guesses.has(char));
            
            if (isWon) {
                state.isGameOver = true;
                msgEl.textContent = 'Congratulations! You Win! 🏆';
                msgEl.style.color = 'var(--success-color)';
                disableKeyboard();
            } else if (state.wrongCount >= MAX_WRONG) {
                state.isGameOver = true;
                msgEl.textContent = `Game Over! The word was: ${state.word}`;
                msgEl.style.color = 'var(--error-color)';
                disableKeyboard();
            }
        }

        function disableKeyboard() {
            const keys = document.querySelectorAll('.key');
            keys.forEach(k => k.disabled = true);
        }

        function drawGallows() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.lineWidth = 4;
            ctx.strokeStyle = '#2c3e50';
            ctx.lineCap = 'round';

            // Static Base Structure
            ctx.beginPath();
            ctx.moveTo(20, 230); ctx.lineTo(180, 230); // Base
            ctx.moveTo(50, 230); ctx.lineTo(50, 20);   // Vertical
            ctx.moveTo(50, 20);  ctx.lineTo(130, 20);  // Top
            ctx.moveTo(130, 20); ctx.lineTo(130, 50);  // Rope
            ctx.stroke();

            // Parts drawn based on wrongCount
            if (state.wrongCount >= 1) { // Head
                ctx.beginPath();
                ctx.arc(130, 70, 20, 0, Math.PI * 2);
                ctx.stroke();
            }
            if (state.wrongCount >= 2) { // Body
                ctx.beginPath();
                ctx.moveTo(130, 90); ctx.lineTo(130, 160);
                ctx.stroke();
            }
            if (state.wrongCount >= 3) { // Left Arm
                ctx.beginPath();
                ctx.moveTo(130, 110); ctx.lineTo(100, 140);
                ctx.stroke();
            }
            if (state.wrongCount >= 4) { // Right Arm
                ctx.beginPath();
                ctx.moveTo(130, 110); ctx.lineTo(160, 140);
                ctx.stroke();
            }
            if (state.wrongCount >= 5) { // Left Leg
                ctx.beginPath();
                ctx.moveTo(130, 160); ctx.lineTo(100, 200);
                ctx.stroke();
            }
            if (state.wrongCount >= 6) { // Right Leg
                ctx.beginPath();
                ctx.moveTo(130, 160); ctx.lineTo(160, 200);
                ctx.stroke();
            }
        }

        resetBtn.addEventListener('click', initGame);
        
        // Start first game
        initGame();
    </script>
</body>
</html>
