<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LEXIS — Word Scramble</title>
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Lato:wght@300;400;700&display=swap" rel="stylesheet"/>
</head>
<body>
  <div class="page">

    <!-- Decorative ink blobs -->
    <div class="blob blob--1"></div>
    <div class="blob blob--2"></div>

    <div class="card">

      <header class="card__header">
        <span class="badge">LEXIS</span>
        <div class="top-stats">
          <div class="top-stat">
            <span class="top-stat__num" id="roundNum">1</span>
            <span class="top-stat__lbl">/ <span id="totalRounds">10</span></span>
          </div>
          <div class="top-stat top-stat--score">
            <span class="top-stat__num" id="scoreDisp">0</span>
            <span class="top-stat__lbl">pts</span>
          </div>
        </div>
      </header>

      <!-- Timer strip -->
      <div class="timer-strip">
        <div class="timer-fill" id="timerFill"></div>
      </div>
      <div class="timer-label"><span id="timeLeft">15</span>s</div>

      <!-- Scrambled word -->
      <div class="scramble-area">
        <p class="scramble-label">UNSCRAMBLE THIS</p>
        <div class="scramble-word" id="scrambleWord"></div>
        <p class="hint-text" id="hintText"></p>
      </div>

      <!-- Letter tiles input -->
      <div class="tiles-input" id="tilesInput"></div>

      <!-- Answer display -->
      <div class="answer-slots" id="answerSlots"></div>

      <!-- Buttons -->
      <div class="btn-row">
        <button class="btn btn--ghost" id="hintBtn">💡 Hint</button>
        <button class="btn btn--ghost" id="shuffleBtn">⟳ Shuffle</button>
        <button class="btn btn--primary" id="submitBtn">Submit →</button>
      </div>

      <!-- Feedback -->
      <div class="feedback" id="feedback"></div>

      <!-- Skip -->
      <button class="skip-btn" id="skipBtn">Skip word ›</button>

    </div>

    <!-- End Card -->
    <div class="end-card" id="endCard" style="display:none">
      <div class="blob blob--1"></div>
      <div class="end-card__inner">
        <p class="end-badge">FINAL SCORE</p>
        <p class="end-score" id="endScore">0</p>
        <p class="end-grade" id="endGrade"></p>
        <p class="end-detail" id="endDetail"></p>
        <button class="btn btn--primary" id="playAgainBtn" style="margin-top:28px">Play Again</button>
      </div>
    </div>

  </div>
  <script src="app.js"></script>
</body>
</html>
