<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Memory Match Game</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app-shell">
    <section class="hero">
      <div>
        <p class="eyebrow">Memory Match Game</p>
        <h1>Flip cards to find matching pairs.</h1>
        <p class="subtitle">A simple memory challenge with a clean, responsive UI. Match all pairs in the fewest moves possible.</p>
      </div>

      <div class="panel stats-panel">
        <div class="stat"><span id="moves">0</span><small>Moves</small></div>
        <div class="stat"><span id="matches">0</span><small>Matches</small></div>
        <div class="stat"><span id="timer">0:00</span><small>Time</small></div>
        <button id="restart" class="restart-btn">Restart</button>
      </div>
    </section>

    <section class="board-wrap">
      <div id="board" class="board" aria-label="Memory match board"></div>
    </section>

    <section class="message" id="message">Click any card to begin.</section>
  </main>

  <script src="script.js"></script>
</body>
</html>
