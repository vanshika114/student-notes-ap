<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WordUnscramble — Identify the Word</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: #1e293b;
      --accent: #f59e0b;
      --text: #f8fafc;
      --muted: #94a3b8;
      --success: #22c55e;
      --error: #ef4444;
    }
    body {
      margin: 0;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .game-card {
      background: var(--card);
      width: 90%;
      max-width: 480px;
      padding: 32px;
      border-radius: 24px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.1);
      position: relative;
      text-align: center;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 40px;
    }
    .badge {
      background: rgba(245, 158, 11, 0.15);
      color: var(--accent);
      padding: 6px 16px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
    }
    .scrambled-word {
      font-size: 48px;
      font-weight: 800;
      letter-spacing: 0.2em;
      color: var(--accent);
      margin-bottom: 40px;
      text-transform: uppercase;
      font-family: 'Monaco', 'Consolas', monospace;
      text-shadow: 0 0 20px rgba(245, 158, 11, 0.3);
    }
    .input-group {
      margin-bottom: 24px;
    }
    input {
      width: 100%;
      background: rgba(255, 255, 255, 0.03);
      border: 2px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      padding: 16px;
      color: white;
      font-size: 24px;
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      outline: none;
      transition: all 0.3s;
      box-sizing: border-box;
    }
    input:focus {
      border-color: var(--accent);
      background: rgba(255, 255, 255, 0.05);
      box-shadow: 0 0 0 4px rgba(245, 158, 11, 0.1);
    }
    .primary-btn {
      background: var(--accent);
      color: #000;
      border: none;
      padding: 16px 40px;
      border-radius: 16px;
      font-weight: 700;
      font-size: 18px;
      cursor: pointer;
      transition: transform 0.2s, background 0.2s;
      width: 100%;
    }
    .primary-btn:hover {
      background: #fbbf24;
      transform: translateY(-2px);
    }
    .screen-overlay {
      position: absolute;
      inset: 0;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 20;
      border-radius: 24px;
      padding: 32px;
    }
    .hidden { display: none !important; }
    .feedback {
      margin-top: 16px;
      font-weight: 600;
      height: 24px;
    }
  </style>
</head>
<body>
  <div class="game-card">
    <div id="start-screen" class="screen-overlay">
      <h1 style="font-size: 42px; margin: 0;">WordUnscramble</h1>
      <p style="color: var(--muted); margin-bottom: 30px;">Decipher the mixed-up letters!</p>
      <button class="primary-btn" onclick="initGame()">Start Playing</button>
    </div>

    <div id="end-screen" class="screen-overlay hidden">
      <h2 style="font-size: 32px;">Great Job!</h2>
      <p style="color: var(--muted); margin-bottom: 30px;">You've completed all levels.</p>
      <button class="primary-btn" onclick="initGame()">Play Again</button>
    </div>

    <div class="header">
      <div class="badge" id="level-indicator">LEVEL 1/10</div>
      <div style="font-weight: 600;">Score: <span id="score-val" style="color: var(--accent)">0</span></div>
    </div>

    <div class="scrambled-word" id="word-display">----</div>

    <div class="input-group">
      <input type="text" id="user-input" placeholder="Type here..." autocomplete="off" onkeydown="if(event.key==='Enter') checkAnswer()">
      <div id="feedback" class="feedback"></div>
    </div>

    <button class="primary-btn" onclick="checkAnswer()">Submit Guess</button>
  </div>

  <script>
    const WORDS = ["JUMP", "BRAIN", "ORANGE", "GHOST", "PIZZA", "PLANET", "COFFEE", "GUITAR", "WIZARD", "DRAGON"];
    let state = { level: 0, score: 0, currentWord: "", pool: [] };

    function scramble(word) {
      let arr = word.split('');
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      let scrambled = arr.join('');
      return scrambled === word ? scramble(word) : scrambled;
    }

    function initGame() {
      state = { level: 0, score: 0, pool: [...WORDS].sort(() => Math.random() - 0.5) };
      document.getElementById('start-screen').classList.add('hidden');
      document.getElementById('end-screen').classList.add('hidden');
      document.getElementById('score-val').textContent = "0";
      loadLevel();
    }

    function loadLevel() {
      if (state.level >= state.pool.length) return finishGame();
      state.currentWord = state.pool[state.level];
      document.getElementById('level-indicator').textContent = `LEVEL ${state.level + 1}/${state.pool.length}`;
      document.getElementById('word-display').textContent = scramble(state.currentWord);
      document.getElementById('user-input').value = "";
      document.getElementById('user-input').focus();
      document.getElementById('feedback').textContent = "";
    }

    function checkAnswer() {
      const input = document.getElementById('user-input').value.trim().toUpperCase();
      const feedback = document.getElementById('feedback');
      if (input === state.currentWord) {
        state.score += 10; state.level++;
        document.getElementById('score-val').textContent = state.score;
        feedback.textContent = "Correct! ✨"; feedback.style.color = "var(--success)";
        setTimeout(loadLevel, 1000);
      } else {
        feedback.textContent = "Try again! ❌"; feedback.style.color = "var(--error)";
        document.getElementById('user-input').select();
      }
    }

    function finishGame() { document.getElementById('end-screen').classList.remove('hidden'); }
  </script>
</body>
</html>
