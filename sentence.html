<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LingoRecall — Memory Sentence Game</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: #1e293b;
      --accent: #8b5cf6;
      --text: #f8fafc;
      --muted: #94a3b8;
      --success: #22c55e;
      --error: #ef4444;
    }
    body {
      margin: 0;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .game-card {
      background: var(--card);
      width: 90%;
      max-width: 600px;
      padding: 32px;
      border-radius: 24px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.1);
      position: relative;
      text-align: center;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
    }
    .badge {
      background: rgba(139, 92, 246, 0.15);
      color: var(--accent);
      padding: 6px 16px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
    }
    .display-area {
      min-height: 120px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      line-height: 1.6;
      margin-bottom: 30px;
      padding: 20px;
      background: rgba(0, 0, 0, 0.2);
      border-radius: 16px;
      font-style: italic;
    }
    .input-area textarea {
      width: 100%;
      height: 100px;
      background: rgba(255, 255, 255, 0.03);
      border: 2px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      padding: 16px;
      color: white;
      font-size: 18px;
      font-family: inherit;
      resize: none;
      box-sizing: border-box;
      margin-bottom: 20px;
      outline: none;
      transition: border-color 0.3s;
    }
    .input-area textarea:focus {
      border-color: var(--accent);
    }
    .timer-bar {
      height: 4px;
      background: rgba(255, 255, 255, 0.1);
      width: 100%;
      margin-bottom: 20px;
      border-radius: 2px;
      overflow: hidden;
    }
    .timer-progress {
      height: 100%;
      background: var(--accent);
      width: 100%;
      transition: width linear;
    }
    .screen-overlay {
      position: absolute;
      inset: 0;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 20;
      border-radius: 24px;
      padding: 20px;
    }
    .primary-btn {
      background: var(--accent);
      color: white;
      border: none;
      padding: 14px 40px;
      border-radius: 12px;
      font-weight: 700;
      font-size: 18px;
      cursor: pointer;
      transition: transform 0.2s, background 0.2s;
    }
    .primary-btn:hover { background: #7c3aed; transform: translateY(-2px); }
    .hidden { display: none !important; }
    .similarity-text { font-size: 32px; font-weight: 800; color: var(--accent); }
  </style>
</head>
<body>
  <div class="game-card">
    <div id="start-screen" class="screen-overlay">
      <h1 style="font-size: 42px; margin: 0;">LingoRecall</h1>
      <p style="color: var(--muted); margin-bottom: 30px;">Memorize the sentence and recall it perfectly.</p>
      <button class="primary-btn" onclick="initGame()">Start Game</button>
    </div>

    <div id="result-screen" class="screen-overlay hidden">
      <h2 style="font-size: 24px; margin-bottom: 10px;">Accuracy</h2>
      <div class="similarity-text" id="sim-score">0%</div>
      <p id="feedback-text" style="color: var(--muted); margin: 20px 0;"></p>
      <button class="primary-btn" onclick="loadRound()">Next Round</button>
    </div>

    <div class="header">
      <div class="badge" id="round-indicator">ROUND 1/5</div>
      <div style="font-weight: 600;">Avg Accuracy: <span id="avg-score" style="color: var(--accent)">0%</span></div>
    </div>

    <div class="timer-bar"><div id="timer-progress" class="timer-progress"></div></div>

    <div class="display-area" id="display-box">Get ready...</div>

    <div class="input-area hidden" id="input-container">
      <textarea id="user-input" placeholder="Type the sentence here..."></textarea>
      <button class="primary-btn" onclick="checkSentence()">Submit Recall</button>
    </div>
  </div>

  <script>
    const SENTENCES = [
      "The quick brown fox jumps over the lazy dog in the morning sun.",
      "Education is the most powerful weapon which you can use to change the world.",
      "Consistency is the key to mastering any complex skill over a long period.",
      "Technology is best when it brings people together to solve real problems.",
      "Artificial intelligence is a tool that enhances human creativity and productivity.",
      "Success is not final, failure is not fatal: it is the courage to continue that counts.",
      "The best way to predict the future is to create it with your own hands.",
      "Simplicity is the ultimate sophistication in a world full of complex systems.",
      "A journey of a thousand miles begins with a single step forward.",
      "Knowledge is knowing a tomato is a fruit; wisdom is not putting it in a salad."
    ];

    let state = { round: 0, currentStr: "", totalSim: 0, pool: [] };

    function initGame() {
      state = { round: 0, totalSim: 0, pool: [...SENTENCES].sort(() => Math.random() - 0.5) };
      document.getElementById('start-screen').classList.add('hidden');
      loadRound();
    }

    function loadRound() {
      if (state.round >= 5) {
        location.reload(); // Reset game
        return;
      }
      document.getElementById('result-screen').classList.add('hidden');
      document.getElementById('input-container').classList.add('hidden');
      document.getElementById('display-box').classList.remove('hidden');
      document.getElementById('user-input').value = "";
      
      state.currentStr = state.pool[state.round];
      document.getElementById('round-indicator').textContent = `ROUND ${state.round + 1}/5`;
      document.getElementById('display-box').textContent = state.currentStr;

      const timer = document.getElementById('timer-progress');
      timer.style.transition = 'none';
      timer.style.width = '100%';
      setTimeout(() => {
        timer.style.transition = 'width 6s linear';
        timer.style.width = '0%';
      }, 50);

      setTimeout(() => {
        document.getElementById('display-box').classList.add('hidden');
        document.getElementById('input-container').classList.remove('hidden');
        document.getElementById('user-input').focus();
      }, 6000);
    }

    function checkSentence() {
      const userStr = document.getElementById('user-input').value.trim();
      const similarity = calculateSimilarity(state.currentStr, userStr);
      state.totalSim += similarity;
      state.round++;

      document.getElementById('result-screen').classList.remove('hidden');
      document.getElementById('sim-score').textContent = Math.round(similarity) + "%";
      document.getElementById('avg-score').textContent = Math.round(state.totalSim / state.round) + "%";
      document.getElementById('feedback-text').innerHTML = `Original:<br>"${state.currentStr}"`;
    }

    function calculateSimilarity(s1, s2) {
      const longer = s1.toLowerCase().replace(/[^\w]/g, '');
      const shorter = s2.toLowerCase().replace(/[^\w]/g, '');
      if (longer.length === 0) return shorter.length === 0 ? 100 : 0;
      return (1 - editDistance(longer, shorter) / longer.length) * 100;
    }

    function editDistance(s1, s2) {
      const costs = [];
      for (let i = 0; i <= s1.length; i++) {
        let lastValue = i;
        for (let j = 0; j <= s2.length; j++) {
          if (i === 0) costs[j] = j;
          else if (j > 0) {
            let newValue = costs[j - 1];
            if (s1.charAt(i - 1) !== s2.charAt(j - 1))
              newValue = Math.min(Math.min(newValue, lastValue), costs[j]) + 1;
            costs[j - 1] = lastValue;
            lastValue = newValue;
          }
        }
        if (i > 0) costs[s2.length] = lastValue;
      }
      return costs[s2.length];
    }
  </script>
</body>
</html>
