<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SNEK — Snake Game</title>
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=VT323&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
</head>
<body>
  <div class="crt-wrap">
    <div class="crt-inner">

      <header class="hdr">
        <span class="hdr__logo">[ SNEK v1.0 ]</span>
        <span class="hdr__score">SCORE: <span id="score">0</span></span>
        <span class="hdr__hi">BEST: <span id="best">0</span></span>
      </header>

      <div class="canvas-wrap">
        <canvas id="gameCanvas"></canvas>
        <!-- Overlay -->
        <div class="overlay" id="overlay">
          <div class="overlay__box">
            <p class="overlay__tag" id="overlayTag">[ READY ]</p>
            <h2 class="overlay__title" id="overlayTitle">SNEK</h2>
            <p class="overlay__msg" id="overlayMsg">Press SPACE or tap to start</p>
            <div class="overlay__score-wrap" id="overlayScoreWrap" style="display:none">
              <span id="overlayFinalScore"></span>
            </div>
          </div>
        </div>
      </div>

      <div class="info-bar">
        <span class="info-bar__item">↑↓←→ / WASD — Move</span>
        <span class="info-bar__sep">·</span>
        <span class="info-bar__item">SPACE — Pause</span>
        <span class="info-bar__sep">·</span>
        <span class="info-bar__level">LEVEL: <span id="level">1</span></span>
      </div>

      <!-- Mobile D-Pad -->
      <div class="dpad">
        <button class="dpad__btn dpad__up"   id="dUp">▲</button>
        <div class="dpad__mid">
          <button class="dpad__btn dpad__left"  id="dLeft">◄</button>
          <button class="dpad__btn dpad__center" id="dCenter">II</button>
          <button class="dpad__btn dpad__right" id="dRight">►</button>
        </div>
        <button class="dpad__btn dpad__down"  id="dDown">▼</button>
      </div>

    </div>
    <!-- CRT flicker line -->
    <div class="crt-line"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
