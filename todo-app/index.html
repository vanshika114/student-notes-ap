<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>FOCUS — Task Manager</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- Aurora Background -->
  <div class="aurora">
    <div class="aurora__orb aurora__orb--1"></div>
    <div class="aurora__orb aurora__orb--2"></div>
    <div class="aurora__orb aurora__orb--3"></div>
  </div>

  <!-- Grain Overlay -->
  <div class="grain"></div>

  <div class="app">

    <!-- Header -->
    <header class="header">
      <div class="header__logo">
        <span class="logo-dot"></span>
        <span class="logo-text">FOCUS</span>
      </div>
      <div class="header__stats">
        <div class="stat">
          <span class="stat__num" id="totalCount">0</span>
          <span class="stat__label">Total</span>
        </div>
        <div class="stat-divider"></div>
        <div class="stat">
          <span class="stat__num stat__num--done" id="doneCount">0</span>
          <span class="stat__label">Done</span>
        </div>
      </div>
    </header>

    <!-- Hero Section -->
    <section class="hero">
      <p class="hero__date" id="currentDate"></p>
      <h1 class="hero__title">What needs<br/><em>your attention</em><br/>today?</h1>
    </section>

    <!-- Progress Bar -->
    <div class="progress-wrap">
      <div class="progress-track">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <span class="progress-label" id="progressLabel">0% complete</span>
    </div>

    <!-- Filter Tabs -->
    <div class="filters">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="active">Active</button>
      <button class="filter-btn" data-filter="completed">Completed</button>
    </div>

    <!-- Task List -->
    <ul class="task-list" id="taskList">
      <!-- Empty State -->
      <li class="empty-state" id="emptyState">
        <div class="empty-state__icon">✦</div>
        <p class="empty-state__msg">Your list is clear.<br/>Add something below.</p>
      </li>
    </ul>

    <!-- Clear Completed -->
    <div class="actions-bar" id="actionsBar" style="display:none;">
      <span class="actions-bar__count" id="activeCount"></span>
      <button class="btn-clear" id="clearCompleted">Clear completed</button>
    </div>

    <!-- Input Area -->
    <div class="input-dock">
      <div class="input-wrap">
        <span class="input-icon">+</span>
        <input
          type="text"
          id="taskInput"
          class="task-input"
          placeholder="Add a new task…"
          maxlength="120"
          autocomplete="off"
        />
        <button class="add-btn" id="addBtn" aria-label="Add task">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
        </button>
      </div>
    </div>

  </div>

  <!-- Toast Notification -->
  <div class="toast" id="toast"></div>

  <script src="app.js"></script>
</body>
</html>
