<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Student Performance Dashboard | Analytics</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .header p {
            opacity: 0.9;
        }

        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-card h3 {
            color: #667eea;
            font-size: 0.85rem;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: bold;
            color: #333;
        }

        .stat-label {
            font-size: 0.75rem;
            color: #666;
            margin-top: 5px;
        }

        /* Main Layout */
        .main-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        /* Add Subject Section */
        .add-subject-section {
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .section-title {
            font-size: 1.2rem;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .subject-form {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .subject-input {
            flex: 1;
            padding: 12px;
            border: 2px solid #e1e8ed;
            border-radius: 10px;
            font-size: 0.9rem;
        }

        .marks-input {
            width: 100px;
            padding: 12px;
            border: 2px solid #e1e8ed;
            border-radius: 10px;
            font-size: 0.9rem;
        }

        .add-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .add-btn:hover {
            transform: translateY(-2px);
        }

        /* Subjects List */
        .subjects-list {
            max-height: 300px;
            overflow-y: auto;
        }

        .subject-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: #f7f9fc;
            margin-bottom: 10px;
            border-radius: 10px;
            transition: all 0.3s;
        }

        .subject-info {
            flex: 1;
        }

        .subject-name {
            font-weight: bold;
            color: #333;
        }

        .subject-marks {
            color: #667eea;
            font-weight: bold;
        }

        .delete-subject {
            background: #ff6b6b;
            color: white;
            border: none;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s;
        }

        .delete-subject:hover {
            background: #ff4757;
            transform: scale(1.1);
        }

        /* Charts Section */
        .charts-section {
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        /* Bar Chart */
        .chart-container {
            margin-top: 20px;
        }

        .bar-item {
            margin-bottom: 15px;
        }

        .bar-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
            font-size: 0.85rem;
        }

        .bar-label span:first-child {
            font-weight: 600;
            color: #333;
        }

        .bar-label span:last-child {
            color: #667eea;
            font-weight: bold;
        }

        .bar-bg {
            background: #e1e8ed;
            border-radius: 10px;
            overflow: hidden;
            height: 30px;
        }

        .bar-fill {
            background: linear-gradient(90deg, #667eea, #764ba2);
            height: 100%;
            border-radius: 10px;
            transition: width 0.5s ease;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 10px;
            color: white;
            font-size: 0.8rem;
            font-weight: bold;
        }

        /* Performance Indicators */
        .highlights {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
        }

        .highlight-card {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            padding: 15px;
            border-radius: 15px;
            text-align: center;
        }

        .highlight-card.best {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
        }

        .highlight-card.worst {
            background: linear-gradient(135deg, #eb3349 0%, #f45c43 100%);
        }

        .highlight-label {
            font-size: 0.75rem;
            opacity: 0.9;
        }

        .highlight-value {
            font-size: 1.1rem;
            font-weight: bold;
            margin-top: 5px;
        }

        /* Grade Card */
        .grade-card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .grade-circle {
            text-align: center;
            padding: 20px;
        }

        .grade-percentage {
            font-size: 3rem;
            font-weight: bold;
            color: #667eea;
        }

        .grade-letter {
            font-size: 1.5rem;
            margin-top: 10px;
        }

        .grade-message {
            text-align: center;
            margin-top: 15px;
            padding: 10px;
            border-radius: 10px;
            font-weight: bold;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        /* Responsive */
        @media (max-width: 900px) {
            .main-layout {
                grid-template-columns: 1fr;
            }
            
            .header h1 {
                font-size: 1.8rem;
            }
            
            .subject-form {
                flex-direction: column;
            }
            
            .marks-input {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>
                📊 Student Performance Dashboard
            </h1>
            <p>Track your academic performance with visual analytics 📈</p>
        </div>

        <!-- Stats Grid -->
        <div class="stats-grid">
            <div class="stat-card">
                <h3>📚 Total Subjects</h3>
                <div class="stat-value" id="totalSubjects">0</div>
                <div class="stat-label">Subjects added</div>
            </div>
            <div class="stat-card">
                <h3>📈 Average Marks</h3>
                <div class="stat-value" id="avgMarks">0</div>
                <div class="stat-label">Out of 100</div>
            </div>
            <div class="stat-card">
                <h3>🏆 Overall Grade</h3>
                <div class="stat-value" id="overallGrade">F</div>
                <div class="stat-label">Performance</div>
            </div>
            <div class="stat-card">
                <h3>⭐ Total Score</h3>
                <div class="stat-value" id="totalScore">0</div>
                <div class="stat-label">Out of 100</div>
            </div>
        </div>

        <!-- Main Layout -->
        <div class="main-layout">
            <!-- Add Subject Section -->
            <div class="add-subject-section">
                <div class="section-title">
                    ➕ Add Subject Marks
                </div>
                <div class="subject-form">
                    <input type="text" id="subjectName" class="subject-input" placeholder="Subject name (e.g., Mathematics)">
                    <input type="number" id="subjectMarks" class="marks-input" placeholder="Marks (0-100)" min="0" max="100">
                    <button class="add-btn" onclick="addSubject()">Add Subject</button>
                </div>
                <div class="section-title">
                    📋 Subjects List
                </div>
                <div id="subjectsList" class="subjects-list"></div>
            </div>

            <!-- Charts Section -->
            <div class="charts-section">
                <div class="section-title">
                    📊 Performance Chart
                </div>
                <div id="barChart" class="chart-container"></div>
                
                <div class="highlights" id="highlights"></div>
            </div>
        </div>

        <!-- Grade Card -->
        <div class="grade-card" style="margin-top: 20px;">
            <div class="section-title">
                🎯 Performance Summary
            </div>
            <div id="gradeSummary"></div>
        </div>
    </div>

    <script>
        // Subject data
        let subjects = [];

        // Load from localStorage
        function loadFromLocalStorage() {
            const saved = localStorage.getItem('performanceData');
            if (saved) {
                subjects = JSON.parse(saved);
            } else {
                // Sample data
                subjects = [
                    { name: 'Mathematics', marks: 85 },
                    { name: 'Physics', marks: 78 },
                    { name: 'Chemistry', marks: 82 },
                    { name: 'Computer Science', marks: 92 },
                    { name: 'English', marks: 88 }
                ];
            }
            renderAll();
        }

        // Save to localStorage
        function saveToLocalStorage() {
            localStorage.setItem('performanceData', JSON.stringify(subjects));
        }

        // Add subject
        function addSubject() {
            const nameInput = document.getElementById('subjectName');
            const marksInput = document.getElementById('subjectMarks');
            
            const name = nameInput.value.trim();
            const marks = parseInt(marksInput.value);
            
            if (!name) {
                alert('Please enter subject name!');
                return;
            }
            
            if (isNaN(marks) || marks < 0 || marks > 100) {
                alert('Please enter valid marks (0-100)!');
                return;
            }
            
            subjects.push({ name, marks });
            saveToLocalStorage();
            renderAll();
            
            // Clear inputs
            nameInput.value = '';
            marksInput.value = '';
        }

        // Delete subject
        function deleteSubject(index) {
            subjects.splice(index, 1);
            saveToLocalStorage();
            renderAll();
        }

        // Calculate statistics
        function calculateStats() {
            if (subjects.length === 0) {
                return {
                    total: 0,
                    average: 0,
                    best: null,
                    worst: null,
                    totalScore: 0
                };
            }
            
            let total = 0;
            let best = subjects[0];
            let worst = subjects[0];
            
            for (const subject of subjects) {
                total += subject.marks;
                if (subject.marks > best.marks) best = subject;
                if (subject.marks < worst.marks) worst = subject;
            }
            
            const average = total / subjects.length;
            const totalScore = (total / (subjects.length * 100)) * 100;
            
            return {
                total,
                average,
                best,
                worst,
                totalScore
            };
        }

        // Get grade based on percentage
        function getGrade(percentage) {
            if (percentage >= 90) return { letter: 'A+', message: 'Excellent! Keep it up! 🎉', color: '#2ed573' };
            if (percentage >= 80) return { letter: 'A', message: 'Very Good! Great work! 🌟', color: '#70a1ff' };
            if (percentage >= 70) return { letter: 'B+', message: 'Good! Can improve more! 📚', color: '#eccc68' };
            if (percentage >= 60) return { letter: 'B', message: 'Satisfactory! Keep working! 💪', color: '#ffa502' };
            if (percentage >= 50) return { letter: 'C', message: 'Need improvement! 📖', color: '#ff6b6b' };
            return { letter: 'F', message: 'Needs serious attention! ⚠️', color: '#ff4757' };
        }

        // Render subjects list
        function renderSubjectsList() {
            const container = document.getElementById('subjectsList');
            
            if (subjects.length === 0) {
                container.innerHTML = '<div class="empty-state">📭 No subjects added yet</div>';
                return;
            }
            
            container.innerHTML = subjects.map((subject, index) => `
                <div class="subject-item">
                    <div class="subject-info">
                        <div class="subject-name">${escapeHtml(subject.name)}</div>
                        <div class="subject-marks">Score: ${subject.marks}/100</div>
                    </div>
                    <button class="delete-subject" onclick="deleteSubject(${index})">×</button>
                </div>
            `).join('');
        }

        // Render bar chart
        function renderBarChart() {
            const container = document.getElementById('barChart');
            
            if (subjects.length === 0) {
                container.innerHTML = '<div class="empty-state">📊 Add subjects to see chart</div>';
                return;
            }
            
            container.innerHTML = subjects.map(subject => `
                <div class="bar-item">
                    <div class="bar-label">
                        <span>${escapeHtml(subject.name)}</span>
                        <span>${subject.marks}%</span>
                    </div>
                    <div class="bar-bg">
                        <div class="bar-fill" style="width: ${subject.marks}%">
                            ${subject.marks >= 30 ? subject.marks + '%' : ''}
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Render highlights (best/worst subjects)
        function renderHighlights() {
            const stats = calculateStats();
            const container = document.getElementById('highlights');
            
            if (subjects.length === 0) {
                container.innerHTML = '';
                return;
            }
            
            container.innerHTML = `
                <div class="highlight-card best">
                    <div class="highlight-label">🏆 Best Subject</div>
                    <div class="highlight-value">${escapeHtml(stats.best.name)}</div>
                    <div class="highlight-value" style="font-size: 0.9rem;">${stats.best.marks}/100</div>
                </div>
                <div class="highlight-card worst">
                    <div class="highlight-label">📉 Needs Improvement</div>
                    <div class="highlight-value">${escapeHtml(stats.worst.name)}</div>
                    <div class="highlight-value" style="font-size: 0.9rem;">${stats.worst.marks}/100</div>
                </div>
            `;
        }

        // Render grade summary
        function renderGradeSummary() {
            const stats = calculateStats();
            const grade = getGrade(stats.totalScore);
            const container = document.getElementById('gradeSummary');
            
            if (subjects.length === 0) {
                container.innerHTML = '<div class="empty-state">📊 Add subjects to see performance summary</div>';
                return;
            }
            
            container.innerHTML = `
                <div class="grade-circle">
                    <div class="grade-percentage">${stats.totalScore.toFixed(1)}%</div>
                    <div class="grade-letter" style="color: ${grade.color}">
                        Grade: ${grade.letter}
                    </div>
                </div>
                <div class="grade-message" style="background: ${grade.color}20; color: ${grade.color}">
                    ${grade.message}
                </div>
                <div style="margin-top: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <div style="text-align: center;">
                        <div style="font-size: 0.8rem; color: #666;">Total Marks Obtained</div>
                        <div style="font-size: 1.5rem; font-weight: bold; color: #667eea;">${stats.total}</div>
                        <div style="font-size: 0.7rem; color: #999;">out of ${subjects.length * 100}</div>
                    </div>
                    <div style="text-align: center;">
                        <div style="font-size: 0.8rem; color: #666;">Average Marks</div>
                        <div style="font-size: 1.5rem; font-weight: bold; color: #667eea;">${stats.average.toFixed(1)}</div>
                        <div style="font-size: 0.7rem; color: #999;">per subject</div>
                    </div>
                </div>
            `;
        }

        // Update stats cards
        function updateStatsCards() {
            const stats = calculateStats();
            const grade = getGrade(stats.totalScore);
            
            document.getElementById('totalSubjects').textContent = subjects.length;
            document.getElementById('avgMarks').textContent = stats.average.toFixed(1);
            document.getElementById('overallGrade').textContent = grade.letter;
            document.getElementById('totalScore').textContent = stats.totalScore.toFixed(1);
        }

        // Escape HTML
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Render everything
        function renderAll() {
            renderSubjectsList();
            renderBarChart();
            renderHighlights();
            renderGradeSummary();
            updateStatsCards();
        }

        // Initialize
        loadFromLocalStorage();

        // Keyboard support: Enter to add subject
        document.getElementById('subjectMarks').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                addSubject();
            }
        });
        
        document.getElementById('subjectName').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                document.getElementById('subjectMarks').focus();
            }
        });
    </script>
</body>
</html>
