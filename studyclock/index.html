<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Study Clock</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="clock-app">
    <section class="clock-card">
      <h1>Study Clock</h1>
      <p class="time" id="time">00:00:00</p>
      <p class="date" id="date">Loading date...</p>
    </section>

    <section class="ambient-card">
      <h2>Ambient Sounds</h2>
      <div class="sound-controls">
        <button data-sound="rain">Rain</button>
        <button data-sound="white-noise">White Noise</button>
        <button data-sound="cafe">Cafe</button>
      </div>
    </section>
  </main>

  <audio id="rain" loop src="assets/rain.mp3"></audio>
  <audio id="white-noise" loop src="assets/white-noise.mp3"></audio>
  <audio id="cafe" loop src="assets/cafe.mp3"></audio>

  <script src="script.js"></script>
</body>
</html>
