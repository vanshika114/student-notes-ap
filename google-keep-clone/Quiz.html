<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coding Quiz — NSOC'26</title>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --accent: #8ab4f8;
            --success: #81c995;
            --error: #f28b82;
            --text: #e8eaed;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: var(--text);
            font-family: 'Google Sans', Roboto, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px;
            width: 90%;
            max-width: 700px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
            transition: all 0.4s ease;
        }

        h1 { font-size: 28px; margin-bottom: 30px; text-align: center; color: var(--accent); }

        /* Category Screen */
        .category-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 15px;
        }

        .cat-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            padding: 20px;
            border-radius: 16px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
        }

        .cat-card:hover { background: rgba(255,255,255,0.15); transform: translateY(-5px); border-color: var(--accent); }

        /* Quiz UI */
        .quiz-header { display: flex; justify-content: space-between; margin-bottom: 20px; font-size: 14px; opacity: 0.8; }
        .question { font-size: 20px; font-weight: 500; margin-bottom: 25px; line-height: 1.4; }

        .options { display: flex; flex-direction: column; gap: 12px; }

        .option-btn {
            background: rgba(255,255,255,0.08);
            border: 1px solid var(--glass-border);
            padding: 16px 20px;
            border-radius: 12px;
            color: white;
            text-align: left;
            cursor: pointer;
            transition: 0.2s;
            font-size: 16px;
        }

        .option-btn:hover { background: rgba(255,255,255,0.15); }
        .option-btn.selected { border-color: var(--accent); background: rgba(138, 180, 248, 0.2); }

        /* Results Review */
        .review-item {
            margin-top: 20px;
            padding: 15px;
            border-radius: 12px;
            background: rgba(0,0,0,0.2);
            border-left: 4px solid var(--error);
        }
        .review-item.correct { border-left-color: var(--success); }
        .small-label { font-size: 12px; text-transform: uppercase; opacity: 0.6; margin-bottom: 4px; }

        .btn-primary {
            background: var(--accent);
            color: #1a1a2e;
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
            width: 100%;
        }

        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="container" id="gameContainer">
        <!-- Screen 1: Categories -->
        <div id="categoryScreen">
            <h1>Select Topic</h1>
            <div class="category-grid">
                <div class="cat-card" onclick="startQuiz('JavaScript')">JS</div>
                <div class="cat-card" onclick="startQuiz('Python')">Python</div>
                <div class="cat-card" onclick="startQuiz('Java')">Java</div>
                <div class="cat-card" onclick="startQuiz('DSA')">DSA</div>
                <div class="cat-card" onclick="startQuiz('DBMS')">DBMS</div>
            </div>
        </div>

        <!-- Screen 2: Quiz -->
        <div id="quizScreen" class="hidden">
            <div class="quiz-header">
                <span id="topicDisplay">Topic</span>
                <span>Question <span id="qNum">1</span>/5</span>
            </div>
            <div class="question" id="qText">Question Text?</div>
            <div class="options" id="optionsList"></div>
            <button class="btn-primary" id="nextBtn" onclick="handleNext()">Next</button>
        </div>

        <!-- Screen 3: Results -->
        <div id="resultScreen" class="hidden">
            <h1>Quiz Complete!</h1>
            <div style="text-align: center; font-size: 48px; margin-bottom: 10px;" id="finalScore">0</div>
            <div style="text-align: center; margin-bottom: 30px; opacity: 0.8;">Total Points Earned</div>
            
            <h3 style="margin-top: 40px;">Review Answers</h3>
            <div id="reviewContainer"></div>

            <button class="btn-primary" onclick="location.reload()">Play Again</button>
        </div>
    </div>

    <script src="auth.js"></script>
    <script>
        const quizData = {
            JavaScript: [
                { q: "What is the output of 'typeof NaN'?", a: "number", options: ["number", "NaN", "undefined", "object"], exp: "In JS, NaN is considered a numeric type." },
                { q: "Which method is used to add an element at the end of an array?", a: "push()", options: ["push()", "pop()", "shift()", "unshift()"], exp: "push() appends to the end, while unshift() adds to the beginning." }
            ],
            Python: [
                { q: "Which keyword is used to create a function in Python?", a: "def", options: ["def", "func", "function", "lambda"], exp: "'def' is the standard keyword for function definitions." },
                { q: "How do you start a comment in Python?", a: "#", options: ["#", "//", "/*", "--"], exp: "# is used for single-line comments in Python." }
            ],
            Java: [
                { q: "Which of these is not a Java features?", a: "Use of pointers", options: ["Object-oriented", "Use of pointers", "Portable", "Dynamic"], exp: "Java explicitly removes pointers for memory safety." },
                { q: "Which class is the root of the Java class hierarchy?", a: "Object", options: ["Object", "System", "String", "Main"], exp: "java.lang.Object is the parent of all classes." }
            ],
            DSA: [
                { q: "What is the time complexity of searching in a balanced BST?", a: "O(log n)", options: ["O(n)", "O(log n)", "O(1)", "O(n log n)"], exp: "Binary search in a balanced tree halves the search space each step." },
                { q: "Which data structure follows LIFO?", a: "Stack", options: ["Queue", "Stack", "LinkedList", "Heap"], exp: "Stack stands for Last-In First-Out." }
            ],
            DBMS: [
                { q: "Which SQL clause is used to filter records?", a: "WHERE", options: ["FILTER", "HAVING", "WHERE", "GROUP BY"], exp: "WHERE filters rows before grouping occurs." },
                { q: "What does ACID stand for in DBMS?", a: "Atomicity, Consistency, Isolation, Durability", options: ["Atomicity, Consistency, Isolation, Durability", "Access, Control, Integrity, Data", "Auto, Central, Internal, Disk", "None"], exp: "These properties guarantee database transactions are processed reliably." }
            ]
        };

        let currentCategory = "";
        let currentQIndex = 0;
        let score = 0;
        let userSelections = [];

        function startQuiz(cat) {
            currentCategory = cat;
            currentQIndex = 0;
            score = 0;
            userSelections = [];
            
            document.getElementById('categoryScreen').classList.add('hidden');
            document.getElementById('quizScreen').classList.remove('hidden');
            document.getElementById('topicDisplay').innerText = cat;
            
            loadQuestion();
        }

        function loadQuestion() {
            const questions = quizData[currentCategory];
            const q = questions[currentQIndex];
            
            document.getElementById('qNum').innerText = currentQIndex + 1;
            document.getElementById('qText').innerText = q.q;
            
            const list = document.getElementById('optionsList');
            list.innerHTML = "";
            
            q.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt;
                btn.onclick = () => selectOption(btn, opt);
                list.appendChild(btn);
            });

            document.getElementById('nextBtn').disabled = true;
            document.getElementById('nextBtn').style.opacity = 0.5;
        }

        function selectOption(btn, val) {
            document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            
            userSelections[currentQIndex] = val;
            document.getElementById('nextBtn').disabled = false;
            document.getElementById('nextBtn').style.opacity = 1;
        }

        function handleNext() {
            const questions = quizData[currentCategory];
            const correct = questions[currentQIndex].a;
            
            if (userSelections[currentQIndex] === correct) {
                score += 10;
            }

            currentQIndex++;
            if (currentQIndex < questions.length) {
                loadQuestion();
            } else {
                showResults();
            }
        }

        function showResults() {
            document.getElementById('quizScreen').classList.add('hidden');
            document.getElementById('resultScreen').classList.remove('hidden');
            document.getElementById('finalScore').innerText = score;

            const container = document.getElementById('reviewContainer');
            container.innerHTML = "";
            
            const questions = quizData[currentCategory];
            questions.forEach((q, idx) => {
                const isCorrect = userSelections[idx] === q.a;
                const div = document.createElement('div');
                div.className = `review-item ${isCorrect ? 'correct' : ''}`;
                
                div.innerHTML = `
                    <div style="font-weight: 500; margin-bottom: 10px;">${q.q}</div>
                    <div style="display: flex; gap: 20px;">
                        <div>
                            <div class="small-label">Your Answer</div>
                            <div style="color: ${isCorrect ? 'var(--success)' : 'var(--error)'}">${userSelections[idx]}</div>
                        </div>
                        ${!isCorrect ? `
                        <div>
                            <div class="small-label">Correct Answer</div>
                            <div style="color: var(--success)">${q.a}</div>
                        </div>` : ''}
                    </div>
                    <div style="margin-top: 10px; font-size: 13px; opacity: 0.7;">
                        <strong>Note:</strong> ${q.exp}
                    </div>
                `;
                container.appendChild(div);
            });

            // Save score to storage
            const session = JSON.parse(localStorage.getItem('sna_session'));
            if (session) {
                const history = JSON.parse(localStorage.getItem('quiz_history') || '[]');
                history.push({
                    user: session.username,
                    topic: currentCategory,
                    score: score,
                    date: new Date().toISOString()
                });
                localStorage.setItem('quiz_history', JSON.stringify(history));
            }
        }
    </script>
</body>
</html>
