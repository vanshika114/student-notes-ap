<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — Student Notes</title>
  <meta name="description" content="Sign in or create an account to access Student Notes App protected features.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #202124;
      --surface: #2d2e30;
      --surface2: #3c4043;
      --text: #e8eaed;
      --text2: #9aa0a6;
      --border: #5f6368;
      --accent: #8ab4f8;
      --accent-hover: #aecbfa;
      --danger: #f28b82;
      --success: #81c995;
      --radius: 12px;
      --font: 'Google Sans', 'Roboto', sans-serif;
    }
    [data-theme="light"] {
      --bg: #f8f9fa;
      --surface: #ffffff;
      --surface2: #f1f3f4;
      --text: #202124;
      --text2: #5f6368;
      --border: #dadce0;
      --accent: #1a73e8;
      --accent-hover: #1557b0;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      transition: background 0.3s, color 0.3s;
    }
    /* Animated background dots */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(circle at 20% 50%, rgba(138,180,248,0.05) 0%, transparent 50%),
        radial-gradient(circle at 80% 20%, rgba(129,201,149,0.05) 0%, transparent 50%),
        radial-gradient(circle at 50% 80%, rgba(242,139,130,0.04) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }
    .auth-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
      position: relative;
      z-index: 1;
      box-shadow: 0 8px 40px rgba(0,0,0,0.4);
      animation: slideUp 0.4s ease;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .logo-area {
      text-align: center;
      margin-bottom: 32px;
    }
    .logo-icon {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, #8ab4f8, #81c995);
      border-radius: 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      margin-bottom: 16px;
      box-shadow: 0 4px 20px rgba(138,180,248,0.3);
    }
    .logo-area h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 4px;
    }
    .logo-area p {
      font-size: 0.9rem;
      color: var(--text2);
    }
    /* Tabs */
    .auth-tabs {
      display: flex;
      background: var(--surface2);
      border-radius: 10px;
      padding: 4px;
      margin-bottom: 28px;
      gap: 4px;
    }
    .auth-tab {
      flex: 1;
      padding: 10px;
      border: none;
      background: transparent;
      color: var(--text2);
      border-radius: 8px;
      cursor: pointer;
      font-family: var(--font);
      font-size: 0.9rem;
      font-weight: 500;
      transition: all 0.2s;
    }
    .auth-tab.active {
      background: var(--surface);
      color: var(--accent);
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }
    .auth-tab:hover:not(.active) { color: var(--text); }
    /* Forms */
    .auth-form { display: flex; flex-direction: column; gap: 16px; }
    .auth-form.hidden { display: none; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group label {
      font-size: 0.85rem;
      color: var(--text2);
      font-weight: 500;
    }
    .form-group input {
      background: var(--surface2);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 12px 16px;
      color: var(--text);
      font-family: var(--font);
      font-size: 0.95rem;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }
    .form-group input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(138,180,248,0.15);
    }
    .form-group input::placeholder { color: var(--text2); opacity: 0.6; }
    .input-with-toggle { position: relative; }
    .input-with-toggle input { width: 100%; padding-right: 44px; }
    .toggle-pw {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--text2);
      cursor: pointer;
      font-size: 18px;
      padding: 4px;
      line-height: 1;
    }
    .toggle-pw:hover { color: var(--text); }
    /* Error & Success */
    .form-alert {
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 0.88rem;
      font-weight: 500;
      display: none;
      animation: fadeIn 0.2s ease;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .form-alert.error { background: rgba(242,139,130,0.12); color: var(--danger); border: 1px solid rgba(242,139,130,0.3); display: block; }
    .form-alert.success { background: rgba(129,201,149,0.12); color: var(--success); border: 1px solid rgba(129,201,149,0.3); display: block; }
    /* Submit button */
    .btn-submit {
      background: linear-gradient(135deg, #8ab4f8, #81c995);
      color: #202124;
      border: none;
      border-radius: 10px;
      padding: 13px;
      font-family: var(--font);
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 4px;
      box-shadow: 0 4px 15px rgba(138,180,248,0.2);
    }
    .btn-submit:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(138,180,248,0.35);
    }
    .btn-submit:active { transform: translateY(0); }
    .btn-submit.loading { opacity: 0.7; cursor: not-allowed; }
    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--text2);
      font-size: 0.8rem;
      margin: 4px 0;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }
    /* Guest link */
    .guest-link {
      text-align: center;
    }
    .guest-link a {
      color: var(--accent);
      text-decoration: none;
      font-size: 0.88rem;
      font-weight: 500;
      transition: color 0.2s;
    }
    .guest-link a:hover { color: var(--accent-hover); text-decoration: underline; }
    /* Theme toggle */
    .theme-toggle-auth {
      position: fixed;
      top: 20px;
      right: 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 18px;
      color: var(--text2);
      transition: all 0.2s;
      z-index: 10;
    }
    .theme-toggle-auth:hover { color: var(--text); border-color: var(--accent); }
    /* Strength bar */
    .pw-strength {
      height: 3px;
      border-radius: 3px;
      background: var(--surface2);
      margin-top: 4px;
      overflow: hidden;
    }
    .pw-strength-bar {
      height: 100%;
      border-radius: 3px;
      width: 0;
      transition: width 0.3s, background 0.3s;
    }
    @media (max-width: 480px) {
      .auth-card { padding: 32px 24px; }
    }
  </style>
</head>
<body>

  <button class="theme-toggle-auth" id="themeToggle" title="Toggle theme" aria-label="Toggle theme">🌙</button>

  <div class="auth-card">
    <div class="logo-area">
      <div class="logo-icon">📝</div>
      <h1>Student Notes</h1>
      <p>Sign in to unlock all features</p>
    </div>

    <!-- Tabs -->
    <div class="auth-tabs" role="tablist">
      <button class="auth-tab active" id="loginTab" role="tab" aria-selected="true" onclick="switchTab('login')">Sign In</button>
      <button class="auth-tab" id="registerTab" role="tab" aria-selected="false" onclick="switchTab('register')">Create Account</button>
    </div>

    <!-- Login Form -->
    <form class="auth-form" id="loginForm" onsubmit="handleLogin(event)" novalidate>
      <div id="loginAlert" class="form-alert" role="alert"></div>
      <div class="form-group">
        <label for="loginEmail">Email</label>
        <input type="email" id="loginEmail" placeholder="you@example.com" autocomplete="email" required>
      </div>
      <div class="form-group">
        <label for="loginPassword">Password</label>
        <div class="input-with-toggle">
          <input type="password" id="loginPassword" placeholder="Your password" autocomplete="current-password" required>
          <button type="button" class="toggle-pw" onclick="togglePassword('loginPassword', this)" aria-label="Show/hide password">👁</button>
        </div>
      </div>
      <button type="submit" class="btn-submit" id="loginBtn">Sign In →</button>
      <div class="divider">or</div>
      <div class="guest-link">
        <a href="index.html">Continue without account</a>
      </div>
    </form>

    <!-- Register Form -->
    <form class="auth-form hidden" id="registerForm" onsubmit="handleRegister(event)" novalidate>
      <div id="registerAlert" class="form-alert" role="alert"></div>
      <div class="form-group">
        <label for="regName">Display Name</label>
        <input type="text" id="regName" placeholder="Your name" autocomplete="name" required>
      </div>
      <div class="form-group">
        <label for="regEmail">Email</label>
        <input type="email" id="regEmail" placeholder="you@example.com" autocomplete="email" required>
      </div>
      <div class="form-group">
        <label for="regPassword">Password</label>
        <div class="input-with-toggle">
          <input type="password" id="regPassword" placeholder="Min. 6 characters" autocomplete="new-password" required oninput="checkStrength(this.value)">
          <button type="button" class="toggle-pw" onclick="togglePassword('regPassword', this)" aria-label="Show/hide password">👁</button>
        </div>
        <div class="pw-strength"><div class="pw-strength-bar" id="strengthBar"></div></div>
      </div>
      <div class="form-group">
        <label for="regConfirm">Confirm Password</label>
        <div class="input-with-toggle">
          <input type="password" id="regConfirm" placeholder="Repeat password" autocomplete="new-password" required>
          <button type="button" class="toggle-pw" onclick="togglePassword('regConfirm', this)" aria-label="Show/hide password">👁</button>
        </div>
      </div>
      <button type="submit" class="btn-submit" id="registerBtn">Create Account →</button>
      <div class="divider">or</div>
      <div class="guest-link">
        <a href="index.html">Continue without account</a>
      </div>
    </form>
  </div>

  <script src="auth.js"></script>
  <script>
    // ── Init ──────────────────────────────────────────
    const THEME_KEY = 'sna_theme';

    (function init() {
      // If already logged in, redirect to intended page or index
      if (authIsLoggedIn()) {
        const params = new URLSearchParams(window.location.search);
        window.location.href = params.get('next') || 'index.html';
        return;
      }
      // Restore theme
      const saved = localStorage.getItem(THEME_KEY) || 'dark';
      applyTheme(saved);

      // Check if tab param given
      const params = new URLSearchParams(window.location.search);
      if (params.get('tab') === 'register') switchTab('register');
    })();

    // ── Theme ─────────────────────────────────────────
    function applyTheme(theme) {
      document.documentElement.setAttribute('data-theme', theme);
      document.getElementById('themeToggle').textContent = theme === 'dark' ? '☀️' : '🌙';
      localStorage.setItem(THEME_KEY, theme);
    }

    document.getElementById('themeToggle').addEventListener('click', () => {
      const cur = document.documentElement.getAttribute('data-theme');
      applyTheme(cur === 'dark' ? 'light' : 'dark');
    });

    // ── Tabs ──────────────────────────────────────────
    function switchTab(tab) {
      const isLogin = tab === 'login';
      document.getElementById('loginTab').classList.toggle('active', isLogin);
      document.getElementById('registerTab').classList.toggle('active', !isLogin);
      document.getElementById('loginForm').classList.toggle('hidden', !isLogin);
      document.getElementById('registerForm').classList.toggle('hidden', isLogin);
      // Clear alerts
      setAlert('loginAlert', '');
      setAlert('registerAlert', '');
    }

    // ── Alerts ────────────────────────────────────────
    function setAlert(id, message, type = 'error') {
      const el = document.getElementById(id);
      if (!el) return;
      el.textContent = message;
      el.className = 'form-alert';
      if (message) el.classList.add(type);
    }

    // ── Password visibility ───────────────────────────
    function togglePassword(inputId, btn) {
      const input = document.getElementById(inputId);
      if (!input) return;
      const isText = input.type === 'text';
      input.type = isText ? 'password' : 'text';
      btn.textContent = isText ? '👁' : '🙈';
    }

    // ── Password strength ─────────────────────────────
    function checkStrength(pw) {
      const bar = document.getElementById('strengthBar');
      if (!bar) return;
      let score = 0;
      if (pw.length >= 6) score++;
      if (pw.length >= 10) score++;
      if (/[A-Z]/.test(pw)) score++;
      if (/[0-9]/.test(pw)) score++;
      if (/[^A-Za-z0-9]/.test(pw)) score++;
      const colors = ['#f28b82', '#fbbc04', '#fbbc04', '#81c995', '#8ab4f8'];
      const widths = [20, 40, 60, 80, 100];
      bar.style.width = (widths[score - 1] || 0) + '%';
      bar.style.background = colors[score - 1] || 'transparent';
    }

    // ── Login ─────────────────────────────────────────
    function handleLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      btn.classList.add('loading');
      btn.textContent = 'Signing in...';

      setTimeout(() => {
        const email = document.getElementById('loginEmail').value;
        const password = document.getElementById('loginPassword').value;
        const result = authLogin(email, password);

        if (result.success) {
          setAlert('loginAlert', '✓ Signed in successfully!', 'success');
          setTimeout(() => {
            const params = new URLSearchParams(window.location.search);
            window.location.href = params.get('next') || 'index.html';
          }, 600);
        } else {
          setAlert('loginAlert', result.error, 'error');
          btn.classList.remove('loading');
          btn.textContent = 'Sign In →';
        }
      }, 400); // small delay for UX feel
    }

    // ── Register ──────────────────────────────────────
    function handleRegister(e) {
      e.preventDefault();
      const btn = document.getElementById('registerBtn');
      const name = document.getElementById('regName').value;
      const email = document.getElementById('regEmail').value;
      const password = document.getElementById('regPassword').value;
      const confirm = document.getElementById('regConfirm').value;

      if (password !== confirm) {
        setAlert('registerAlert', 'Passwords do not match.', 'error');
        return;
      }

      btn.classList.add('loading');
      btn.textContent = 'Creating account...';

      setTimeout(() => {
        const result = authRegister(email, password, name);
        if (result.success) {
          setAlert('registerAlert', '✓ Account created! Redirecting...', 'success');
          setTimeout(() => {
            const params = new URLSearchParams(window.location.search);
            window.location.href = params.get('next') || 'index.html';
          }, 700);
        } else {
          setAlert('registerAlert', result.error, 'error');
          btn.classList.remove('loading');
          btn.textContent = 'Create Account →';
        }
      }, 400);
    }
  </script>
</body>
</html>
