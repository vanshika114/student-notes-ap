<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Arrangement Master</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --primary: #8b5cf6;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --text: #f8fafc;
            --code-bg: #000000;
            --drag-hover: #334155;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .game-container {
            background: var(--card);
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
            width: 90%;
            max-width: 800px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            border-bottom: 1px solid #334155;
            padding-bottom: 1rem;
        }

        .stats {
            display: flex;
            gap: 1.5rem;
            font-weight: bold;
        }

        .difficulty-badge {
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.875rem;
            text-transform: uppercase;
        }

        .easy { background: var(--success); }
        .medium { background: var(--warning); }
        .hard { background: var(--danger); }

        .code-container {
            background: var(--code-bg);
            padding: 1rem;
            border-radius: 0.5rem;
            min-height: 200px;
            margin-bottom: 1.5rem;
            border: 1px solid #334155;
        }

        .code-line {
            background: #1e293b;
            color: #e2e8f0;
            padding: 0.75rem 1rem;
            margin-bottom: 0.5rem;
            border-radius: 0.375rem;
            cursor: grab;
            font-family: 'Fira Code', 'Courier New', monospace;
            border: 1px solid #475569;
            user-select: none;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .code-line:active { cursor: grabbing; }
        .code-line.dragging { opacity: 0.5; border: 2px dashed var(--primary); }
        .code-line .drag-handle { color: #64748b; cursor: grab; }

        .controls {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
        }

        button {
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }

        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn-secondary { background: #475569; color: white; }

        #feedback {
            margin-top: 1rem;
            font-weight: bold;
            height: 1.5rem;
        }

        .description {
            margin-bottom: 1rem;
            color: #94a3b8;
        }
    </style>
</head>
<body>

<div class="game-container">
    <div class="header">
        <div>
            <span id="levelBadge" class="difficulty-badge easy">Easy</span>
            <h2 id="title">Arrange the Code</h2>
        </div>
        <div class="stats">
            <div>Score: <span id="score">0</span></div>
            <div>Time: <span id="timer">60s</span></div>
        </div>
    </div>

    <p id="description" class="description">Drag the lines of code into the correct order to solve the problem.</p>
    
    <div id="codeContainer" class="code-container"></div>

    <div class="controls">
        <button class="btn-primary" onclick="checkOrder()">Verify Solution</button>
        <button class="btn-secondary" onclick="shuffleCurrent()">Reshuffle</button>
    </div>

    <div id="feedback"></div>
</div>

<script>
    const challenges = {
        easy: [
            {
                lines: ["let x = 5;", "let y = 10;", "console.log(x + y);"],
                desc: "Variable declaration and addition."
            },
            {
                lines: ["const greeting = 'Hello';", "function sayHi() {", "  console.log(greeting);", "}", "sayHi();"],
                desc: "Basic function and scope."
            }
        ],
        medium: [
            {
                lines: ["const nums = [1, 2, 3];", "let sum = 0;", "for (let n of nums) {", "  sum += n;", "}", "console.log(sum);"],
                desc: "Iterating through an array."
            },
            {
                lines: ["const isUser = true;", "if (isUser) {", "  console.log('Welcome');", "} else {", "  console.log('Guest');", "}"],
                desc: "Conditional logic flow."
            }
        ],
        hard: [
            {
                lines: ["async function load() {", "  const res = await fetch(url);", "  const data = await res.json();", "  return data;", "}", "load().then(console.log);"],
                desc: "Asynchronous data fetching."
            },
            {
                lines: ["class User {", "  constructor(name) {", "    this.name = name;", "  }", "  greet() { return 'Hi ' + this.name; }", "}", "const me = new User('Dev');"],
                desc: "Class definition and instantiation."
            }
        ]
    };

    let currentLevel = 'easy';
    let challengeIndex = 0;
    let score = 0;
    let timeLeft = 60;
    let timerInterval;
    let correctOrder = [];

    function shuffle(array) {
        let shuffled = [...array];
        for (let i = shuffled.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        return shuffled;
    }

    function loadChallenge() {
        const challenge = challenges[currentLevel][challengeIndex];
        correctOrder = [...challenge.lines];
        const shuffledLines = shuffle(correctOrder);
        
        const container = document.getElementById('codeContainer');
        container.innerHTML = '';
        
        shuffledLines.forEach((line, index) => {
            const div = document.createElement('div');
            div.className = 'code-line';
            div.draggable = true;
            div.innerHTML = `<span class="drag-handle">☰</span> ${line}`;
            div.dataset.content = line;
            
            div.addEventListener('dragstart', () => div.classList.add('dragging'));
            div.addEventListener('dragend', () => div.classList.remove('dragging'));
            
            container.appendChild(div);
        });

        container.addEventListener('dragover', e => {
            e.preventDefault();
            const afterElement = getDragAfterElement(container, e.clientY);
            const dragging = document.querySelector('.dragging');
            if (afterElement == null) {
                container.appendChild(dragging);
            } else {
                container.insertBefore(dragging, afterElement);
            }
        });

        document.getElementById('description').innerText = challenge.desc;
        document.getElementById('levelBadge').className = `difficulty-badge ${currentLevel}`;
        document.getElementById('levelBadge').innerText = currentLevel;
        document.getElementById('feedback').innerText = '';
        
        resetTimer();
    }

    function getDragAfterElement(container, y) {
        const draggableElements = [...container.querySelectorAll('.code-line:not(.dragging)')];
        return draggableElements.reduce((closest, child) => {
            const box = child.getBoundingClientRect();
            const offset = y - box.top - box.height / 2;
            if (offset < 0 && offset > closest.offset) {
                return { offset: offset, element: child };
            } else {
                return closest;
            }
        }, { offset: Number.NEGATIVE_INFINITY }).element;
    }

    function resetTimer() {
        clearInterval(timerInterval);
        timeLeft = currentLevel === 'easy' ? 60 : (currentLevel === 'medium' ? 90 : 120);
        document.getElementById('timer').innerText = `${timeLeft}s`;
        timerInterval = setInterval(() => {
            timeLeft--;
            document.getElementById('timer').innerText = `${timeLeft}s`;
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                document.getElementById('feedback').innerText = "Time's up! Try again.";
                document.getElementById('feedback').style.color = 'var(--danger)';
            }
        }, 1000);
    }

    function checkOrder() {
        const lines = [...document.querySelectorAll('.code-line')].map(el => el.dataset.content);
        const isCorrect = lines.every((val, index) => val === correctOrder[index]);

        if (isCorrect) {
            clearInterval(timerInterval);
            score += 150 + (timeLeft * 2);
            document.getElementById('score').innerText = score;
            document.getElementById('feedback').innerText = "Correct! Program works.";
            document.getElementById('feedback').style.color = 'var(--success)';
            setTimeout(nextChallenge, 1500);
        } else {
            document.getElementById('feedback').innerText = "Incorrect order. Try again!";
            document.getElementById('feedback').style.color = 'var(--danger)';
        }
    }

    function shuffleCurrent() {
        loadChallenge();
    }

    function nextChallenge() {
        challengeIndex++;
        if (challengeIndex >= challenges[currentLevel].length) {
            if (currentLevel === 'easy') currentLevel = 'medium';
            else if (currentLevel === 'medium') currentLevel = 'hard';
            else return alert("Game Complete! Final Score: " + score);
            challengeIndex = 0;
        }
        loadChallenge();
    }

    loadChallenge();
</script>
</body>
</html>
