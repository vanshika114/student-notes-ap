<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Challenge — NSOC'26</title>
    <style>
        :root {
            --bg-color: #202124;
            --card-bg: #2d2e31;
            --text-primary: #e8eaed;
            --text-secondary: #9aa0a6;
            --accent: #d2e3fc;
            --success: #81c995;
            --error: #f28b82;
            --border: #5f6368;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: 'Google Sans', Roboto, Arial, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .header {
            width: 100%;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
            border-bottom: 1px solid var(--border);
        }

        .game-container {
            max-width: 900px;
            width: 95%;
            margin-top: 30px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 24px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        .filters {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        select {
            background: #3c4043;
            color: white;
            border: 1px solid var(--border);
            padding: 8px 12px;
            border-radius: 4px;
            outline: none;
        }

        .stats-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            font-size: 14px;
            color: var(--text-secondary);
        }

        .challenge-box {
            background: #1e1e1e;
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 20px;
            margin-bottom: 20px;
        }

        #challengeTitle { color: var(--accent); margin-top: 0; }

        .editor-container {
            border: 1px solid var(--border);
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        textarea {
            width: 100%;
            height: 250px;
            background: #1a1a1a;
            color: #dcdcdc;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 15px;
            border: none;
            padding: 15px;
            box-sizing: border-box;
            resize: vertical;
            outline: none;
        }

        .controls {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }

        button {
            padding: 10px 24px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 500;
            transition: 0.2s;
            border: 1px solid var(--border);
        }

        button.primary {
            background: #8ab4f8;
            color: #202124;
            border: none;
        }

        button.secondary {
            background: transparent;
            color: var(--text-secondary);
        }

        button:hover { opacity: 0.85; }

        #result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 4px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="header">
        <div style="font-size: 22px; font-weight: 500;">🚀 Code Challenge</div>
        <div>Score: <span id="score">0</span></div>
    </div>

    <div class="game-container">
        <div class="filters">
            <select id="diffFilter"><option value="easy">Easy</option><option value="medium">Medium</option><option value="hard">Hard</option></select>
            <select id="catFilter"><option value="all">All Categories</option><option value="Arrays">Arrays</option><option value="Strings">Strings</option><option value="Math">Math</option></select>
            <button id="nextBtn" class="secondary">New Random Challenge</button>
        </div>

        <div class="challenge-box">
            <h3 id="challengeTitle">Problem Title</h3>
            <p id="challengeDesc">Loading description...</p>
        </div>

        <div class="editor-container">
            <textarea id="codeEditor" spellcheck="false"></textarea>
        </div>

        <div id="result"></div>

        <div class="controls">
            <button id="runBtn" class="primary">Submit Solution</button>
        </div>
    </div>

    <!-- Confetti Container -->
    <div id="confetti-canvas" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 9999;"></div>

    <script src="auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const challenges = [
                { 
                    title: "Hello World", 
                    desc: "Write a function 'solution()' that returns the string 'Hello World'.", 
                    starter: "function solution() {\n  return \"\";\n}", 
                    tests: [{ input: [], output: "Hello World" }] 
                },
                { 
                    title: "Basic Addition", 
                    desc: "Write a function 'solution(a, b)' that returns the sum of a and b.", 
                    starter: "function solution(a, b) {\n  return a + b;\n}", 
                    tests: [{ input: [5, 3], output: 8 }, { input: [10, -2], output: 8 }] 
                },
                { 
                    title: "Is Even?", 
                    desc: "Write a function 'solution(n)' that returns true if n is even, and false if it is odd.", 
                    starter: "function solution(n) {\n  \n}", 
                    tests: [{ input: [4], output: true }, { input: [7], output: false }] 
                },
                {
                    title: "Return One",
                    desc: "Write a function 'solution()' that always returns the number 1.",
                    starter: "function solution() {\n  \n}",
                    tests: [{ input: [], output: 1 }]
                }
            ];

            let currentChallenge = null;
            let score = 0;

            const DOM = {
                title: document.getElementById('challengeTitle'),
                desc: document.getElementById('challengeDesc'),
                editor: document.getElementById('codeEditor'),
                score: document.getElementById('score'),
                result: document.getElementById('result'),
                run: document.getElementById('runBtn'),
                next: document.getElementById('nextBtn'),
                confetti: document.getElementById('confetti-canvas')
            };

            function createConfetti() {
                for (let i = 0; i < 50; i++) {
                    const confetti = document.createElement('div');
                    confetti.innerText = ["🎊", "🎉", "✨", "⭐"][Math.floor(Math.random() * 4)];
                    confetti.style.position = 'absolute';
                    confetti.style.left = Math.random() * 100 + 'vw';
                    confetti.style.top = '-5vh';
                    confetti.style.fontSize = (Math.random() * 20 + 20) + 'px';
                    confetti.style.transition = `all ${Math.random() * 2 + 2}s linear`;
                    DOM.confetti.appendChild(confetti);

                    setTimeout(() => {
                        confetti.style.top = '105vh';
                        confetti.style.transform = `rotate(${Math.random() * 1000}deg)`;
                    }, 50);

                    setTimeout(() => confetti.remove(), 4000);
                }
            }

            function loadRandomChallenge() {
                currentChallenge = challenges[Math.floor(Math.random() * challenges.length)];
                DOM.title.innerText = `🚀 ${currentChallenge.title}`;
                DOM.desc.innerText = currentChallenge.desc;
                DOM.editor.value = currentChallenge.starter;
                DOM.result.style.display = 'none';
            }

            function showResult(msg, type) {
                DOM.result.innerText = msg;
                DOM.result.style.display = 'block';
                DOM.result.style.background = type === 'success' ? 'rgba(129, 201, 149, 0.2)' : 'rgba(242, 139, 130, 0.2)';
                DOM.result.style.color = type === 'success' ? '#81c995' : '#f28b82';
                DOM.result.style.fontWeight = "bold";
                DOM.result.style.textAlign = "center";
                DOM.result.style.padding = "15px";
                DOM.result.style.borderRadius = "8px";
                DOM.result.style.fontSize = "1.2rem";
            }

            function handleSubmit() {
                if (!currentChallenge) return;

                const userCode = DOM.editor.value;
                try {
                    // Execute user code to verify the 'solution' function
                    const solveFn = new Function(`
                        ${userCode}
                        return typeof solution !== 'undefined' ? solution : null;
                    `)();

                    if (typeof solveFn !== 'function') {
                        throw new Error("No solution function found");
                    }

                    let allPassed = true;
                    for (const test of currentChallenge.tests) {
                        const result = solveFn(...test.input);
                        if (JSON.stringify(result) !== JSON.stringify(test.output)) {
                            allPassed = false;
                            break;
                        }
                    }

                    if (allPassed) {
                        score += 10;
                        DOM.score.innerText = score;
                        showResult("You Did It Champ", "success");
                        createConfetti();
                        
                        // Load next after a delay
                        setTimeout(loadRandomChallenge, 3000);
                    } else {
                        showResult("Do it one more time", "error");
                    }
                } catch (err) {
                    showResult("Do it one more time", "error");
                }
            }

            DOM.run.addEventListener('click', handleSubmit);
            DOM.next.addEventListener('click', loadRandomChallenge);
            
            loadRandomChallenge();
        });
    </script>
</body>
</html>
