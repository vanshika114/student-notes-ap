<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guess Output — NSOC'26</title>
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --accent: #d2e3fc;
            --success: #c6f6d5;
            --error: #fed7d7;
        }

        body {
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            color: #e8eaed;
            font-family: 'Google Sans', Roboto, Arial, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px;
            width: 90%;
            max-width: 650px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            position: relative;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .badge {
            background: rgba(255, 255, 255, 0.15);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 14px;
            border: 1px solid var(--glass-border);
        }

        pre {
            background: rgba(0, 0, 0, 0.4);
            padding: 24px;
            border-radius: 12px;
            font-family: 'Fira Code', 'Consolas', monospace;
            font-size: 16px;
            line-height: 1.5;
            margin-bottom: 24px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            color: #8ab4f8;
        }

        .input-area {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }

        input {
            flex: 1;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 14px 20px;
            color: white;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
        }

        input:focus { border-color: #8ab4f8; background: rgba(255, 255, 255, 0.15); }

        button {
            background: #8ab4f8;
            color: #202124;
            border: none;
            padding: 0 24px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover { transform: translateY(-2px); opacity: 0.9; }

        .feedback {
            margin-top: 20px;
            padding: 16px;
            border-radius: 12px;
            display: none;
            animation: slideUp 0.3s ease-out;
        }

        .feedback.correct { background: rgba(72, 187, 120, 0.2); color: #81c995; border: 1px solid #81c995; }
        .feedback.wrong { background: rgba(245, 101, 101, 0.2); color: #f28b82; border: 1px solid #f28b82; }

        .explanation { margin-top: 8px; font-size: 14px; opacity: 0.8; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="glass-card">
        <div class="header">
            <div style="font-size: 24px; font-weight: 600;">🧩 Guess Output</div>
            <div class="badge">Score: <span id="score">0</span></div>
        </div>

        <div class="badge" id="category" style="margin-bottom: 15px; display: inline-block;">Topic</div>

        <pre id="codeSnippet"></pre>

        <div class="input-area">
            <input type="text" id="userInput" placeholder="Type the output here..." autocomplete="off">
            <button id="submitBtn">Check</button>
        </div>

        <div id="feedbackBox" class="feedback">
            <div id="statusText" style="font-weight: bold;">Correct!</div>
            <div id="explanationText" class="explanation"></div>
            <button id="nextBtn" style="margin-top: 15px; background: transparent; color: white; border: 1px solid white; height: 36px; padding: 0 15px;">Next Challenge</button>
        </div>
    </div>

    <script src="auth.js"></script>
    <script>
        const questions = [
            {
                topic: "Loops & Strings",
                code: "let res = '';\nfor (let i = 0; i < 3; i++) {\n  res += i;\n}\nconsole.log(res);",
                answer: "012",
                explain: "The loop iterates from 0 up to 2, appending each number as a string to 'res'."
            },
            {
                topic: "Functions & Scope",
                code: "const greet = (name) => `Hi ${name}`;\nconsole.log(greet());",
                answer: "Hi undefined",
                explain: "Since no argument was passed, 'name' is initialized as undefined."
            },
            {
                topic: "Arrays",
                code: "const nums = [1, 2, 3];\nnums.length = 1;\nconsole.log(nums[1]);",
                answer: "undefined",
                explain: "Setting length to 1 truncates the array. Index 1 no longer exists."
            },
            {
                topic: "Conditions",
                code: "const val = 0 || 'JS' || 1;\nconsole.log(val);",
                answer: "JS",
                explain: "The OR (||) operator returns the first truthy value. 0 is falsy, 'JS' is truthy."
            },
            {
                topic: "Recursion",
                code: "function f(n) {\n  return n <= 1 ? 1 : n + f(n - 1);\n}\nconsole.log(f(3));",
                answer: "6",
                explain: "Calculation: 3 + f(2) -> 3 + 2 + f(1) -> 3 + 2 + 1 = 6."
            }
        ];

        let currentIdx = 0;
        let score = 0;

        const DOM = {
            code: document.getElementById('codeSnippet'),
            input: document.getElementById('userInput'),
            score: document.getElementById('score'),
            cat: document.getElementById('category'),
            feedback: document.getElementById('feedbackBox'),
            status: document.getElementById('statusText'),
            explain: document.getElementById('explanationText'),
            submit: document.getElementById('submitBtn'),
            next: document.getElementById('nextBtn')
        };

        function loadQuestion() {
            const q = questions[currentIdx];
            DOM.code.innerText = q.code;
            DOM.cat.innerText = q.topic;
            DOM.input.value = "";
            DOM.feedback.style.display = "none";
            DOM.input.focus();
        }

        DOM.submit.addEventListener('click', () => {
            const q = questions[currentIdx];
            const isCorrect = DOM.input.value.trim() === q.answer;
            
            if (isCorrect) {
                score += 10;
                DOM.score.innerText = score;
                DOM.status.innerText = "✨ You Did It Champ!";
                DOM.feedback.className = "feedback correct";
                DOM.explain.innerText = q.explain;
            } else {
                DOM.status.innerText = "❌ Not quite right";
                DOM.feedback.className = "feedback wrong";
                DOM.explain.innerText = `Correct Answer: ${q.answer}\n\n${q.explain}`;
            }
            DOM.feedback.style.display = "block";
        });

        DOM.next.addEventListener('click', () => {
            currentIdx = (currentIdx + 1) % questions.length;
            loadQuestion();
        });

        loadQuestion();
    </script>
</body>
</html>
