<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unit Converter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="converter">
        <h1>Unit Converter</h1>
        <p class="muted">Convert between temperatures, lengths, weights, and currencies (fixed rates).</p>

        <label for="type">Category</label>
        <select id="type">
            <option value="temperature">Temperature</option>
            <option value="length">Length</option>
            <option value="weight">Weight</option>
            <option value="currency">Currency</option>
        </select>

        <div class="row">
            <div class="col">
                <label for="fromUnit">From</label>
                <select id="fromUnit"></select>
            </div>
            <div class="col">
                <label for="toUnit">To</label>
                <select id="toUnit"></select>
            </div>
        </div>

        <label for="value">Value</label>
        <input id="value" type="number" placeholder="Enter value" />

        <div class="actions">
            <button id="convert">Convert</button>
            <button id="swap">Swap</button>
            <button id="clear">Clear</button>
        </div>

        <div class="result" id="result">—</div>

        <footer class="note">Currency rates are fixed sample values (no APIs).</footer>
    </main>

    <script src="script.js"></script>
</body>
</html>
