<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Focus Beats // Sound Suite</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-container">
    <aside class="sidebar">
      <div class="app-header">
        <svg class="app-logo" width="28" height="28" viewBox="0 0 28 28" fill="none">
          <circle cx="14" cy="14" r="12" stroke="#3b82f6" stroke-width="2"/>
          <circle cx="14" cy="14" r="4" fill="#3b82f6"/>
        </svg>
        <h1>Focus Beats <span class="highlight">//</span> Sound Suite</h1>
      </div>

      <div class="timer-section">
        <div class="timer-display" id="timer-display">25:00</div>

        <div class="session-selectors">
          <button class="session-btn active" data-session="focus">Focus / 25m</button>
          <button class="session-btn" data-session="short">Short Break / 5m</button>
          <button class="session-btn" data-session="long">Long Break / 15m</button>
        </div>

        <div class="timer-controls">
          <button class="ctrl-btn play-btn" id="play-btn" title="Start Timer">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
              <polygon points="5 3 19 12 5 21 5 3"/>
            </svg>
            Play
          </button>
          <button class="ctrl-btn" id="pause-btn" title="Pause Timer">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
              <rect x="6" y="4" width="4" height="16" rx="1"/>
              <rect x="14" y="4" width="4" height="16" rx="1"/>
            </svg>
            Pause
          </button>
          <button class="ctrl-btn" id="reset-btn" title="Reset Timer">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="23 4 23 10 17 10"/>
              <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
            </svg>
            Reset
          </button>
        </div>

        <div class="stats-panel">
          <div class="stat-item">
            <span class="stat-label">Focus Cycles</span>
            <span class="stat-value" id="cycle-count">0</span>
          </div>
          <div class="stat-item">
            <span class="stat-label">Session</span>
            <span class="stat-value" id="session-label">Focus</span>
          </div>
          <div class="stat-item">
            <span class="stat-label">Timer</span>
            <span class="stat-value" id="timer-state-label">Idle</span>
          </div>
        </div>
      </div>
    </aside>

    <main class="main-content">
      <div class="mixer-header">
        <h2>Audio Matrix</h2>
        <span class="mixer-subtitle">Ambient Sound Mixer</span>
      </div>

      <div class="mixer-deck">
        <div class="mixer-row" data-channel="rain">
          <button class="mute-btn" data-channel="rain" title="Mute / Unmute">
            <svg class="icon-unmuted" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
              <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
              <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
            </svg>
            <svg class="icon-muted" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
              <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
              <line x1="23" y1="9" x2="17" y2="15"/>
              <line x1="17" y1="9" x2="23" y2="15"/>
            </svg>
          </button>
          <span class="track-icon">~</span>
          <span class="track-label">Rain Patterns</span>
          <div class="slider-group">
            <input type="range" min="0" max="100" value="0" class="audio-slider" data-channel="rain">
            <span class="volume-indicator" data-channel="rain">0%</span>
          </div>
        </div>

        <div class="mixer-row" data-channel="cafe">
          <button class="mute-btn" data-channel="cafe" title="Mute / Unmute">
            <svg class="icon-unmuted" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
              <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
              <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
            </svg>
            <svg class="icon-muted" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
              <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
              <line x1="23" y1="9" x2="17" y2="15"/>
              <line x1="17" y1="9" x2="23" y2="15"/>
            </svg>
          </button>
          <span class="track-icon">#</span>
          <span class="track-label">Cafe Chatter</span>
          <div class="slider-group">
            <input type="range" min="0" max="100" value="0" class="audio-slider" data-channel="cafe">
            <span class="volume-indicator" data-channel="cafe">0%</span>
          </div>
        </div>

        <div class="mixer-row" data-channel="whiteNoise">
          <button class="mute-btn" data-channel="whiteNoise" title="Mute / Unmute">
            <svg class="icon-unmuted" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
              <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
              <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
            </svg>
            <svg class="icon-muted" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
              <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
              <line x1="23" y1="9" x2="17" y2="15"/>
              <line x1="17" y1="9" x2="23" y2="15"/>
            </svg>
          </button>
          <span class="track-icon">~</span>
          <span class="track-label">White Noise Waves</span>
          <div class="slider-group">
            <input type="range" min="0" max="100" value="0" class="audio-slider" data-channel="whiteNoise">
            <span class="volume-indicator" data-channel="whiteNoise">0%</span>
          </div>
        </div>

        <div class="mixer-row" data-channel="train">
          <button class="mute-btn" data-channel="train" title="Mute / Unmute">
            <svg class="icon-unmuted" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
              <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
              <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
            </svg>
            <svg class="icon-muted" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
              <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
              <line x1="23" y1="9" x2="17" y2="15"/>
              <line x1="17" y1="9" x2="23" y2="15"/>
            </svg>
          </button>
          <span class="track-icon">=</span>
          <span class="track-label">Train Tracks</span>
          <div class="slider-group">
            <input type="range" min="0" max="100" value="0" class="audio-slider" data-channel="train">
            <span class="volume-indicator" data-channel="train">0%</span>
          </div>
        </div>
      </div>
    </main>
  </div>
  <script src="script.js"></script>
</body>
</html>
