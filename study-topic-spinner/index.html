<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Random Study Topic Picker</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem 1rem;
    }

    /* ---- Header ---- */
    .header { text-align: center; margin-bottom: 1.8rem; }
    .header h1 { font-size: clamp(1.5rem, 4vw, 2rem); font-weight: 700; color: #fff; }
    .header h1 span { color: #fd79a8; }
    .header p { font-size: 0.78rem; color: rgba(255,255,255,0.35); margin-top: 0.3rem; }

    /* ---- Wheel Wrapper ---- */
    .wheel-wrap {
      position: relative;
      width: 280px;
      height: 280px;
      margin-bottom: 1.8rem;
    }

    canvas#wheelCanvas {
      border-radius: 50%;
      box-shadow: 0 0 40px rgba(253,121,168,0.3), 0 0 80px rgba(108,92,231,0.2);
    }

    /* Arrow pointer */
    .pointer {
      position: absolute;
      top: -18px;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 0;
      border-left: 14px solid transparent;
      border-right: 14px solid transparent;
      border-top: 26px solid #fd79a8;
      filter: drop-shadow(0 2px 6px rgba(253,121,168,0.6));
      z-index: 10;
    }

    /* Center circle */
    .center-circle {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 44px; height: 44px;
      border-radius: 50%;
      background: #1a1a2e;
      border: 3px solid rgba(255,255,255,0.2);
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
    }

    /* ---- Spin Button ---- */
    .spin-btn {
      padding: 0.9rem 3rem;
      border-radius: 14px;
      border: none;
      background: linear-gradient(135deg, #fd79a8, #e84393);
      color: #fff;
      font-family: 'Poppins', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      box-shadow: 0 8px 24px rgba(253,121,168,0.4);
      transition: transform 0.15s, box-shadow 0.15s;
      margin-bottom: 1.8rem;
      letter-spacing: 0.05em;
    }
    .spin-btn:active { transform: scale(0.95); }
    .spin-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ---- Result Card ---- */
    .result-card {
      display: none;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 20px;
      padding: 1.5rem 2rem;
      text-align: center;
      width: 100%;
      max-width: 380px;
      margin-bottom: 1.5rem;
      animation: popIn 0.4s ease;
    }
    .result-card.show { display: block; }
    @keyframes popIn {
      from { transform: scale(0.85); opacity: 0; }
      to   { transform: scale(1);    opacity: 1; }
    }
    .result-card .subject-badge {
      display: inline-block;
      padding: 0.25rem 1rem;
      border-radius: 999px;
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 0.7rem;
    }
    .result-card .topic-name {
      font-size: clamp(1.1rem, 3vw, 1.4rem);
      font-weight: 700;
      color: #fff;
      margin-bottom: 0.5rem;
    }
    .result-card .topic-desc {
      font-size: 0.8rem;
      color: rgba(255,255,255,0.5);
      line-height: 1.6;
    }

    /* ---- Custom Topic Section ---- */
    .custom-section {
      width: 100%;
      max-width: 380px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 1.2rem;
    }
    .custom-section h3 {
      font-size: 0.82rem;
      color: rgba(255,255,255,0.5);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 0.8rem;
    }
    .custom-row {
      display: flex;
      gap: 0.6rem;
    }
    .custom-input {
      flex: 1;
      padding: 0.6rem 1rem;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.07);
      color: #fff;
      font-family: 'Poppins', sans-serif;
      font-size: 0.82rem;
      outline: none;
    }
    .custom-input::placeholder { color: rgba(255,255,255,0.3); }
    .custom-input:focus { border-color: #fd79a8; }
    .add-btn {
      padding: 0.6rem 1.1rem;
      border-radius: 10px;
      border: none;
      background: #fd79a8;
      color: #fff;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      transition: transform 0.15s;
    }
    .add-btn:active { transform: scale(0.92); }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.45rem;
      margin-top: 0.8rem;
    }
    .tag {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 999px;
      padding: 0.25rem 0.8rem;
      font-size: 0.72rem;
      color: rgba(255,255,255,0.7);
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }
    .tag .remove {
      cursor: pointer;
      color: #fd79a8;
      font-weight: 700;
      font-size: 0.85rem;
      line-height: 1;
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>🎯 Study Topic <span>Picker</span></h1>
    <p>Spin the wheel to pick your next study topic! 📚</p>
  </div>

  <!-- Wheel -->
  <div class="wheel-wrap">
    <div class="pointer"></div>
    <canvas id="wheelCanvas" width="280" height="280"></canvas>
    <div class="center-circle">🎯</div>
  </div>

  <!-- Spin Button -->
  <button class="spin-btn" id="spinBtn" onclick="spin()">🎲 Spin!</button>

  <!-- Result -->
  <div class="result-card" id="resultCard">
    <div class="subject-badge" id="subjectBadge"></div>
    <div class="topic-name" id="topicName"></div>
    <div class="topic-desc" id="topicDesc"></div>
  </div>

  <!-- Custom Topics -->
  <div class="custom-section">
    <h3>➕ Add Custom Topic</h3>
    <div class="custom-row">
      <input class="custom-input" id="customInput" placeholder="e.g. Organic Chemistry" />
      <button class="add-btn" onclick="addCustom()">+</button>
    </div>
    <div class="tags" id="tagsContainer"></div>
  </div>

  <script>
    const topics = [
      { subject: "Maths",   color: "#e17055", emoji: "📐", name: "Algebra",        desc: "Solve equations, inequalities and polynomials." },
      { subject: "Maths",   color: "#e17055", emoji: "📐", name: "Geometry",        desc: "Shapes, angles, theorems and proofs." },
      { subject: "Science", color: "#00b894", emoji: "🔬", name: "Photosynthesis",  desc: "How plants convert sunlight into food." },
      { subject: "Science", color: "#00b894", emoji: "🔬", name: "Newton's Laws",   desc: "Motion, force and action-reaction principles." },
      { subject: "CS",      color: "#6c5ce7", emoji: "💻", name: "Arrays & Loops",  desc: "Iterate through data structures efficiently." },
      { subject: "CS",      color: "#6c5ce7", emoji: "💻", name: "Functions",       desc: "Reusable blocks of logic in programming." },
      { subject: "History", color: "#fdcb6e", emoji: "🌍", name: "Mughal Empire",   desc: "Rise, golden age and decline of the Mughals." },
      { subject: "History", color: "#fdcb6e", emoji: "🌍", name: "Freedom Movement",desc: "India's struggle for independence from 1857-1947." },
      { subject: "English", color: "#fd79a8", emoji: "📖", name: "Grammar",         desc: "Tenses, clauses and sentence structure." },
      { subject: "English", color: "#fd79a8", emoji: "📖", name: "Essay Writing",   desc: "Structure arguments and write compelling essays." },
    ];

    let allTopics = [...topics];
    let spinning  = false;
    let angle     = 0;

    const canvas = document.getElementById('wheelCanvas');
    const ctx    = canvas.getContext('2d');
    const cx = 140, cy = 140, r = 130;

    function drawWheel(rotAngle) {
      ctx.clearRect(0, 0, 280, 280);
      const n = allTopics.length;
      const slice = (2 * Math.PI) / n;

      allTopics.forEach((t, i) => {
        const start = rotAngle + i * slice;
        const end   = start + slice;

        // Slice
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.arc(cx, cy, r, start, end);
        ctx.closePath();
        ctx.fillStyle = t.color || '#a29bfe';
        ctx.fill();
        ctx.strokeStyle = 'rgba(0,0,0,0.25)';
        ctx.lineWidth = 2;
        ctx.stroke();

        // Emoji + text
        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(start + slice / 2);
        ctx.textAlign = 'right';
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 11px Poppins, sans-serif';
        ctx.fillText(t.emoji + ' ' + t.name, r - 10, 4);
        ctx.restore();
      });

      // Outer ring
      ctx.beginPath();
      ctx.arc(cx, cy, r, 0, 2 * Math.PI);
      ctx.strokeStyle = 'rgba(255,255,255,0.15)';
      ctx.lineWidth = 4;
      ctx.stroke();
    }

    function spin() {
      if (spinning || allTopics.length === 0) return;
      spinning = true;
      document.getElementById('spinBtn').disabled = true;
      document.getElementById('resultCard').classList.remove('show');

      const extraSpins  = (5 + Math.floor(Math.random() * 5)) * 2 * Math.PI;
      const randomStop  = Math.random() * 2 * Math.PI;
      const totalAngle  = extraSpins + randomStop;
      const duration    = 3500;
      const startAngle  = angle;
      const startTime   = performance.now();

      function easeOut(t) { return 1 - Math.pow(1 - t, 4); }

      function animate(now) {
        const elapsed  = now - startTime;
        const progress = Math.min(elapsed / duration, 1);
        angle = startAngle + totalAngle * easeOut(progress);
        drawWheel(angle);

        if (progress < 1) {
          requestAnimationFrame(animate);
        } else {
          spinning = false;
          document.getElementById('spinBtn').disabled = false;
          showResult();
        }
      }
      requestAnimationFrame(animate);
    }

    function showResult() {
      const n     = allTopics.length;
      const slice = (2 * Math.PI) / n;
      // pointer is at top (angle = -PI/2 relative)
      const normalized = (((-angle % (2 * Math.PI)) + 2 * Math.PI) % (2 * Math.PI));
      const idx = Math.floor(normalized / slice) % n;
      const topic = allTopics[idx];

      const badge = document.getElementById('subjectBadge');
      badge.textContent = topic.emoji + ' ' + topic.subject;
      badge.style.background = topic.color + '33';
      badge.style.color = topic.color;
      badge.style.border = `1px solid ${topic.color}55`;

      document.getElementById('topicName').textContent = topic.name;
      document.getElementById('topicDesc').textContent = topic.desc;
      document.getElementById('resultCard').classList.add('show');
    }

    function addCustom() {
      const input = document.getElementById('customInput');
      const val   = input.value.trim();
      if (!val) return;

      allTopics.push({
        subject: 'Custom', color: '#a29bfe', emoji: '✏️',
        name: val, desc: 'Your custom study topic.'
      });
      input.value = '';
      drawWheel(angle);
      renderTags();
    }

    function renderTags() {
      const container = document.getElementById('tagsContainer');
      const custom    = allTopics.filter(t => t.subject === 'Custom');
      container.innerHTML = custom.map((t, i) =>
        `<div class="tag">${t.emoji} ${t.name} <span class="remove" onclick="removeCustom(${i})">×</span></div>`
      ).join('');
    }

    function removeCustom(i) {
      const custom = allTopics.filter(t => t.subject === 'Custom');
      const name   = custom[i].name;
      allTopics    = allTopics.filter(t => !(t.subject === 'Custom' && t.name === name));
      drawWheel(angle);
      renderTags();
    }

    // Init
    drawWheel(0);
  </script>

</body>
</html>
