<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WordFlow — Word Completion</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: #1e293b;
      --accent: #10b981;
      --text: #f8fafc;
      --muted: #94a3b8;
      --success: #22c55e;
      --error: #ef4444;
    }
    body {
      margin: 0;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }
    .game-card {
      background: var(--card);
      width: 90%;
      max-width: 480px;
      padding: 32px;
      border-radius: 20px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.1);
      position: relative;
      text-align: center;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }
    .badge {
      background: rgba(16, 185, 129, 0.15);
      color: var(--accent);
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
    }
    .word-area {
      font-size: 42px;
      font-weight: 800;
      letter-spacing: 0.15em;
      margin: 40px 0;
      font-family: 'Monaco', 'Consolas', monospace;
    }
    .word-area span {
      display: inline-block;
      width: 32px;
      border-bottom: 4px solid var(--accent);
      margin: 0 4px;
      vertical-align: bottom;
      height: 42px;
    }
    .options-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }
    .opt-btn {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: var(--text);
      padding: 20px;
      border-radius: 12px;
      font-size: 20px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .opt-btn:hover:not(:disabled) {
      background: rgba(255, 255, 255, 0.08);
      border-color: var(--accent);
      transform: translateY(-2px);
    }
    .opt-btn.correct {
      background: var(--success) !important;
      border-color: var(--success);
      color: white;
    }
    .opt-btn.wrong {
      background: var(--error) !important;
      border-color: var(--error);
      color: white;
    }
    .screen-overlay {
      position: absolute;
      inset: 0;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 20;
      text-align: center;
      border-radius: 20px;
    }
    .primary-btn {
      background: var(--accent);
      color: var(--bg);
      border: none;
      padding: 14px 40px;
      border-radius: 12px;
      font-weight: 700;
      font-size: 18px;
      cursor: pointer;
      transition: transform 0.2s;
    }
    .primary-btn:hover { transform: scale(1.05); }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="game-card">
    <div id="start-screen" class="screen-overlay">
      <h1 style="font-size: 42px; margin: 0;">WordFlow</h1>
      <p style="color: var(--muted); margin-bottom: 30px;">Complete the word by choosing the right letter.</p>
      <button class="primary-btn" onclick="initGame()">Start Game</button>
    </div>

    <div id="end-screen" class="screen-overlay hidden">
      <h2 style="font-size: 32px;">Results</h2>
      <p id="final-stats" style="font-size: 24px; margin: 20px 0;"></p>
      <button class="primary-btn" onclick="initGame()">Try Again</button>
    </div>

    <div class="header">
      <div class="badge" id="round-indicator">ROUND 1/10</div>
      <div style="font-weight: 600;">Score: <span id="score-val" style="color: var(--accent)">0</span></div>
    </div>

    <div class="word-area" id="display-word"></div>

    <div class="options-grid" id="options-container"></div>
  </div>

  <script>
    const DATA = [
      { w: "GHOST", p: "GHO_T", m: "S" },
      { w: "BRAIN", p: "BRA_N", m: "I" },
      { w: "SPACE", p: "SPA_E", m: "C" },
      { w: "LIGHT", p: "LIG_T", m: "H" },
      { w: "POWER", p: "POW_R", m: "E" },
      { w: "FLAME", p: "FLA_E", m: "M" },
      { w: "OCEAN", p: "OC_AN", m: "E" },
      { w: "BREAD", p: "BRE_D", m: "A" },
      { w: "CLOCK", p: "CLO_K", m: "C" },
      { w: "FRUIT", p: "FR_IT", m: "U" }
    ];

    let state = { score: 0, round: 0, current: null, pool: [] };

    function initGame() {
      state = { score: 0, round: 0, pool: [...DATA].sort(() => Math.random() - 0.5) };
      document.getElementById('start-screen').classList.add('hidden');
      document.getElementById('end-screen').classList.add('hidden');
      document.getElementById('score-val').textContent = "0";
      loadRound();
    }

    function loadRound() {
      if (state.round >= 10) return finishGame();
      state.current = state.pool[state.round];
      document.getElementById('round-indicator').textContent = `ROUND ${state.round + 1}/10`;
      
      document.getElementById('display-word').innerHTML = state.current.p.replace('_', '<span></span>');

      let letters = [state.current.m];
      const alpha = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
      while (letters.length < 6) {
        const char = alpha[Math.floor(Math.random() * 26)];
        if (!letters.includes(char)) letters.push(char);
      }
      letters.sort(() => Math.random() - 0.5);

      const container = document.getElementById('options-container');
      container.innerHTML = '';
      letters.forEach(l => {
        const b = document.createElement('button');
        b.className = 'opt-btn';
        b.textContent = l;
        b.onclick = () => {
          const btns = document.querySelectorAll('.opt-btn');
          btns.forEach(x => x.disabled = true);
          if (l === state.current.m) {
            state.score += 10;
            b.classList.add('correct');
            document.getElementById('score-val').textContent = state.score;
            document.getElementById('display-word').textContent = state.current.w;
          } else {
            b.classList.add('wrong');
            Array.from(btns).find(x => x.textContent === state.current.m).classList.add('correct');
          }
          setTimeout(() => { state.round++; loadRound(); }, 1200);
        };
        container.appendChild(b);
      });
    }

    function finishGame() {
      document.getElementById('end-screen').classList.remove('hidden');
      document.getElementById('final-stats').textContent = `Score: ${state.score} / 100`;
    }
  </script>
</body>
</html>
