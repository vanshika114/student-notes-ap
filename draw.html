<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doodle Dash — Super Cute Draw & Guess</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap');

        :root {
            --primary: #ff85a2;
            --primary-hover: #ff6b8d;
            --secondary: #7dd3fc;
            --bg: #fff5f7;
            --card: #ffffff;
            --text: #5e4d52;
            --border: #fce4ec;
        }

        body {
            margin: 0;
            font-family: 'Fredoka', sans-serif;
            background: var(--bg);
            background-image: radial-gradient(#ffcad4 0.8px, transparent 0.8px);
            background-size: 24px 24px;
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .game-container {
            background: var(--card);
            width: 95%;
            max-width: 500px;
            padding: 30px;
            border-radius: 40px;
            box-shadow: 0 20px 0px #f8bbd0;
            border: 4px solid var(--border);
            text-align: center;
            position: relative;
        }

        .header {
            margin-bottom: 20px;
        }

        h1 {
            color: var(--primary);
            margin: 0;
            font-size: 2.5rem;
            text-shadow: 3px 3px 0px white;
        }

        .stats-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            font-weight: 700;
        }

        .badge {
            background: #fff0f3;
            padding: 8px 16px;
            border-radius: 20px;
            color: var(--primary);
            border: 2px solid var(--border);
        }

        /* Canvas Styling */
        #canvas-wrap {
            background: #fafafa;
            border: 4px dashed var(--primary-light);
            border-radius: 25px;
            margin-bottom: 20px;
            cursor: crosshair;
            touch-action: none;
            position: relative;
            overflow: hidden;
        }

        canvas {
            display: block;
            background: white;
            width: 100%;
            height: 350px;
        }

        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
        }

        .color-dot {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            border: 3px solid white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }
        .color-dot:hover { transform: scale(1.2); }
        .color-dot.active { border-color: var(--text); }

        /* Screens */
        .screen { display: none; animation: fadeIn 0.4s ease; }
        .screen.active { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .btn-cute {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 6px 0px #d81b60;
            transition: all 0.1s;
            margin: 10px 0;
        }
        .btn-cute:active {
            transform: translateY(3px);
            box-shadow: 0 3px 0px #d81b60;
        }

        input {
            width: 100%;
            padding: 15px;
            border-radius: 20px;
            border: 3px solid var(--border);
            font-size: 1.2rem;
            text-align: center;
            outline: none;
            box-sizing: border-box;
            font-family: inherit;
        }
        input:focus { border-color: var(--primary); }

        .prompt-box {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--primary);
            margin: 20px 0;
            padding: 20px;
            background: #fff9fa;
            border-radius: 20px;
        }

        #timer-text { font-family: monospace; }
    </style>
</head>
<body>

    <div class="game-container">
        <div class="header">
            <h1>Doodle Dash 🎨</h1>
        </div>

        <!-- MENU SCREEN -->
        <div id="screen-menu" class="screen active">
            <p style="font-size: 1.2rem;">Ready for a bubbly art battle?</p>
            <button class="btn-cute" onclick="startGame()">Start Game! 🎀</button>
            <p style="color: var(--muted); font-size: 0.9rem;">2 Players • Pass & Play</p>
        </div>

        <!-- PRE-DRAW SCREEN -->
        <div id="screen-pre-draw" class="screen">
            <div class="badge">Artist: Player 1</div>
            <p>Your secret word is:</p>
            <div id="word-prompt" class="prompt-box">CAT</div>
            <p style="font-size: 0.9rem; color: #9ca3af;">(Don't let the other player see!)</p>
            <button class="btn-cute" onclick="startDrawing()">I'm Ready! 🖌️</button>
        </div>

        <!-- DRAWING SCREEN -->
        <div id="screen-draw" class="screen">
            <div class="stats-bar">
                <div class="badge">Time: <span id="timer-text">60</span>s</div>
                <div class="badge" id="drawing-word-hint">CAT</div>
            </div>
            <div id="canvas-wrap">
                <canvas id="paintCanvas"></canvas>
            </div>
            <div class="controls">
                <div class="color-dot active" style="background: #000;" onclick="setColor('#000', this)"></div>
                <div class="color-dot" style="background: #ff85a2;" onclick="setColor('#ff85a2', this)"></div>
                <div class="color-dot" style="background: #7dd3fc;" onclick="setColor('#7dd3fc', this)"></div>
                <div class="color-dot" style="background: #fbbf24;" onclick="setColor('#fbbf24', this)"></div>
                <button onclick="clearCanvas()" style="background:none; border:none; cursor:pointer; font-size:1.5rem;">🧼</button>
            </div>
            <button class="btn-cute" onclick="finishDrawing()">Done! ✨</button>
        </div>

        <!-- GUESS SCREEN -->
        <div id="screen-guess" class="screen">
            <div class="badge" style="margin-bottom: 15px;">Guesser: Player 2</div>
            <div id="canvas-display-wrap" style="border: 4px solid var(--border); border-radius: 25px; margin-bottom: 20px; overflow: hidden;">
                <img id="drawn-image-preview" style="width: 100%; display: block;">
            </div>
            <input type="text" id="guess-input" placeholder="Type your guess here..." onkeydown="if(event.key==='Enter') submitGuess()">
            <button class="btn-cute" onclick="submitGuess()">Guess! 🔍</button>
        </div>

        <!-- RESULT SCREEN -->
        <div id="screen-result" class="screen">
            <h2 id="result-title">YAY! 🎉</h2>
            <p id="result-text">The word was CAT.</p>
            <div class="badge" style="margin: 20px 0; display: inline-block;">Current Score: <span id="score-val">0</span></div>
            <br>
            <button class="btn-cute" onclick="startGame()">Next Round 🍓</button>
        </div>
    </div>

    <script>
        const words = ["SUN", "HOUSE", "CAT", "PIZZA", "TREE", "CAKE", "FLOWER", "SNAKE", "MOON", "HEART", "APPLE", "STAR", "FISH", "BIRD"];
        let currentWord = "";
        let score = 0;
        let timeLeft = 60;
        let timerId = null;

        // Canvas Logic
        const canvas = document.getElementById('paintCanvas');
        const ctx = canvas.getContext('2d');
        let drawing = false;
        let currentColor = "#000";

        function resizeCanvas() {
            const wrap = document.getElementById('canvas-wrap');
            canvas.width = wrap.clientWidth;
            canvas.height = 350;
        }
        window.addEventListener('resize', resizeCanvas);

        function startPosition(e) {
            drawing = true;
            draw(e);
        }
        function endPosition() {
            drawing = false;
            ctx.beginPath();
        }
        function draw(e) {
            if (!drawing) return;
            ctx.lineWidth = 5;
            ctx.lineCap = 'round';
            ctx.strokeStyle = currentColor;

            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX || e.touches[0].clientX) - rect.left;
            const y = (e.clientY || e.touches[0].clientY) - rect.top;

            ctx.lineTo(x, y);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(x, y);
        }

        canvas.addEventListener('mousedown', startPosition);
        canvas.addEventListener('mouseup', endPosition);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); startPosition(e); });
        canvas.addEventListener('touchend', endPosition);
        canvas.addEventListener('touchmove', (e) => { e.preventDefault(); draw(e); });

        function setColor(color, el) {
            currentColor = color;
            document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active'));
            el.classList.add('active');
        }

        function clearCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        // Game Navigation
        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function startGame() {
            currentWord = words[Math.floor(Math.random() * words.length)];
            document.getElementById('word-prompt').innerText = currentWord;
            document.getElementById('drawing-word-hint').innerText = currentWord;
            clearCanvas();
            showScreen('screen-pre-draw');
        }

        function startDrawing() {
            showScreen('screen-draw');
            resizeCanvas();
            timeLeft = 60;
            document.getElementById('timer-text').innerText = timeLeft;
            clearInterval(timerId);
            timerId = setInterval(() => {
                timeLeft--;
                document.getElementById('timer-text').innerText = timeLeft;
                if (timeLeft <= 0) finishDrawing();
            }, 1000);
        }

        function finishDrawing() {
            clearInterval(timerId);
            const dataURL = canvas.toDataURL();
            document.getElementById('drawn-image-preview').src = dataURL;
            document.getElementById('guess-input').value = "";
            showScreen('screen-guess');
        }

        function submitGuess() {
            const guess = document.getElementById('guess-input').value.trim().toUpperCase();
            const title = document.getElementById('result-title');
            const text = document.getElementById('result-text');

            if (guess === currentWord) {
                score += 10;
                title.innerText = "AMAZING! 🌟";
                text.innerText = `You correctly guessed ${currentWord}!`;
                text.style.color = "var(--secondary)";
            } else {
                title.innerText = "OH NO! 🥺";
                text.innerText = `It was actually ${currentWord}.`;
                text.style.color = "var(--primary)";
            }

            document.getElementById('score-val').innerText = score;
            showScreen('screen-result');
        }
    </script>
</body>
</html>
