<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RI$K OR REWARD — NO CAP 🧢</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Comic+Neue:wght@700&display=swap');

        body {
            background-color: #ff00ff;
            background-image: linear-gradient(45deg, #ff00ff 25%, #00ffff 25%, #00ffff 50%, #ff00ff 50%, #ff00ff 75%, #00ffff 75%, #00ffff 100%);
            background-size: 100px 100px;
            font-family: 'Comic Neue', 'Comic Sans MS', cursive;
            color: #ffff00;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .container {
            background: #ffffff;
            border: 10px solid #00ff00;
            padding: 20px;
            text-align: center;
            box-shadow: 20px 20px 0px #000000;
            max-width: 500px;
            width: 90%;
        }

        h1 {
            font-size: 3rem;
            text-shadow: 5px 5px #ff0000;
            margin: 0;
            animation: bounce 0.5s infinite alternate;
        }

        @keyframes bounce {
            from { transform: scale(1); }
            to { transform: scale(1.1); }
        }

        .stats {
            background: #000;
            color: #0f0;
            padding: 10px;
            margin: 20px 0;
            font-size: 1.5rem;
            border: 5px dashed #ff00ff;
        }

        .choices {
            display: flex;
            gap: 20px;
            justify-content: center;
        }

        .btn {
            padding: 20px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            border: 5px solid black;
            transition: 0.1s;
        }

        .btn-safe {
            background: #00ffff;
            color: #000;
        }

        .btn-risky {
            background: #ff0000;
            color: #fff;
            animation: shake 0.2s infinite;
        }

        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(3px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(1px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }

        .btn:hover {
            transform: scale(1.2);
            z-index: 10;
        }

        .message {
            margin-top: 20px;
            font-size: 1.5rem;
            min-height: 2em;
            color: #000;
        }

        .overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .hidden { display: none; }
    </style>
</head>
<body>
    <div id="start-screen" class="overlay">
        <h1 style="color: #00ff00;">RI$K OR REWARD</h1>
        <p style="color: #fff; font-size: 1.5rem;">ARE YOU READYYY? 🔥😎</p>
        <button class="btn btn-safe" onclick="startGame()">LETS GOOOOOO</button>
    </div>

    <div id="game-over" class="overlay hidden">
        <h1 style="color: #ff0000;">GAME OVER BRUH 💀</h1>
        <p id="final-score" style="color: #fff; font-size: 2rem;"></p>
        <button class="btn btn-risky" onclick="startGame()">TRY AGAIN NOOB</button>
    </div>

    <div class="container">
        <h1>STREET CRED: <span id="score">0</span></h1>
        
        <div class="stats">
            STREAK: <span id="streak">0</span> 🔥<br>
            HIGH SCORE: <span id="high-score">0</span> 👑
        </div>

        <div id="game-ui">
            <div class="message" id="message">Choose your destiny... 🔮</div>
            
            <div class="choices">
                <button class="btn btn-safe" onclick="play(false)">
                    SAFE BET<br>
                    <span id="safe-reward">+10</span> 🥱
                </button>
                <button class="btn btn-risky" onclick="play(true)">
                    BIG RISK<br>
                    <span id="risky-reward">+50</span> 🤑
                </button>
            </div>
            
            <p style="color: #666; font-size: 0.8rem; margin-top: 20px;">
                Difficulty Level: <span id="level">1</span>
            </p>
        </div>
    </div>

    <script>
        let state = {
            score: 0,
            streak: 0,
            highScore: localStorage.getItem('risk_high_score') || 0,
            level: 1
        };

        function startGame() {
            state.score = 0;
            state.streak = 0;
            state.level = 1;
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('game-over').classList.add('hidden');
            updateUI();
        }

        function updateUI() {
            document.getElementById('score').innerText = state.score;
            document.getElementById('streak').innerText = state.streak;
            document.getElementById('high-score').innerText = state.highScore;
            document.getElementById('level').innerText = state.level;
            
            const safeAmt = 10 + (state.level * 2);
            const riskyAmt = 50 + (state.level * 10);
            
            document.getElementById('safe-reward').innerText = `+${safeAmt}`;
            document.getElementById('risky-reward').innerText = `+${riskyAmt}`;
        }

        function play(isRisky) {
            const safeAmt = 10 + (state.level * 2);
            const riskyAmt = 50 + (state.level * 10);
            const msgEl = document.getElementById('message');

            if (!isRisky) {
                state.score += safeAmt;
                state.streak = 0;
                msgEl.innerText = "Borrrring... but you got paid. 💸";
                msgEl.style.color = "blue";
            } else {
                const baseProb = 0.7;
                const penalty = (state.level * 0.05) + (state.streak * 0.02);
                const winProb = Math.max(0.1, baseProb - penalty);
                
                if (Math.random() < winProb) {
                    state.score += riskyAmt;
                    state.streak++;
                    msgEl.innerText = "YOOOOOO BIG W! +"+riskyAmt+" 🚀📈";
                    msgEl.style.color = "green";
                    
                    if (state.streak % 3 === 0) {
                        state.level++;
                        msgEl.innerText += " LEVEL UP! IT'S GETTING REAL! 🔥";
                    }
                } else {
                    gameOver();
                    return;
                }
            }

            if (state.score > state.highScore) {
                state.highScore = state.score;
                localStorage.setItem('risk_high_score', state.highScore);
            }

            updateUI();
        }

        function gameOver() {
            const gameOverScreen = document.getElementById('game-over');
            document.getElementById('final-score').innerText = "SCORE: " + state.score + " | LEVEL: " + state.level;
            gameOverScreen.classList.remove('hidden');
        }
    </script>
</body>
</html>
