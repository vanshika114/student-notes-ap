<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Expense Tracker</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="container">
    <h1>💰 Expense Tracker</h1>

    <!-- Balance -->
    <div class="balance-box">
      <p class="label">Total Balance</p>
      <h2 id="balance">₹0.00</h2>
    </div>

    <!-- Income & Expense Summary -->
    <div class="summary">
      <div class="summary-item income-box">
        <p class="label">Income</p>
        <p id="total-income" class="amount green">+₹0.00</p>
      </div>
      <div class="divider"></div>
      <div class="summary-item expense-box">
        <p class="label">Expense</p>
        <p id="total-expense" class="amount red">-₹0.00</p>
      </div>
    </div>

    <!-- Add Transaction Form -->
    <div class="form-box">
      <h3>Add Transaction</h3>

      <input type="text" id="desc" placeholder="Description (e.g. Lunch)" />

      <input type="number" id="amount" placeholder="Amount (e.g. 500)" />

      <div class="radio-group">
        <label>
          <input type="radio" name="type" value="income" checked /> Income
        </label>
        <label>
          <input type="radio" name="type" value="expense" /> Expense
        </label>
      </div>

      <button onclick="addTransaction()">Add Transaction</button>
    </div>

    <!-- Transaction History -->
    <div class="history-box">
      <div class="history-header">
        <h3>Transaction History</h3>
        <button class="clear-btn" onclick="clearAll()">Clear All</button>
      </div>
      <ul id="transaction-list">
        <li class="empty-msg">No transactions yet.</li>
      </ul>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
