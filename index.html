<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyCast — Minimal Weather</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>
    <div class="aurora-bg"></div>
    
    <main class="weather-container">
        <header class="search-bar">
            <i class="ph ph-magnifying-glass"></i>
            <input type="text" id="city-input" placeholder="Search city..." spellcheck="false">
            <button id="search-btn"><i class="ph ph-arrow-right"></i></button>
        </header>

        <section class="weather-card" id="weather-card">
            <div class="main-info">
                <div class="location">
                    <h1 id="city-name">London</h1>
                    <p id="current-date">Monday, 12 June</p>
                </div>
                <div class="temp-container">
                    <span id="temperature">22</span><span class="unit">°C</span>
                </div>
                <div class="condition">
                    <i id="weather-icon" class="ph-fill ph-sun"></i>
                    <span id="weather-desc">Sunny Day</span>
                </div>
            </div>

            <div class="details-grid">
                <div class="detail-item">
                    <i class="ph ph-drop"></i>
                    <div class="detail-text">
                        <span id="humidity">45%</span>
                        <label>Humidity</label>
                    </div>
                </div>
                <div class="detail-item">
                    <i class="ph ph-wind"></i>
                    <div class="detail-text">
                        <span id="wind-speed">12 km/h</span>
                        <label>Wind</label>
                    </div>
                </div>
            </div>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
