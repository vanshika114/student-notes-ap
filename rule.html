<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rule Breaker — Hidden Logic Challenge</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Quicksand:wght@500;700&display=swap');

        :root {
            --primary: #4ade80; /* Fresh Green */
            --secondary: #38bdf8; /* Sky Blue */
            --accent: #facc15; /* Sunshine Yellow */
            --bg: #f0fdf4; /* Very Light Green */
            --card: #ffffff;
            --text: #166534;
            --text-muted: #64748b;
            --error: #f43f5e;
            --success: #22c55e;
        }

        body {
            margin: 0;
            font-family: 'Quicksand', sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .container {
            width: 95%;
            max-width: 500px;
            text-align: center;
            position: relative;
        }

        .glass-card {
            background: var(--card);
            border-radius: 40px;
            padding: 40px 30px;
            box-shadow: 0 20px 40px rgba(22, 101, 52, 0.1);
            border: 4px solid #dcfce7;
            position: relative;
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            font-size: 2.2rem;
            margin: 0 0 10px;
            color: var(--text);
        }

        .stats-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 25px;
            font-weight: 700;
            font-size: 1rem;
        }

        .stat-item {
            background: #f0fdf4;
            padding: 8px 16px;
            border-radius: 20px;
            border: 2px solid #dcfce7;
        }

        .timer-container {
            width: 100%;
            height: 8px;
            background: #e2e8f0;
            border-radius: 10px;
            margin-bottom: 30px;
            overflow: hidden;
        }

        #timer-fill {
            height: 100%;
            background: var(--primary);
            width: 100%;
            transition: width 0.1s linear, background-color 0.3s;
        }

        .instruction {
            font-size: 1.1rem;
            color: var(--text-muted);
            margin-bottom: 20px;
            font-weight: 600;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .option-btn {
            background: white;
            border: 3px solid #f1f5f9;
            padding: 25px 15px;
            border-radius: 24px;
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            font-size: 1.5rem;
            color: var(--text);
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 0 #f1f5f9;
        }

        .option-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            border-color: var(--secondary);
            box-shadow: 0 6px 0 #bae6fd;
        }

        .option-btn:active:not(:disabled) {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #bae6fd;
        }

        .option-btn.correct { background: var(--success) !important; color: white; border-color: #166534; box-shadow: 0 4px 0 #166534; }
        .option-btn.wrong { background: var(--error) !important; color: white; border-color: #991b1b; box-shadow: 0 4px 0 #991b1b; }
        .option-btn:disabled { cursor: default; opacity: 0.8; }

        .overlay {
            position: absolute;
            inset: 0;
            background: var(--card);
            border-radius: 36px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            padding: 30px;
        }

        .btn-start {
            background: var(--primary);
            color: white;
            border: none;
            padding: 18px 48px;
            border-radius: 24px;
            font-size: 1.4rem;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 8px 0 #166534;
            transition: 0.1s;
            font-family: 'Outfit', sans-serif;
        }

        .btn-start:active { transform: translateY(4px); box-shadow: 0 4px 0 #166534; }

        .hidden { display: none !important; }

        #feedback {
            font-weight: 700;
            height: 24px;
            margin-top: 10px;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="glass-card">
            <div id="start-overlay" class="overlay">
                <h1>Rule Breaker 🧩</h1>
                <p style="margin-bottom: 30px; color: var(--text-muted); font-size: 1.1rem;">One of these options doesn't follow the hidden rule. Find it before time runs out!</p>
                <button class="btn-start" onclick="startGame()">Initiate</button>
            </div>

            <div id="game-over-overlay" class="overlay hidden">
                <h1 id="over-title">Game Over!</h1>
                <p id="final-stats" style="margin-bottom: 30px; font-size: 1.2rem;"></p>
                <button class="btn-start" onclick="startGame()">Try Again</button>
            </div>

            <div class="stats-bar">
                <div class="stat-item">Level: <span id="level-val">1</span></div>
                <div class="stat-item">Score: <span id="score-val">0</span></div>
            </div>

            <div class="timer-container">
                <div id="timer-fill"></div>
            </div>

            <div class="instruction">Spot the rule breaker:</div>
            
            <div class="options-grid" id="options-container"></div>

            <div id="feedback"></div>
        </div>
    </div>

    <script>
        const PUZZLE_TYPES = [
            { rule: "Even Numbers", gen: () => {
                let base = Math.floor(Math.random() * 20) * 2;
                let options = [base, base + 2, base + 4, base + 1];
                return { options: options.map(String), answer: String(base + 1) };
            }},
            { rule: "Multiples of 5", gen: () => {
                let base = (Math.floor(Math.random() * 10) + 1) * 5;
                let options = [base, base + 5, base + 10, base + 3];
                return { options: options.map(String), answer: String(base + 3) };
            }},
            { rule: "Square Numbers", gen: () => {
                let options = ["4", "9", "16", "12"];
                return { options: options, answer: "12" };
            }},
            { rule: "Prime Numbers", gen: () => {
                let options = ["3", "5", "7", "9"];
                return { options: options, answer: "9" };
            }},
            { rule: "Palindromes", gen: () => {
                let options = ["RADAR", "LEVEL", "KAYAK", "HELLO"];
                return { options: options, answer: "HELLO" };
            }}
        ];

        let state = {
            level: 1,
            score: 0,
            timeLeft: 10,
            timer: null,
            currentAnswer: ""
        };

        function startGame() {
            state.level = 1;
            state.score = 0;
            document.getElementById('start-overlay').classList.add('hidden');
            document.getElementById('game-over-overlay').classList.add('hidden');
            nextRound();
        }

        function nextRound() {
            state.timeLeft = Math.max(3, 10 - Math.floor(state.level / 3));
            document.getElementById('level-val').innerText = state.level;
            document.getElementById('score-val').innerText = state.score;
            document.getElementById('feedback').innerText = "";
            
            const type = PUZZLE_TYPES[Math.floor(Math.random() * PUZZLE_TYPES.length)];
            const puzzle = type.gen();
            state.currentAnswer = puzzle.answer;

            const container = document.getElementById('options-container');
            container.innerHTML = '';
            
            const shuffled = puzzle.options.sort(() => Math.random() - 0.5);
            shuffled.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(opt, btn);
                container.appendChild(btn);
            });

            startTimer();
        }

        function startTimer() {
            clearInterval(state.timer);
            let start = Date.now();
            let duration = state.timeLeft * 1000;
            
            state.timer = setInterval(() => {
                let elapsed = Date.now() - start;
                let remain = Math.max(0, 100 - (elapsed / duration) * 100);
                document.getElementById('timer-fill').style.width = remain + "%";
                
                if (remain < 30) document.getElementById('timer-fill').style.backgroundColor = "var(--error)";
                else document.getElementById('timer-fill').style.backgroundColor = "var(--primary)";

                if (elapsed >= duration) {
                    clearInterval(state.timer);
                    gameOver("Time's Up! ⏰");
                }
            }, 50);
        }

        function checkAnswer(choice, btn) {
            clearInterval(state.timer);
            const btns = document.querySelectorAll('.option-btn');
            btns.forEach(b => b.disabled = true);

            if (choice === state.currentAnswer) {
                btn.classList.add('correct');
                state.score += 100 + Math.floor(state.timeLeft * 10);
                state.level++;
                document.getElementById('feedback').innerText = "Correct! ✨";
                document.getElementById('feedback').style.color = "var(--success)";
                setTimeout(nextRound, 1200);
            } else {
                btn.classList.add('wrong');
                Array.from(btns).find(b => b.innerText === state.currentAnswer).classList.add('correct');
                setTimeout(() => gameOver("Wrong Choice! 🛑"), 1500);
            }
        }

        function gameOver(msg) {
            const overlay = document.getElementById('game-over-overlay');
            overlay.classList.remove('hidden');
            document.getElementById('over-title').innerText = msg;
            document.getElementById('final-stats').innerText = `Level Reached: ${state.level} | Final Score: ${state.score}`;
        }
    </script>
</body>
</html>
