<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Micro Audit System</title>

    <link rel="stylesheet" href="style.css">
</head>

<body data-page="dashboard" data-requires-auth="true">

    <div class="app-shell">

        <aside class="sidebar" aria-label="Primary navigation">

            <div class="sidebar-brand">
                <p class="sidebar-brand-eyebrow">MicroAudit</p>
                <h2>Committee Tracker</h2>
                <p>Audit operations workspace</p>
            </div>

            <nav class="sidebar-nav">
                <a class="sidebar-link active" href="index.html" data-nav-page="dashboard">
                    Dashboard
                </a>

                <a class="sidebar-link" href="analytics.html" data-nav-page="analytics">
                    Analytics
                </a>

                <span class="sidebar-link muted">Reports</span>
                <span class="sidebar-link muted">Profile</span>
            </nav>

            <div class="sidebar-footer">
                <div class="sidebar-avatar">DS</div>

                <div>
                    <strong id="sidebarUserName">Dr. Sharma</strong>
                    <p>Head</p>
                </div>
            </div>

        </aside>

        <main class="page-content">

            <div class="container dashboard-container">

                <div class="header">

                    <div>
                        <h1>Micro Audit System</h1>
                        <p>Track and manage audit checkpoints</p>
                    </div>

                    <div class="header-actions">

                        <p id="userGreeting" class="user-greeting">
                            Welcome
                        </p>

                        <span id="roleBadge" class="role-badge">
                            User
                        </span>

                        <button id="logoutBtn" class="logout-btn">
                            Logout
                        </button>

                        <button id="themeToggle">
                            🌙
                        </button>

                    </div>

                </div>

                <div class="audit-form">

                    <input
                        type="text"
                        id="auditInput"
                        placeholder="Enter audit checkpoint..."
                    >

                    <textarea
                        id="descriptionInput"
                        placeholder="Add description (optional)..."
                        rows="3"
                    ></textarea>

                    <select id="prioritySelect">

                        <option value="Low">Low Priority</option>
                        <option value="Medium">Medium Priority</option>
                        <option value="High">High Priority</option>

                    </select>

                    <input type="date" id="dueDateInput">

                    <div class="image-field">

                        <label class="image-label" for="imageInput">
                            Audit image (optional)
                        </label>

                        <input
                            type="file"
                            id="imageInput"
                            class="image-input"
                            accept="image/jpeg,image/png,image/webp"
                        >

                        <p id="imageValidationMessage" class="image-message"></p>

                        <div id="imagePreview" class="image-preview hidden">
                            <img
                                id="imagePreviewImg"
                                alt="Selected audit image preview"
                            >
                            <div class="image-actions">
                                <button
                                    type="button"
                                    id="removeImageBtn"
                                    class="remove-image-btn"
                                >
                                    Remove Image
                                </button>
                            </div>
                        </div>
                    </div>

                    <button id="addAuditBtn">
                        Add Audit
                    </button>

                </div>

                <div class="controls">

                    <input
                        type="text"
                        id="searchInput"
                        placeholder="Search audits..."
                    >

                    <select id="sortSelect">

                        <option value="default">Default</option>

                        <option value="high-low">
                            High → Medium → Low
                        </option>

                        <option value="low-high">
                            Low → Medium → High
                        </option>

                    </select>

                    <div class="filter-buttons">

                        <button class="filter-btn active" data-filter="all">
                            All
                        </button>

                        <button class="filter-btn" data-filter="pass">
                            Passed
                        </button>

                        <button class="filter-btn" data-filter="fail">
                            Failed
                        </button>

                        <button class="filter-btn" data-filter="pending">
                            Pending
                        </button>

                    </div>

                    <div class="control-actions">
                        <button id="exportAuditsBtn" class="export-btn">
                            Export Audits
                        </button>
                    </div>

                </div>

                <div class="stats-container">

                    <div class="stat-card">
                        <h2 id="totalAudits">0</h2>
                        <p>Total</p>
                    </div>

                    <div class="stat-card pending">
                        <h2 id="pendingAudits">0</h2>
                        <p>Pending Audits</p>
                    </div>

                    <div class="stat-card pass">
                        <h2 id="passedAudits">0</h2>
                        <p>Passed</p>
                    </div>

                    <div class="stat-card fail">
                        <h2 id="failedAudits">0</h2>
                        <p>Failed</p>
                    </div>

                    <div class="stat-card completion">
                        <h2 id="completionPercentage">0%</h2>
                        <p>Completion Percentage</p>
                    </div>

                </div>

                <div id="auditList" class="audit-list"></div>

            </div>

        </main>

    </div>

    <script src="script.js"></script>

</body>
</html>
