<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Micro Audit System</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <!-- Header -->

        <div class="header">

            <div>
                <h1>Micro Audit System</h1>
                <p>Track and manage audit checkpoints</p>
            </div>

            <button id="themeToggle">
                🌙
            </button>

        </div>

        <!-- Audit Form -->

        <div class="audit-form">

            <input 
                type="text"
                id="auditInput"
                placeholder="Enter audit checkpoint..."
            >

            <button id="addAuditBtn">
                Add Audit
            </button>

        </div>

        <!-- Search + Filters -->

<div class="controls">

    <input 
        type="text"
        id="searchInput"
        placeholder="Search audits..."
    >

    <div class="filter-buttons">

        <button class="filter-btn active" data-filter="all">
            All
        </button>

        <button class="filter-btn" data-filter="pass">
            Passed
        </button>

        <button class="filter-btn" data-filter="fail">
            Failed
        </button>

        <button class="filter-btn" data-filter="pending">
            Pending
        </button>

    </div>

</div>

        <!-- Stats -->

        <div class="stats-container">

            <div class="stat-card">
                <h2 id="totalAudits">0</h2>
                <p>Total</p>
            </div>

            <div class="stat-card pass">
                <h2 id="passedAudits">0</h2>
                <p>Passed</p>
            </div>

            <div class="stat-card fail">
                <h2 id="failedAudits">0</h2>
                <p>Failed</p>
            </div>

        </div>

        <!-- Audit List -->

        <div id="auditList" class="audit-list">

        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
