<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Micro Audit System</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container auth-container">

        <div class="header auth-header">

            <div>
                <h1>Create Account</h1>
                <p>Register to start tracking audit checkpoints</p>
            </div>

            <button id="themeToggle">
                ðŸŒ™
            </button>

        </div>

        <form id="registerForm" class="auth-form">

            <input
                type="text"
                id="registerUsername"
                aria-label="Username"
                placeholder="Username"
            >

            <input
                type="email"
                id="registerEmail"
                aria-label="Email"
                placeholder="Email"
            >

            <input
                type="password"
                id="registerPassword"
                aria-label="Password"
                placeholder="Password"
            >

            <input
                type="password"
                id="confirmPassword"
                aria-label="Confirm password"
                placeholder="Confirm password"
            >

            <select
                id="registerRole"
                aria-label="Role"
            >
                <option value="User">
                    User
                </option>

                <option value="Admin">
                    Admin
                </option>
            </select>

            <p id="registerMessage" class="form-message"></p>

            <button type="submit">
                Register
            </button>

            <p class="auth-link">
                Already have an account?
                <a href="login.html">Login</a>
            </p>

        </form>

    </div>

    <script src="script.js"></script>

</body>
</html>
