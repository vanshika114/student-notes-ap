<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <rect width="128" height="128" rx="16" fill="#05070f"/>
  <!-- Road -->
  <rect x="34" y="0" width="60" height="128" fill="#131a2e"/>
  <!-- Lane dividers -->
  <g stroke="rgba(255,255,255,0.25)" stroke-width="1" stroke-dasharray="6,5">
    <line x1="54" y1="0" x2="54" y2="128"/>
    <line x1="74" y1="0" x2="74" y2="128"/>
  </g>
  <!-- Shoulder lines -->
  <g stroke="rgba(255,255,255,0.5)" stroke-width="1.5">
    <line x1="34" y1="0" x2="34" y2="128"/>
    <line x1="94" y1="0" x2="94" y2="128"/>
  </g>
  <!-- Traffic car 1 -->
  <g transform="translate(56,20)">
    <rect x="0" y="0" width="16" height="12" rx="2" fill="#ffd700"/>
    <rect x="2" y="3" width="12" height="4" rx="1" fill="rgba(0,0,0,0.3)"/>
    <rect x="1" y="7" width="4" height="2" rx="0.5" fill="#ff0000"/>
    <rect x="11" y="7" width="4" height="2" rx="0.5" fill="#ff0000"/>
  </g>
  <!-- Traffic car 2 -->
  <g transform="translate(76,60)">
    <rect x="0" y="0" width="16" height="13" rx="2" fill="#00d4ff"/>
    <rect x="2" y="3" width="12" height="4" rx="1" fill="rgba(0,0,0,0.3)"/>
    <rect x="1" y="8" width="4" height="2" rx="0.5" fill="#ff0000"/>
    <rect x="11" y="8" width="4" height="2" rx="0.5" fill="#ff0000"/>
  </g>
  <!-- Traffic car 3 -->
  <g transform="translate(52,98)">
    <rect x="0" y="0" width="16" height="11" rx="2" fill="#ff6b35"/>
    <rect x="2" y="3" width="12" height="3" rx="1" fill="rgba(0,0,0,0.3)"/>
    <rect x="1" y="7" width="4" height="2" rx="0.5" fill="#ff0000"/>
    <rect x="11" y="7" width="4" height="2" rx="0.5" fill="#ff0000"/>
  </g>
  <!-- Player car -->
  <g transform="translate(72,108)">
    <rect x="0" y="0" width="18" height="14" rx="2.5" fill="#ff2d78"/>
    <rect x="2" y="2" width="14" height="4" rx="1.5" fill="rgba(10,10,30,0.6)"/>
    <rect x="2" y="9" width="14" height="3" rx="1" fill="rgba(10,10,30,0.4)"/>
    <rect x="2" y="0" width="4" height="2" rx="0.5" fill="#ff6600"/>
    <rect x="12" y="0" width="4" height="2" rx="0.5" fill="#ff6600"/>
    <rect x="1" y="10" width="3" height="3" fill="#0a0a0f"/>
    <rect x="14" y="10" width="3" height="3" fill="#0a0a0f"/>
    <rect x="1" y="4" width="3" height="3" fill="#0a0a0f"/>
    <rect x="14" y="4" width="3" height="3" fill="#0a0a0f"/>
  </g>
  <!-- Player glow -->
  <rect x="71" y="107" width="20" height="16" rx="3.5" fill="none" stroke="rgba(255,45,120,0.15)" stroke-width="1"/>
  <!-- Telemetry bar -->
  <rect x="4" y="4" width="120" height="14" rx="5" fill="rgba(255,255,255,0.02)" stroke="rgba(255,45,120,0.1)" stroke-width="0.5"/>
  <text x="8" y="13" font-size="3.5" fill="#475569" font-family="monospace" letter-spacing="1">TIME</text>
  <text x="7" y="17" font-size="5" fill="#e2e8f0" font-family="monospace" font-weight="700">00:18</text>
  <text x="34" y="13" font-size="3.5" fill="#475569" font-family="monospace" letter-spacing="1">SCORE</text>
  <text x="34" y="17" font-size="5" fill="#ff2d78" font-family="monospace" font-weight="700">185</text>
  <text x="60" y="13" font-size="3.5" fill="#475569" font-family="monospace" letter-spacing="1">SPEED</text>
  <text x="60" y="17" font-size="5" fill="#e2e8f0" font-family="monospace" font-weight="700">×1.3</text>
  <text x="86" y="13" font-size="3.5" fill="#475569" font-family="monospace" letter-spacing="1">BEST</text>
  <text x="86" y="17" font-size="5" fill="#e2e8f0" font-family="monospace" font-weight="700">420</text>
  <!-- Neon strips on shoulders -->
  <g opacity="0.08">
    <rect x="12" y="0" width="3" height="10" fill="#ff2d78"/>
    <rect x="12" y="30" width="3" height="10" fill="#ff2d78"/>
    <rect x="12" y="60" width="3" height="10" fill="#ff2d78"/>
    <rect x="12" y="90" width="3" height="10" fill="#ff2d78"/>
    <rect x="113" y="15" width="3" height="10" fill="#ff2d78"/>
    <rect x="113" y="45" width="3" height="10" fill="#ff2d78"/>
    <rect x="113" y="75" width="3" height="10" fill="#ff2d78"/>
    <rect x="113" y="105" width="3" height="10" fill="#ff2d78"/>
  </g>
</svg>
