<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Binary Memory Game</title>
<style>
    body {
        background: blanchedalmond;
        color: white;
        font-family: Arial, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        margin: 0;
    }
    .game-box {
        text-align: center;
        background: #222;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 0 15px #000;
        width: 320px;
    }
    input {
        padding: 8px;
        font-size: 16px;
        text-align: center;
        margin-top: 10px;
        width: 80%;
        border-radius: 5px;
        border: none;
        outline: none;
    }
    button {
        margin-top: 10px;
        padding: 8px 16px;
        font-size: 16px;
        background: pink;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
    }
    button:hover {
        background: plum;
    }
    #heartContainer {
        position: absolute;
        top: 50%;
        left: 50%;
        font-size: 60px;
        transform: translate(-50%, -50%);
        display: none;
    }
</style>
</head>
<body>

<div class="game-box">
    <h2>🧠 Binary Memory Game 🧠</h2>
    <p id="info">Type the binary after it disappears.</p>
    <p id="lives">❤❤❤</p>
    <p id="display" style="font-size: 24px; font-weight: bold;"></p>
    <input type="text" id="input" placeholder="Enter binary" style="display:none;" inputmode="numeric" pattern="[01]*">
    <br>
    <button id="startBtn">Start Game</button>
</div>

<div id="heartContainer">❤</div>

<script>
    let ctx = new (window.AudioContext || window.webkitAudioContext)();

    function playTone(freq, dur, type="sine") {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = type;
      osc.frequency.setValueAtTime(freq, ctx.currentTime);
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start();
      osc.stop(ctx.currentTime + dur);
    }

    function playLoseMusic() {
      playTone(400, 0.4, "sine");
      setTimeout(() => playTone(300, 0.4, "sine"), 400);
      setTimeout(() => playTone(200, 0.6, "sine"), 800);
      showBrokenHeart();
      navigator.vibrate?.(400);
    }

    function playStartMusic() {
      playTone(700, 0.15, "square");
      setTimeout(() => playTone(900, 0.15, "square"), 150);
      setTimeout(() => playTone(1100, 0.2, "square"), 300);
    }

    function playGameOverMusic() {
      playTone(300, 0.5, "sine");
      setTimeout(() => playTone(250, 0.5, "sine"), 500);
      setTimeout(() => playTone(200, 0.7, "sine"), 1000);
      navigator.vibrate?.(600);
    }

    function showBrokenHeart() {
      const heart = document.getElementById("heartContainer");
      heart.textContent = "💔"; 
      heart.style.display = "block";
      heart.style.opacity = 1;
      heart.style.transform = "translate(-50%, -50%) scale(1.5)";
      let scale = 1.5;
      let fadeOut = setInterval(() => {
        if(scale > 1){
          scale -= 0.05;
          heart.style.transform = `translate(-50%, -50%) scale(${scale})`;
          heart.style.opacity -= 0.05;
        } else {
          clearInterval(fadeOut);
          heart.style.display = "none";
          heart.textContent = "❤"; 
          heart.style.opacity = 1;
          heart.style.transform = "translate(-50%, -50%) scale(1)";
        }
      }, 30);
    }

    function playWinMusic() {
      playTone(600, 0.2, "triangle");
      setTimeout(() => playTone(800, 0.2, "triangle"), 200);
      setTimeout(() => playTone(1000, 0.4, "triangle"), 400);
    }

    let level = 1;
    let lives = 3;
    let binary = "";

    const displayEl = document.getElementById("display");
    const infoEl = document.getElementById("info");
    const inputEl = document.getElementById("input");
    const startBtn = document.getElementById("startBtn");
    const livesEl = document.getElementById("lives");

    function updateLives() {
        livesEl.textContent = "❤".repeat(lives);
    }

    function generateBinary(length) {
        let str = "";
        for (let i = 0; i < length; i++) {
            str += Math.random() > 0.5 ? "1" : "0";
        }
        return str;
    }

    function startLevel() {
        inputEl.style.display = "none";
        startBtn.style.display = "none";

        binary = generateBinary(level + 2);
        displayEl.textContent = binary;
        infoEl.textContent = `Level ${level}`;
        playStartMusic();

        setTimeout(() => {
            displayEl.textContent = "Now type the binary:";
            inputEl.value = "";
            inputEl.style.display = "inline-block";
            inputEl.focus();
        }, 2000);
    }

    inputEl.addEventListener("keydown", function(event) {
        if (event.key === "Enter") {
            const answer = inputEl.value.trim();

            if (!/^[01]+$/.test(answer)) {
                infoEl.textContent = "⚠️ Only 0s and 1s allowed!";
                return;
            }

            if (answer === binary) {
                infoEl.textContent = "✅ Correct!";
                playWinMusic();
                level++;
                if (typeof confetti === "function") {
                    confetti({
                        particleCount: 150,
                        spread: 70,
                        origin: { y: 0.6 }
                    });
                }
            } else {
                lives--;
                playLoseMusic();
                infoEl.textContent = `❌ Wrong! Correct was: ${binary}`;
                updateLives();
            }

            if (lives > 0) {
                setTimeout(startLevel, 1500);
            } else {
                displayEl.textContent = `💀 Game Over! You reached Level ${level - 1}`;
                playGameOverMusic();
                inputEl.style.display = "none";
                startBtn.textContent = "Play Again";
                startBtn.style.display = "inline-block";
                startBtn.onclick = resetGame;
            }
        }
    });

    function resetGame() {
        level = 1;
        lives = 3;
        updateLives();
        startLevel();
    }

    startBtn.addEventListener("click", () => {
        if (ctx.state === "suspended") ctx.resume(); // resume audio
        updateLives();
        startLevel();
    });
</script>

<!-- Confetti library -->
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

</body>
</html>
