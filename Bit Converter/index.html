<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BitConverter — Number System Tool</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>BitConverter</h1>
            <p>Convert between Decimal, Binary, Octal, and Hexadecimal instantly.</p>
        </header>

        <main class="converter-card">
            <div class="input-group">
                <label for="decimal">Decimal (Base 10)</label>
                <input type="text" id="decimal" placeholder="e.g. 255" autocomplete="off">
            </div>

            <div class="input-group">
                <label for="binary">Binary (Base 2)</label>
                <input type="text" id="binary" placeholder="e.g. 11111111" autocomplete="off">
            </div>

            <div class="input-group">
                <label for="octal">Octal (Base 8)</label>
                <input type="text" id="octal" placeholder="e.g. 377" autocomplete="off">
            </div>

            <div class="input-group">
                <label for="hex">Hexadecimal (Base 16)</label>
                <input type="text" id="hex" placeholder="e.g. FF" autocomplete="off">
            </div>

            <button id="clear-btn" class="secondary-btn">Clear All</button>
        </main>

        <footer>
            <p>Type in any field to see the conversion in others.</p>
            <div id="error-msg" class="error-msg"></div>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
