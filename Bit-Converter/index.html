<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Bit Converter</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>🔢 Binary / Hex / Octal Converter</h1>
    <p class="subtitle">Real-time conversions across number systems</p>

    <div class="card">
      <label>Decimal</label>
      <input type="text" id="decimal" placeholder="Enter decimal number">
    </div>

    <div class="card">
      <label>Binary</label>
      <input type="text" id="binary" placeholder="Enter binary number">
    </div>

    <div class="card">
      <label>Hexadecimal</label>
      <input type="text" id="hex" placeholder="Enter hex number">
    </div>

    <div class="card">
      <label>Octal</label>
      <input type="text" id="octal" placeholder="Enter octal number">
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
