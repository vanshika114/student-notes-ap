<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Projectile Motion Simulator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <aside id="control-panel">
      <header id="brand-header">
        <h1>BALISTIC DYNAMICS</h1>
        <span>Kinematic Simulation Engine</span>
      </header>
      <section id="input-section">
        <div class="param-group">
          <div class="param-header">
            <label for="angle-slider">LAUNCH ANGLE (&theta;)</label>
            <span class="param-readout" id="angle-readout">45&deg;</span>
          </div>
          <input type="range" id="angle-slider" min="0" max="90" step="0.5" value="45">
        </div>
        <div class="param-group">
          <div class="param-header">
            <label for="velocity-slider">INITIAL VELOCITY (u)</label>
            <span class="param-readout" id="velocity-readout">50 m/s</span>
          </div>
          <input type="range" id="velocity-slider" min="5" max="100" step="0.5" value="50">
        </div>
        <div class="param-group">
          <label>GRAVITATIONAL FIELD (g)</label>
          <div id="gravity-buttons">
            <button class="gravity-btn active" data-g="9.81">EARTH<br><span>9.81 m/s&sup2;</span></button>
            <button class="gravity-btn" data-g="3.71">MARS<br><span>3.71 m/s&sup2;</span></button>
            <button class="gravity-btn" data-g="1.62">MOON<br><span>1.62 m/s&sup2;</span></button>
          </div>
        </div>
      </section>
      <section id="telemetry-panel">
        <h2>VECTOR TELEMETRY</h2>
        <div class="telemetry-card" id="card-range">
          <div class="card-label">MAX HORIZONTAL RANGE (R)</div>
          <div class="card-value" id="range-value">0.00 m</div>
        </div>
        <div class="telemetry-card" id="card-height">
          <div class="card-label">PEAK APOGEE HEIGHT (H)</div>
          <div class="card-value" id="height-value">0.00 m</div>
        </div>
        <div class="telemetry-card" id="card-time">
          <div class="card-label">TOTAL FLIGHT TIME (T)</div>
          <div class="card-value" id="time-value">0.00 s</div>
        </div>
      </section>
      <div id="status-bar">
        <div id="status-indicator"></div>
        <span id="status-text">SYSTEM READY</span>
      </div>
      <button id="fire-btn">FIRE BALISTIC SIMULATION</button>
    </aside>
    <main id="viewport">
      <div id="coord-tracker">
        <span>X(t): <span id="coord-x">0.00</span> m</span>
        <span>Y(t): <span id="coord-y">0.00</span> m</span>
      </div>
      <canvas id="simulation-canvas"></canvas>
    </main>
  </div>
  <script src="script.js"></script>
</body>
</html>
