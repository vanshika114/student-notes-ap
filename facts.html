<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Science Sort — Master the Elements</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap');

        :root {
            --bg-deep: #020617;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --physics: #6366f1;
            --chemistry: #10b981;
            --biology: #f43f5e;
            --text: #f8fafc;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
            background: var(--bg-deep);
            background: radial-gradient(circle at top left, #1e1b4b, #020617);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text);
            overflow: hidden;
        }

        .container {
            width: 90%;
            max-width: 500px;
            position: relative;
        }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(24px) saturate(180%);
            -webkit-backdrop-filter: blur(24px) saturate(180%);
            border: 1px solid var(--glass-border);
            border-radius: 40px;
            padding: 40px 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 800;
            margin: 0 0 10px;
            background: linear-gradient(to bottom right, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        .stats {
            display: flex;
            justify-content: space-between;
            margin-bottom: 30px;
            font-weight: 600;
            font-size: 0.9rem;
            opacity: 0.7;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .fact-container {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px 20px;
            margin-bottom: 30px;
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            font-weight: 600;
            line-height: 1.4;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .options-stack {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .opt-btn {
            padding: 20px;
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            font-family: inherit;
            font-size: 1.1rem;
            font-weight: 700;
            color: white;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background: rgba(255, 255, 255, 0.03);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .opt-btn:hover:not(:disabled) {
            transform: scale(1.02);
            background: rgba(255, 255, 255, 0.08);
        }

        .physics-btn:hover:not(:disabled) { border-color: var(--physics); box-shadow: 0 0 20px rgba(99, 102, 241, 0.3); color: var(--physics); }
        .chemistry-btn:hover:not(:disabled) { border-color: var(--chemistry); box-shadow: 0 0 20px rgba(16, 185, 129, 0.3); color: var(--chemistry); }
        .biology-btn:hover:not(:disabled) { border-color: var(--biology); box-shadow: 0 0 20px rgba(244, 63, 94, 0.3); color: var(--biology); }

        .opt-btn.correct { background: var(--chemistry) !important; color: white !important; }
        .opt-btn.wrong { background: var(--biology) !important; color: white !important; }

        .overlay {
            position: absolute;
            inset: 0;
            background: rgba(2, 6, 23, 0.95);
            backdrop-filter: blur(15px);
            z-index: 100;
            border-radius: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px;
        }

        .btn-start {
            background: white;
            color: var(--bg-deep);
            border: none;
            padding: 16px 40px;
            border-radius: 20px;
            font-weight: 800;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-start:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(255,255,255,0.1); }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="container">
        <div class="glass-card">
            <div id="game-overlay" class="overlay">
                <h1>Science Sort</h1>
                <p style="margin-bottom: 30px; opacity: 0.6;">Categorize the fact into the correct discipline.</p>
                <button class="btn-start" onclick="startGame()">Start Research</button>
            </div>

            <div class="stats">
                <span>Level: <span id="level-val">1</span></span>
                <span>Score: <span id="score-val">0</span></span>
            </div>

            <div class="fact-container" id="fact-display">
                <!-- Fact goes here -->
            </div>

            <div class="options-stack">
                <button class="opt-btn physics-btn" onclick="checkAnswer('Physics', this)">⚛️ Physics</button>
                <button class="opt-btn chemistry-btn" onclick="checkAnswer('Chemistry', this)">🧪 Chemistry</button>
                <button class="opt-btn biology-btn" onclick="checkAnswer('Biology', this)">🧬 Biology</button>
            </div>
        </div>
    </div>

    <script>
        const FACTS = [
            { f: "Light travels at approximately 300,000 kilometers per second.", a: "Physics" },
            { f: "Mitochondria is often described as the powerhouse of the cell.", a: "Biology" },
            { f: "The pH level of pure water is exactly 7.", a: "Chemistry" },
            { f: "Newton's Third Law: For every action, there is an equal and opposite reaction.", a: "Physics" },
            { f: "Humans have 46 chromosomes in almost every cell of their body.", a: "Biology" },
            { f: "Noble gases like Helium and Neon are generally unreactive.", a: "Chemistry" },
            { f: "Sound waves cannot travel through the vacuum of space.", a: "Physics" },
            { f: "Photosynthesis is the process by which plants convert light into energy.", a: "Biology" },
            { f: "Diamond and Graphite are both made entirely of Carbon atoms.", a: "Chemistry" },
            { f: "Gravity is the force that attracts objects toward the center of the earth.", a: "Physics" }
        ];

        let state = { score: 0, level: 0, shuffled: [] };

        function startGame() {
            state.score = 0;
            state.level = 0;
            state.shuffled = [...FACTS].sort(() => Math.random() - 0.5);
            document.getElementById('game-overlay').classList.add('hidden');
            loadFact();
        }

        function loadFact() {
            if (state.level >= state.shuffled.length) return endGame();
            
            document.getElementById('level-val').innerText = state.level + 1;
            document.getElementById('score-val').innerText = state.score;
            document.getElementById('fact-display').innerText = state.shuffled[state.level].f;
            
            document.querySelectorAll('.opt-btn').forEach(btn => {
                btn.className = btn.className.replace(' correct', '').replace(' wrong', '');
                btn.disabled = false;
            });
        }

        function checkAnswer(choice, btn) {
            const correct = state.shuffled[state.level].a;
            document.querySelectorAll('.opt-btn').forEach(b => b.disabled = true);

            if (choice === correct) {
                btn.classList.add('correct');
                state.score += 100;
            } else {
                btn.classList.add('wrong');
                Array.from(document.querySelectorAll('.opt-btn')).find(b => b.innerText.includes(correct)).classList.add('correct');
            }

            setTimeout(() => {
                state.level++;
                loadFact();
            }, 1500);
        }

        function endGame() {
            const overlay = document.getElementById('game-overlay');
            overlay.classList.remove('hidden');
            document.getElementById('overlay-title').innerText = "Lab Report Complete";
            document.getElementById('overlay-desc').innerText = `Final Scientific Accuracy: ${state.score} Points`;
        }
    </script>
</body>
</html>
