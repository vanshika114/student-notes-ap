<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Weather Card</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <div class="card">
    <div class="top">
      <div>
        <p class="city">Jaipur</p>
        <p class="country">Rajasthan, India</p>
        <p class="date" id="date"></p>
      </div>
      <div class="icon">☀️</div>
    </div>
    <div class="temp-row">
      <span class="temp">38°</span>
      <span class="unit">C</span>
    </div>
    <p class="condition">Sunny & Clear</p>
    <div class="divider"></div>
    <div class="details">
      <div class="detail">
        <span class="detail-icon">💧</span>
        <span class="detail-val">28%</span>
        <span class="detail-label">Humidity</span>
      </div>
      <div class="detail">
        <span class="detail-icon">💨</span>
        <span class="detail-val">14 km/h</span>
        <span class="detail-label">Wind</span>
      </div>
      <div class="detail">
        <span class="detail-icon">👁️</span>
        <span class="detail-val">10 km</span>
        <span class="detail-label">Visibility</span>
      </div>
    </div>
    <div class="forecast">
      <div class="forecast-day"><p>Mon</p><p>🌤️</p><p>36°</p></div>
      <div class="forecast-day"><p>Tue</p><p>⛅</p><p>33°</p></div>
      <div class="forecast-day"><p>Wed</p><p>🌧️</p><p>29°</p></div>
      <div class="forecast-day"><p>Thu</p><p>☀️</p><p>38°</p></div>
      <div class="forecast-day"><p>Fri</p><p>☀️</p><p>40°</p></div>
    </div>
  </div>
  <script>
    const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    const d = new Date();
    document.getElementById('date').textContent = `${days[d.getDay()]}, ${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}`;
  </script>
</body>
</html>
