<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Stopwatch</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <div class="container">
    <h1>Stopwatch</h1>
    <div class="display" id="display">00:00:00.00</div>
    <div class="buttons">
      <button class="btn start" id="startStop" onclick="toggleStartStop()">Start</button>
      <button class="btn lap" onclick="recordLap()">Lap</button>
      <button class="btn reset" onclick="resetWatch()">Reset</button>
    </div>
    <ul class="laps" id="laps"></ul>
  </div>
  <script src="script.js"></script>
</body>
</html>
