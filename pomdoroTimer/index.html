<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pomodoro Timer</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Pomodoro Timer</h1>
      <span class="session-info" id="sessionInfo">Work Session</span>
    </header>

    <main class="timer-section">
      <!-- Circular Progress -->
      <div class="circular-progress-container">
        <svg class="circular-progress" viewBox="0 0 200 200">
          <circle class="progress-bg" cx="100" cy="100" r="95"></circle>
          <circle class="progress-fill" cx="100" cy="100" r="95"></circle>
        </svg>
        <div class="timer-display">
          <span class="time" id="timeDisplay">25:00</span>
          <span class="phase" id="phaseDisplay">WORK</span>
        </div>
      </div>

      <!-- Controls -->
      <div class="controls">
        <button id="startBtn" class="btn btn-primary">Start</button>
        <button id="pauseBtn" class="btn btn-secondary" disabled>Pause</button>
        <button id="resetBtn" class="btn btn-secondary">Reset</button>
      </div>

      <!-- Session Stats -->
      <div class="stats">
        <div class="stat-item">
          <label>Sessions Completed</label>
          <span id="sessionsCount">0</span>
        </div>
        <div class="stat-item">
          <label>Time Tracked</label>
          <span id="timeTracked">0h 0m</span>
        </div>
      </div>

      <!-- Settings -->
      <div class="settings">
        <details>
          <summary>⚙️ Settings</summary>
          <div class="settings-content">
            <div class="setting-row">
              <label for="workDuration">Work Duration (min)</label>
              <input type="number" id="workDuration" min="1" max="60" value="25">
            </div>
            <div class="setting-row">
              <label for="shortBreak">Short Break (min)</label>
              <input type="number" id="shortBreak" min="1" max="30" value="5">
            </div>
            <div class="setting-row">
              <label for="longBreak">Long Break (min)</label>
              <input type="number" id="longBreak" min="1" max="60" value="15">
            </div>
            <div class="setting-row">
              <label for="soundToggle">
                <input type="checkbox" id="soundToggle" checked>
                Enable Sound Notifications
              </label>
            </div>
            <button id="applSettingsBtn" class="btn btn-secondary">Apply Settings</button>
          </div>
        </details>
      </div>
    </main>

    <footer>
      <p>Production-grade timer with Web Worker and delta-time sync</p>
    </footer>
  </div>

  <!-- Web Worker initialization -->
  <script>
    // Initialize worker
    if (typeof(Worker) !== "undefined") {
      window.timerWorker = new Worker('timer.worker.js');
    } else {
      console.warn('Web Workers not supported. Timer accuracy may suffer.');
    }
  </script>

  <script src="engine.js"></script>
  <script src="ui.js"></script>
  <script src="audio.js"></script>
</body>
</html>
