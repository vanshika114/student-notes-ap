<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPA Calculator</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class="container">
        <header class="header">
            <h1>GPA Calculator</h1>
            <p class="subtitle">Calculate your Semester GPA with ease</p>
        </header>

        <section class="calculator-section">
            <div class="gpa-display">
                <div class="gpa-metric">
                    <span class="gpa-label">Current SGPA</span>
                    <div class="gpa-value-container">
                        <span id="gpaValue" class="gpa-value">0.00</span>
                        <div id="gpaIndicator" class="gpa-indicator gpa-indicator--neutral"></div>
                    </div>
                </div>
                <div class="gpa-status">
                    <p id="gpaStatus" class="status-text">Add courses to calculate GPA</p>
                </div>
            </div>

            <div class="table-wrapper">
                <table class="courses-table">
                    <thead>
                        <tr>
                            <th>Course Name</th>
                            <th>Credits</th>
                            <th>Grade</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="courseTableBody">
                        <!-- Rows will be dynamically added here -->
                    </tbody>
                </table>
            </div>

            <div class="controls">
                <button id="addRowBtn" class="btn btn--primary">+ Add Course</button>
                <button id="resetBtn" class="btn btn--secondary">Reset All</button>
            </div>
        </section>
    </main>

    <!-- Template for course rows -->
    <template id="courseRowTemplate">
        <tr class="course-row" data-row-id="">
            <td>
                <input type="text" class="input input--course-name" placeholder="e.g., Data Structures" maxlength="50">
            </td>
            <td>
                <input type="number" class="input input--credits" placeholder="Credits" min="0.5" max="4" step="0.5">
            </td>
            <td>
                <select class="input input--grade">
                    <option value="">Select Grade</option>
                    <option value="10">O (10)</option>
                    <option value="9">A+ (9)</option>
                    <option value="8">A (8)</option>
                    <option value="7">B+ (7)</option>
                    <option value="6">B (6)</option>
                    <option value="5">C (5)</option>
                    <option value="0">F (0)</option>
                </select>
            </td>
            <td>
                <button class="btn btn--delete" data-action="delete-row" aria-label="Delete course">🗑️</button>
            </td>
        </tr>
    </template>

    <script src="app.js"></script>
</body>
</html>
