<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Layer Search — Hidden Discovery</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');

        :root {
            --primary: #00f2fe;
            --secondary: #4facfe;
            --accent: #f093fb;
            --bg: #0f172a;
            --glass: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --text: #f8fafc;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg);
            background-image: radial-gradient(circle at 50% 50%, #1e293b 0%, #0f172a 100%);
            color: var(--text);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .game-container {
            width: 90%;
            max-width: 500px;
            background: var(--glass);
            backdrop-filter: blur(20px) saturate(160%);
            -webkit-backdrop-filter: blur(20px) saturate(160%);
            border: 1px solid var(--glass-border);
            border-radius: 40px;
            padding: 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 
                        inset 0 0 20px rgba(255, 255, 255, 0.05);
            position: relative;
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 800;
            margin: 0;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stats-badge {
            background: rgba(255, 255, 255, 0.05);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 600;
            border: 1px solid var(--glass-border);
        }

        #play-area {
            position: relative;
            width: 100%;
            height: 400px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 24px;
            border: 1px solid var(--glass-border);
            overflow: hidden;
            cursor: crosshair;
        }

        .object-layer {
            position: absolute;
            font-size: 3rem;
            user-select: none;
            transition: transform 0.2s, opacity 0.2s;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.3));
        }

        .object-layer:hover {
            transform: scale(1.1) rotate(5deg) !important;
            z-index: 1000 !important;
        }

        .timer-container {
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            overflow: hidden;
        }

        #timer-bar {
            height: 100%;
            width: 100%;
            background: linear-gradient(to right, var(--primary), var(--accent));
            transition: width 0.1s linear;
        }

        .overlay {
            position: absolute;
            inset: 0;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(15px);
            z-index: 2000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 40px;
            padding: 40px;
            text-align: center;
        }

        .btn-shiny {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 20px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0, 242, 254, 0.3);
            transition: transform 0.2s, box-shadow 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-shiny:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(0, 242, 254, 0.4);
        }

        .target-preview {
            font-size: 5rem;
            margin: 20px 0;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="game-container">
    <div id="start-screen" class="overlay">
        <h1>Layer Search</h1>
        <p style="color: #94a3b8; margin-bottom: 30px;">Find the hidden target buried under the pile!</p>
        <button class="btn-shiny" onclick="startGame()">Initiate Search</button>
    </div>

    <div id="target-screen" class="overlay hidden">
        <h2 style="color: var(--primary)">MEMORIZE TARGET</h2>
        <div id="target-display" class="target-preview">💎</div>
        <p id="countdown-text">Scanning in 3...</p>
    </div>

    <div id="game-over-screen" class="overlay hidden">
        <h1 id="result-title">TIME EXPIRED</h1>
        <p id="result-score" style="margin-bottom: 30px;">You reached Level 1</p>
        <button class="btn-shiny" onclick="startGame()">Reboot Protocol</button>
    </div>

    <header>
        <h1>Neural Search</h1>
        <div class="stats-badge">LVL: <span id="level-val">1</span></div>
        <div class="stats-badge">PTS: <span id="score-val">0</span></div>
    </header>

    <div class="timer-container">
        <div id="timer-bar"></div>
    </div>

    <div id="play-area"></div>

    <p style="font-size: 0.8rem; color: #64748b; margin: 0;">Remove layers to reveal the hidden object.</p>
</div>

<script>
    const EMOJIS = ["💎", "🍎", "🐶", "🚀", "🎸", "🍕", "🍦", "🦁", "🚗", "🌈", "🏀", "🍔", "🐱", "🛸", "🎹", "🍣", "🍩", "🐘", "🚂", "🍀", "🏈", "🍒", "🐼", "🚁", "🎻", "🥨", "🧁", "🦋", "🚲", "🍄", "🏐", "👻", "🥑", "🐙", "🍉", "🎨"];
    
    let state = {
        level: 1,
        score: 0,
        target: '',
        timeLeft: 15,
        timerMax: 15,
        timerInterval: null,
        active: false
    };

    function startGame() {
        state.level = 1;
        state.score = 0;
        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('game-over-screen').classList.add('hidden');
        initLevel();
    }

    function initLevel() {
        state.active = false;
        state.target = EMOJIS[Math.floor(Math.random() * EMOJIS.length)];
        
        const targetScreen = document.getElementById('target-screen');
        const targetDisplay = document.getElementById('target-display');
        const countdownText = document.getElementById('countdown-text');
        
        targetDisplay.innerText = state.target;
        targetScreen.classList.remove('hidden');
        
        let count = 3;
        countdownText.innerText = `Scanning in ${count}...`;
        
        const countInt = setInterval(() => {
            count--;
            if (count > 0) {
                countdownText.innerText = `Scanning in ${count}...`;
            } else {
                clearInterval(countInt);
                targetScreen.classList.add('hidden');
                setupPlayArea();
            }
        }, 1000);
    }

    function setupPlayArea() {
        const area = document.getElementById('play-area');
        area.innerHTML = '';
        
        const layerCount = 20 + (state.level * 10);
        const layers = [];
        
        // Add random layers
        for (let i = 0; i < layerCount; i++) {
            let emoji = EMOJIS[Math.floor(Math.random() * EMOJIS.length)];
            // Avoid adding the target as a random layer early
            if (emoji === state.target) emoji = EMOJIS[(EMOJIS.indexOf(emoji) + 1) % EMOJIS.length];
            layers.push(emoji);
        }
        
        // Inject target at a random position (prefer deep layers)
        const targetPos = Math.floor(Math.random() * (layerCount / 2));
        layers.splice(targetPos, 0, state.target);
        
        layers.forEach((emoji, index) => {
            const el = document.createElement('div');
            el.className = 'object-layer';
            el.innerText = emoji;
            
            // Random styling
            const x = Math.random() * 80 + 10; // 10% to 90%
            const y = Math.random() * 80 + 10;
            const rot = Math.random() * 360;
            
            el.style.left = `${x}%`;
            el.style.top = `${y}%`;
            el.style.transform = `translate(-50%, -50%) rotate(${rot}deg)`;
            el.style.zIndex = index;
            
            el.onclick = (e) => {
                if (!state.active) return;
                handleSelection(emoji, el);
            };
            
            area.appendChild(el);
        });
        
        state.active = true;
        state.timerMax = Math.max(5, 15 - Math.floor(state.level / 2));
        state.timeLeft = state.timerMax;
        startTimer();
        updateUI();
    }

    function handleSelection(emoji, el) {
        if (emoji === state.target) {
            // WIN
            clearInterval(state.timerInterval);
            state.score += Math.ceil(state.timeLeft * 10);
            state.level++;
            
            // Flash effect
            el.style.transform += ' scale(2)';
            el.style.zIndex = 3000;
            el.style.transition = 'all 0.5s';
            
            setTimeout(initLevel, 1000);
        } else {
            // Remove layer
            el.style.opacity = '0';
            el.style.pointerEvents = 'none';
            el.style.transform += ' translateY(100px) rotate(45deg)';
        }
    }

    function startTimer() {
        clearInterval(state.timerInterval);
        const bar = document.getElementById('timer-bar');
        
        state.timerInterval = setInterval(() => {
            state.timeLeft -= 0.1;
            const pct = (state.timeLeft / state.timerMax) * 100;
            bar.style.width = `${pct}%`;
            
            if (state.timeLeft <= 0) {
                endGame();
            }
        }, 100);
    }

    function updateUI() {
        document.getElementById('level-val').innerText = state.level;
        document.getElementById('score-val').innerText = state.score;
    }

    function endGame() {
        state.active = false;
        clearInterval(state.timerInterval);
        
        const screen = document.getElementById('game-over-screen');
        document.getElementById('result-score').innerText = `Protocol Halted at Level ${state.level}. Score: ${state.score}`;
        screen.classList.remove('hidden');
    }
</script>

</body>
</html>
